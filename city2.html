<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script>
(function(){
"use strict";

// ═══════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════
const BASE = "https://nbakflorent-eng.github.io/road-rage-city-CITY-/";
const ROAD_AXES = [-120,-80,-40,0,40,80,120];
const ROAD_W = 12;
const SIDEWALK_W = 3;
const PI = Math.PI;
const DEG = PI/180;

// ═══════════════════════════════════════════
// SCENE SETUP
// ═══════════════════════════════════════════
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x87CEEB);
renderer.shadowMap.enabled = false;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x87CEEB, 200, 500);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.5, 600);

// Lights — critical for Kenney GLB visibility
const amb = new THREE.AmbientLight(0xffffff, 2.5);
scene.add(amb);
const sun = new THREE.DirectionalLight(0xffffff, 1.5);
sun.position.set(100,200,100);
sun.castShadow = false;
scene.add(sun);
const fill = new THREE.DirectionalLight(0xffffff, 0.8);
fill.position.set(-100,150,-100);
scene.add(fill);

// Resize
window.addEventListener('resize', function(){
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ═══════════════════════════════════════════
// GLTFLoader + LOAD QUEUE (max 8 simultaneous)
// ═══════════════════════════════════════════
const loader = new THREE.GLTFLoader();
const buildingBounds = [];

// Queue system to avoid browser connection saturation
var glbQueue = [];
var glbActive = 0;
var GLB_MAX_CONCURRENT = 8;

function glbProcessQueue(){
  while(glbActive < GLB_MAX_CONCURRENT && glbQueue.length > 0){
    var job = glbQueue.shift();
    glbActive++;
    job(function(){ glbActive--; glbProcessQueue(); });
  }
}

function isSafe(x, z){
  return !ROAD_AXES.some(function(r){ return Math.abs(x-r)<7.5 || Math.abs(z-r)<7.5; });
}

function facadeRotY(cx, cz){
  if(Math.abs(cx) >= Math.abs(cz)){
    return cx > 0 ? -PI/2 : PI/2;
  } else {
    return cz > 0 ? PI : 0;
  }
}

function loadGLB(url, x, z, sx, sy, sz, rotY, addBounds){
  glbQueue.push(function(done){
    loader.load(url, function(gltf){
      var model = gltf.scene;
      model.scale.set(sx, sy, sz);
      var box = new THREE.Box3().setFromObject(model);
      model.position.set(x, -box.min.y + 0.05, z);
      model.rotation.y = rotY;
      model.traverse(function(child){
        child.castShadow = false;
        child.receiveShadow = false;
      });
      scene.add(model);
      if(addBounds !== false){
        var bx = new THREE.Box3().setFromObject(model);
        var hw = (bx.max.x - bx.min.x)/2 + 0.5;
        var hd = (bx.max.z - bx.min.z)/2 + 0.5;
        buildingBounds.push({x: model.position.x, z: model.position.z, hw: hw, hd: hd});
      }
      done();
    }, undefined, function(err){
      console.warn("GLB load error:", url);
      done();
    });
  });
  glbProcessQueue();
}

// Variant for NPC vehicles
function loadGLBAsync(url, callback){
  glbQueue.push(function(done){
    loader.load(url, function(gltf){
      var model = gltf.scene;
      model.traverse(function(child){
        child.castShadow = false;
        child.receiveShadow = false;
      });
      callback(model);
      done();
    }, undefined, function(err){
      console.warn("NPC GLB error:", url);
      done();
    });
  });
  glbProcessQueue();
}

// ═══════════════════════════════════════════
// GROUND & ROADS
// ═══════════════════════════════════════════
function createGround(){
  // Grass
  var g = new THREE.Mesh(
    new THREE.PlaneGeometry(700,700),
    new THREE.MeshLambertMaterial({color:0x4a7a3a})
  );
  g.rotation.x = -PI/2;
  g.position.y = 0;
  scene.add(g);

  // Horizontal roads (along X axis, fixed Z)
  ROAD_AXES.forEach(function(rz){
    var road = new THREE.Mesh(
      new THREE.PlaneGeometry(700, ROAD_W),
      new THREE.MeshLambertMaterial({color:0x333333})
    );
    road.rotation.x = -PI/2;
    road.position.set(0, 0.01, rz);
    scene.add(road);

    // Sidewalks
    [-1,1].forEach(function(side){
      var sw = new THREE.Mesh(
        new THREE.PlaneGeometry(700, SIDEWALK_W),
        new THREE.MeshLambertMaterial({color:0xcccccc})
      );
      sw.rotation.x = -PI/2;
      sw.position.set(0, 0.02, rz + side*(ROAD_W/2 + SIDEWALK_W/2));
      scene.add(sw);
    });

    // Center markings
    for(var mx=-340; mx<=340; mx+=10){
      var mark = new THREE.Mesh(
        new THREE.PlaneGeometry(3, 0.4),
        new THREE.MeshLambertMaterial({color:0xffdd00})
      );
      mark.rotation.x = -PI/2;
      mark.position.set(mx, 0.03, rz);
      scene.add(mark);
    }
  });

  // Vertical roads (along Z axis, fixed X)
  ROAD_AXES.forEach(function(rx){
    var road = new THREE.Mesh(
      new THREE.PlaneGeometry(ROAD_W, 700),
      new THREE.MeshLambertMaterial({color:0x333333})
    );
    road.rotation.x = -PI/2;
    road.position.set(rx, 0.01, 0);
    scene.add(road);

    // Sidewalks
    [-1,1].forEach(function(side){
      var sw = new THREE.Mesh(
        new THREE.PlaneGeometry(SIDEWALK_W, 700),
        new THREE.MeshLambertMaterial({color:0xcccccc})
      );
      sw.rotation.x = -PI/2;
      sw.position.set(rx + side*(ROAD_W/2 + SIDEWALK_W/2), 0.02, 0);
      scene.add(sw);
    });

    // Center markings
    for(var mz=-340; mz<=340; mz+=10){
      var mark = new THREE.Mesh(
        new THREE.PlaneGeometry(0.4, 3),
        new THREE.MeshLambertMaterial({color:0xffdd00})
      );
      mark.rotation.x = -PI/2;
      mark.position.set(rx, 0.03, mz);
      scene.add(mark);
    }
  });

  // Intersections
  ROAD_AXES.forEach(function(rx){
    ROAD_AXES.forEach(function(rz){
      var inter = new THREE.Mesh(
        new THREE.PlaneGeometry(14,14),
        new THREE.MeshLambertMaterial({color:0x444444})
      );
      inter.rotation.x = -PI/2;
      inter.position.set(rx, 0.015, rz);
      scene.add(inter);
    });
  });
}

// ═══════════════════════════════════════════
// PLAYER CAR (procedural)
// ═══════════════════════════════════════════
var car = new THREE.Group();
// Body
var body = new THREE.Mesh(
  new THREE.BoxGeometry(2, 0.65, 4.2),
  new THREE.MeshLambertMaterial({color:0xcc0000})
);
body.position.y = 0.65;
car.add(body);
// Roof
var roof = new THREE.Mesh(
  new THREE.BoxGeometry(1.5, 0.45, 2.2),
  new THREE.MeshLambertMaterial({color:0xaa0000})
);
roof.position.y = 1.25;
car.add(roof);
// Windshield
var windshield = new THREE.Mesh(
  new THREE.BoxGeometry(1.4, 0.35, 0.1),
  new THREE.MeshLambertMaterial({color:0x88ccff, transparent:true, opacity:0.7})
);
windshield.position.set(0, 1.05, 1.3);
car.add(windshield);
// Wheels
var wheelGeo = new THREE.CylinderGeometry(0.35, 0.35, 0.35, 16);
var wheelMat = new THREE.MeshLambertMaterial({color:0x111111});
var wheelPositions = [
  [-1, 0.35, 1.4],
  [1, 0.35, 1.4],
  [-1, 0.35, -1.4],
  [1, 0.35, -1.4]
];
wheelPositions.forEach(function(wp){
  var w = new THREE.Mesh(wheelGeo, wheelMat);
  w.position.set(wp[0], wp[1], wp[2]);
  w.rotation.z = PI/2;
  car.add(w);
});
car.position.set(0, 0, -30);
scene.add(car);

// Physics state
var speed = 0;
var MAX_SPEED = 27.7; // 100 km/h
var MAX_REVERSE = -5.56; // -20 km/h

// ═══════════════════════════════════════════
// INPUT
// ═══════════════════════════════════════════
var keys = {};
window.addEventListener('keydown', function(e){
  keys[e.key.toLowerCase()] = true;
  // Minimap sizes
  var mc = document.getElementById('minimap');
  if(e.key.toLowerCase()==='k'){mc.width=140;mc.height=140;}
  if(e.key.toLowerCase()==='y'){mc.width=220;mc.height=220;}
  if(e.key.toLowerCase()==='i'){mc.width=320;mc.height=320;}
  if(e.key.toLowerCase()==='m'){mc.width=500;mc.height=500;}
});
window.addEventListener('keyup', function(e){
  keys[e.key.toLowerCase()] = false;
});

// ═══════════════════════════════════════════
// ISLAND CENTERS
// ═══════════════════════════════════════════
var islandCenters = [];
// Islands between roads
for(var i=0; i<ROAD_AXES.length-1; i++){
  for(var j=0; j<ROAD_AXES.length-1; j++){
    var cx = (ROAD_AXES[i] + ROAD_AXES[i+1])/2;
    var cz = (ROAD_AXES[j] + ROAD_AXES[j+1])/2;
    islandCenters.push({x:cx, z:cz});
  }
}
// Also add outer islands beyond the grid
var outerVals = [-160, -140, 140, 160];
outerVals.forEach(function(ov){
  ROAD_AXES.forEach(function(r){
    islandCenters.push({x:ov, z:(r+ROAD_AXES[Math.min(ROAD_AXES.indexOf(r)+1, ROAD_AXES.length-1)])/2});
    islandCenters.push({x:(r+ROAD_AXES[Math.min(ROAD_AXES.indexOf(r)+1, ROAD_AXES.length-1)])/2, z:ov});
  });
});

// ═══════════════════════════════════════════
// CITY ZONES POPULATION
// ═══════════════════════════════════════════
var skyscrapers = ["building-skyscraper-a.glb","building-skyscraper-b.glb","building-skyscraper-c.glb","building-skyscraper-d.glb","building-skyscraper-e.glb"];
var centerTrees = ["tree_oak.glb","tree-large.glb","tree_fat.glb","tree_detailed.glb","tree_blocks.glb"];
var midBldgs = ["building-a.glb","building-b.glb","building-c.glb","building-d.glb","building-e.glb","building-f.glb","building-g.glb","building-h.glb","building-i.glb","building-j.glb","building-k.glb","building-l.glb","building-m.glb","building-n.glb","building-o.glb","building-p.glb","building-q.glb","building-r.glb","building-s.glb"];
var midTrees = ["tree-park-large.glb","tree_cone.glb","tree_tall.glb","tree_simple.glb","tree_pineDefaultA.glb","tree_pineRoundA.glb"];
var subHouses = ["building-type-a.glb","building-type-b.glb","building-type-c.glb","building-type-d.glb","building-type-e.glb","building-type-f.glb","building-type-g.glb","building-type-h.glb","building-type-i.glb","building-type-j.glb","building-type-k.glb","building-type-l.glb","building-type-m.glb","building-type-n.glb","building-type-o.glb","building-type-p.glb","building-type-q.glb","building-type-r.glb","building-type-s.glb","building-type-t.glb","building-type-u.glb"];
var subTrees = ["tree_oak.glb","tree-small.glb","tree_small.glb","tree-shrub.glb","tree_pineSmallA.glb"];
var signs = ["sign-highway.glb","sign-highway-detailed.glb"];
var lowDetailBldgs = ["low-detail-building-a.glb","low-detail-building-b.glb","low-detail-building-c.glb","low-detail-building-d.glb","low-detail-building-e.glb","low-detail-building-wide-a.glb","low-detail-building-wide-b.glb"];

function createCityContent(){
  var skyIdx=0, ctreeIdx=0, midIdx=0, mtreeIdx=0, subIdx=0, streeIdx=0, signIdx=0, lowIdx=0;

  // Process real island centers between roads
  for(var i=0; i<ROAD_AXES.length-1; i++){
    for(var j=0; j<ROAD_AXES.length-1; j++){
      var cx = (ROAD_AXES[i] + ROAD_AXES[i+1])/2;
      var cz = (ROAD_AXES[j] + ROAD_AXES[j+1])/2;
      var acx = Math.abs(cx);
      var acz = Math.abs(cz);
      var rot = facadeRotY(cx, cz);

      // CENTRE-VILLE: |cx|<=60 AND |cz|<=60
      if(acx <= 60 && acz <= 60){
        // Skyscraper
        if(isSafe(cx, cz)){
          loadGLB(BASE + skyscrapers[skyIdx % 5], cx, cz, 8,8,8, rot, true);
          skyIdx++;
        }
        // Trees at corners
        if(isSafe(cx-9, cz-9)) loadGLB(BASE + centerTrees[ctreeIdx % 5], cx-9, cz-9, 8,8,8, 0, false);
        ctreeIdx++;
        if(isSafe(cx+9, cz+9)) loadGLB(BASE + centerTrees[ctreeIdx % 5], cx+9, cz+9, 8,8,8, 0, false);
        ctreeIdx++;
        // Furniture
        if(isSafe(cx-5, cz+6)) loadGLB(BASE + "detail-bench.glb", cx-5, cz+6, 3,3,3, rot, false);
        if(isSafe(cx+5, cz+6)) loadGLB(BASE + "detail-bench.glb", cx+5, cz+6, 3,3,3, rot, false);
        if(isSafe(cx-7, cz-7)) loadGLB(BASE + "planter.glb", cx-7, cz-7, 3,3,3, 0, false);
        if(isSafe(cx+7, cz+7)) loadGLB(BASE + "detail-dumpster-closed.glb", cx+7, cz+7, 3,3,3, 0, false);
        if(isSafe(cx+6, cz-6)) loadGLB(BASE + "fire_hydrant_low_poly.glb", cx+6, cz-6, 2,2,2, 0, false);
        // Sign
        if(isSafe(cx+8, cz+8)) loadGLB(BASE + signs[signIdx % 2], cx+8, cz+8, 3,3,3, rot, false);
        signIdx++;
      }
      // MIDTOWN: not center but |cx|<=100 AND |cz|<=100
      else if(acx <= 100 && acz <= 100){
        // 2 buildings
        if(isSafe(cx-5, cz)){
          loadGLB(BASE + midBldgs[midIdx % 19], cx-5, cz, 6,6,6, rot, true);
          midIdx++;
        }
        if(isSafe(cx+5, cz)){
          loadGLB(BASE + midBldgs[midIdx % 19], cx+5, cz, 6,6,6, rot, true);
          midIdx++;
        }
        // Tree
        if(isSafe(cx, cz+9)) loadGLB(BASE + midTrees[mtreeIdx % 6], cx, cz+9, 8,8,8, 0, false);
        mtreeIdx++;
        // Furniture
        if(isSafe(cx-8, cz+3)) loadGLB(BASE + "planter.glb", cx-8, cz+3, 3,3,3, 0, false);
        if(isSafe(cx+8, cz-3)) loadGLB(BASE + "detail-light-single.glb", cx+8, cz-3, 4,4,4, 0, false);
      }
      // SUBURB: |cx|>100 OR |cz|>100
      else {
        // 2 houses
        if(isSafe(cx, cz-5)){
          loadGLB(BASE + subHouses[subIdx % 21], cx, cz-5, 5,5,5, rot, true);
          subIdx++;
        }
        if(isSafe(cx, cz+5)){
          loadGLB(BASE + subHouses[subIdx % 21], cx, cz+5, 5,5,5, rot, true);
          subIdx++;
        }
        // Trees
        if(isSafe(cx, cz)) loadGLB(BASE + subTrees[streeIdx % 5], cx, cz, 8,8,8, 0, false);
        streeIdx++;
        // Fences
        if(isSafe(cx-4, cz-8)) loadGLB(BASE + "fence-low.glb", cx-4, cz-8, 3,3,3, 0, false);
        if(isSafe(cx+4, cz-8)) loadGLB(BASE + "fence-low.glb", cx+4, cz-8, 3,3,3, 0, false);
        if(isSafe(cx-4, cz+8)) loadGLB(BASE + "fence_simple.glb", cx-4, cz+8, 3,3,3, 0, false);
        if(isSafe(cx+4, cz+8)) loadGLB(BASE + "fence_simple.glb", cx+4, cz+8, 3,3,3, 0, false);
        // Green patch
        var gp = new THREE.Mesh(
          new THREE.PlaneGeometry(12,12),
          new THREE.MeshLambertMaterial({color:0x4a7c3f})
        );
        gp.rotation.x = -PI/2;
        gp.position.set(cx, 0.02, cz);
        scene.add(gp);
      }
    }
  }

  // STREETLIGHTS at intersections
  ROAD_AXES.forEach(function(rx){
    ROAD_AXES.forEach(function(rz){
      var arx = Math.abs(rx);
      var arz = Math.abs(rz);

      // Centre-ville intersections: |rx|<=40 AND |rz|<=40
      if(arx <= 40 && arz <= 40){
        // Large light posts at 4 corners
        [[6,6],[-6,6],[6,-6],[-6,-6]].forEach(function(off){
          loadGLB(BASE + "lightPostLarge.glb", rx+off[0], rz+off[1], 4,4,4, 0, false);
        });
        // Traffic lights
        loadGLB(BASE + "detail-light-traffic.glb", rx+5, rz+5, 3,3,3, 0, false);
        loadGLB(BASE + "detail-light-traffic.glb", rx-5, rz-5, 3,3,3, PI, false);
      }
      // Midtown intersections: 40<|rx|<=80 OR 40<|rz|<=80, within 100
      else if(arx <= 100 && arz <= 100 && (arx > 40 || arz > 40)){
        [[6,6],[-6,6],[6,-6],[-6,-6]].forEach(function(off){
          loadGLB(BASE + "lightPostModern.glb", rx+off[0], rz+off[1], 4,4,4, 0, false);
        });
      }
      // Suburb intersections
      else {
        [[6,6],[-6,6],[6,-6],[-6,-6]].forEach(function(off){
          loadGLB(BASE + "light-curved.glb", rx+off[0], rz+off[1], 4,4,4, 0, false);
        });
      }
    });
  });

  // BORDER buildings (|x|>120 OR |z|>120)
  for(var bx=-160; bx<=160; bx+=12){
    [-160, -148, 148, 160].forEach(function(bz){
      if(isSafe(bx-4, bz) && (Math.abs(bx-4)>120 || Math.abs(bz)>120)){
        loadGLB(BASE + lowDetailBldgs[lowIdx % 7], bx-4, bz, 5,5,5, 0, true);
        lowIdx++;
      }
      if(isSafe(bx+4, bz) && (Math.abs(bx+4)>120 || Math.abs(bz)>120)){
        loadGLB(BASE + lowDetailBldgs[lowIdx % 7], bx+4, bz, 5,5,5, 0, true);
        lowIdx++;
      }
    });
  }
  for(var bz2=-160; bz2<=160; bz2+=12){
    [-160, -148, 148, 160].forEach(function(bx2){
      if(isSafe(bx2, bz2-4) && (Math.abs(bx2)>120 || Math.abs(bz2-4)>120)){
        loadGLB(BASE + lowDetailBldgs[lowIdx % 7], bx2, bz2-4, 5,5,5, PI/2, true);
        lowIdx++;
      }
      if(isSafe(bx2, bz2+4) && (Math.abs(bx2)>120 || Math.abs(bz2+4)>120)){
        loadGLB(BASE + lowDetailBldgs[lowIdx % 7], bx2, bz2+4, 5,5,5, PI/2, true);
        lowIdx++;
      }
    });
  }
}

// ═══════════════════════════════════════════
// PEDESTRIANS (static)
// ═══════════════════════════════════════════
function createPedestrians(){
  loadGLB(BASE + "character-a.glb", 5, 5, 5,5,5, 0, false);
  loadGLB(BASE + "character-b.glb", -45, 5, 5,5,5, PI/2, false);
  loadGLB(BASE + "character-c.glb", 0, 0, 5,5,5, 0, false);
  loadGLB(BASE + "character-d.glb", 45, -45, 5,5,5, -PI/2, false);
}

// ═══════════════════════════════════════════
// NPC VEHICLES
// ═══════════════════════════════════════════
var npcList = [];

var npcDefs = [
  {file:"taxi.glb",        axis:'x', lane:0,   dir:1,  speed:5.0,  startPos:-100},
  {file:"sedan.glb",       axis:'z', lane:-40, dir:-1, speed:6.11, startPos:100},
  {file:"sedan-sports.glb",axis:'x', lane:-40, dir:-1, speed:7.78, startPos:80},
  {file:"suv.glb",         axis:'x', lane:40,  dir:1,  speed:5.56, startPos:-80},
  {file:"suv-luxury.glb",  axis:'z', lane:0,   dir:1,  speed:4.17, startPos:-100},
  {file:"van.glb",         axis:'z', lane:80,  dir:1,  speed:4.44, startPos:-60},
  {file:"truck.glb",       axis:'z', lane:-80, dir:1,  speed:3.33, startPos:-120},
  {file:"hatchback-sports.glb", axis:'x', lane:-80, dir:-1, speed:6.94, startPos:100}
];

function createNPCVehicles(){
  npcDefs.forEach(function(def){
    loadGLBAsync(BASE + def.file, function(model){
      model.scale.set(4,4,4);
      // Compute y from bounding box
      var box = new THREE.Box3().setFromObject(model);
      var yOff = -box.min.y + 0.05;

      // Set rotation based on axis+direction (FIXED, never changes)
      if(def.axis === 'x' && def.dir === 1)  model.rotation.y = 0;
      if(def.axis === 'x' && def.dir === -1) model.rotation.y = PI;
      if(def.axis === 'z' && def.dir === 1)  model.rotation.y = -PI/2;
      if(def.axis === 'z' && def.dir === -1) model.rotation.y = PI/2;

      // Initial position
      if(def.axis === 'x'){
        model.position.set(def.startPos, yOff, def.lane);
      } else {
        model.position.set(def.lane, yOff, def.startPos);
      }

      scene.add(model);

      npcList.push({
        mesh: model,
        axis: def.axis,
        dir: def.dir,
        speed: def.speed,
        pos: def.startPos,
        lane: def.lane,
        yOff: yOff
      });
    });
  });
}

function updateNPCs(delta){
  // Anti-collision: same axis + same lane
  for(var i=0; i<npcList.length; i++){
    var a = npcList[i];
    a.blocked = false;
    for(var j=0; j<npcList.length; j++){
      if(i===j) continue;
      var b = npcList[j];
      if(a.axis !== b.axis || a.lane !== b.lane || a.dir !== b.dir) continue;
      var dist = (b.pos - a.pos) * a.dir;
      if(dist > 0 && dist < 9){
        a.blocked = true;
      }
    }
  }

  npcList.forEach(function(npc){
    if(!npc.blocked){
      npc.pos += npc.speed * npc.dir * delta;
    }
    // Wrap-around
    if(npc.pos > 130) npc.pos = -130;
    if(npc.pos < -130) npc.pos = 130;
    // Update position
    if(npc.axis === 'x'){
      npc.mesh.position.x = npc.pos;
      npc.mesh.position.z = npc.lane;
    } else {
      npc.mesh.position.x = npc.lane;
      npc.mesh.position.z = npc.pos;
    }
  });
}

// ═══════════════════════════════════════════
// MINIMAP
// ═══════════════════════════════════════════
var minimapCanvas = document.getElementById('minimap');
var mctx = minimapCanvas.getContext('2d');

function drawMinimap(){
  var w = minimapCanvas.width;
  var h = minimapCanvas.height;
  var scale = 0.45;
  var cx = car.position.x;
  var cz = car.position.z;

  mctx.clearRect(0,0,w,h);
  mctx.fillStyle = 'rgba(0,0,0,0.6)';
  mctx.fillRect(0,0,w,h);

  // Roads
  mctx.strokeStyle = '#555';
  mctx.lineWidth = 2;
  ROAD_AXES.forEach(function(r){
    // Horizontal
    var hy = h/2 + (r - cz)*scale;
    mctx.beginPath();
    mctx.moveTo(0, hy);
    mctx.lineTo(w, hy);
    mctx.stroke();
    // Vertical
    var vx = w/2 + (r - cx)*scale;
    mctx.beginPath();
    mctx.moveTo(vx, 0);
    mctx.lineTo(vx, h);
    mctx.stroke();
  });

  // NPC vehicles (blue dots)
  mctx.fillStyle = '#4488ff';
  npcList.forEach(function(npc){
    var nx = w/2 + (npc.mesh.position.x - cx)*scale;
    var ny = h/2 + (npc.mesh.position.z - cz)*scale;
    if(nx >= 0 && nx <= w && ny >= 0 && ny <= h){
      mctx.beginPath();
      mctx.arc(nx, ny, 3, 0, PI*2);
      mctx.fill();
    }
  });

  // Player (red dot)
  mctx.fillStyle = '#ff2222';
  mctx.beginPath();
  mctx.arc(w/2, h/2, 4, 0, PI*2);
  mctx.fill();
}

// ═══════════════════════════════════════════
// ANIMATION LOOP
// ═══════════════════════════════════════════
var clock = new THREE.Clock();
var speedDisplay = document.getElementById('speed-val');

function animate(){
  requestAnimationFrame(animate);
  var delta = Math.min(clock.getDelta(), 0.05);

  // ── PLAYER CAR PHYSICS ──
  var fwd = keys['z'] || keys['w'];
  var bwd = keys['s'];
  var left = keys['q'] || keys['a'];
  var right = keys['d'];

  if(fwd){
    speed += 8 * delta;
    if(speed > MAX_SPEED) speed = MAX_SPEED;
  } else if(bwd){
    if(speed > 0){
      speed *= Math.pow(0.7, delta*60);
      if(speed < 0.1) speed = 0;
    } else {
      speed -= 4 * delta;
      if(speed < MAX_REVERSE) speed = MAX_REVERSE;
    }
  } else {
    speed *= Math.pow(0.85, delta*60);
    if(Math.abs(speed) < 0.05) speed = 0;
  }

  // Steering
  if(Math.abs(speed) > 0.5){
    var turnAngle = 0.035 * (Math.abs(speed)/MAX_SPEED);
    if(left) car.rotation.y += turnAngle;
    if(right) car.rotation.y -= turnAngle;
  }

  // Move car
  var dir = new THREE.Vector3(0, 0, 1);
  dir.applyQuaternion(car.quaternion);
  car.position.x += dir.x * speed * delta;
  car.position.z += dir.z * speed * delta;
  if(car.position.y < 0) car.position.y = 0;

  // ── COLLISIONS ──
  if(buildingBounds.length > 0){
    var px = car.position.x;
    var pz = car.position.z;
    var phw = 1.5; // car half-width
    var phd = 2.5; // car half-depth

    for(var ci=0; ci<buildingBounds.length; ci++){
      var b = buildingBounds[ci];
      var oL = (px + phw) - (b.x - b.hw);
      var oR = (b.x + b.hw) - (px - phw);
      var oF = (pz + phd) - (b.z - b.hd);
      var oB = (b.z + b.hd) - (pz - phd);

      if(oL > 0 && oR > 0 && oF > 0 && oB > 0){
        // Collision — push out on smallest penetration axis
        var minO = Math.min(oL, oR, oF, oB);
        if(minO === oL) car.position.x -= oL;
        else if(minO === oR) car.position.x += oR;
        else if(minO === oF) car.position.z -= oF;
        else car.position.z += oB;
        speed *= -0.25;
      }
    }
  }

  // ── NPC UPDATE ──
  updateNPCs(delta);

  // ── CAMERA TPS ──
  var camOffset = new THREE.Vector3(0, 7, -15);
  camOffset.applyQuaternion(car.quaternion);
  var targetCamPos = car.position.clone().add(camOffset);
  camera.position.lerp(targetCamPos, 0.1);
  var lookTarget = car.position.clone().add(new THREE.Vector3(0,1,0));
  camera.lookAt(lookTarget);

  // ── HUD ──
  speedDisplay.textContent = Math.abs(Math.round(speed * 3.6));

  // ── MINIMAP ──
  drawMinimap();

  // ── RENDER ──
  renderer.render(scene, camera);
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
createGround();
createCityContent();
createPedestrians();
createNPCVehicles();
animate();

})();
</script>
