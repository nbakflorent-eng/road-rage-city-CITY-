<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Road Rage City</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }
    #hud {
      position: fixed;
      top: 16px;
      left: 16px;
      color: #fff;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      text-shadow: 1px 1px 3px #000;
      pointer-events: none;
      user-select: none;
    }
    #hud .label { opacity: 0.7; }
    #hud .value { font-weight: bold; font-size: 16px; }
    #speed-wrap { margin-top: 6px; }
    #minimap {
      position: fixed;
      bottom: 16px;
      left: 16px;
      width: 160px;
      height: 160px;
      border-radius: 50%;
      border: 2px solid #fff;
      pointer-events: none;
    }
    #mm-labels {
      position: fixed;
      bottom: 184px;
      left: 16px;
      color: #fff;
      font-family: 'Courier New', monospace;
      font-size: 10px;
      pointer-events: none;
      white-space: nowrap;
      text-shadow: 1px 1px 2px #000;
    }

  </style>
</head>
<body>
  <div id="mm-labels">
    <div>K = mini</div>
    <div>Y = moyen</div>
    <div>I = grand</div>
    <div>M = pleine carte</div>
  </div>
  <canvas id="minimap" width="160" height="160"></canvas>
  <div id="hud">
    <div class="label">ZQSD / WASD — conduire</div>
    <div id="speed-wrap">
      <span class="label">Vitesse : </span>
      <span class="value" id="speed-display">0</span>
      <span class="label"> km/h</span>
    </div>
  </div>

  <!-- Three.js r128 CDN + Loaders -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/FBXLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/libs/fflate.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/utils/SkeletonUtils.js"></script>


  <script>
    // ════════════════════════════════════════
    //  SCENE
    // ════════════════════════════════════════
    const scene = new THREE.Scene();
    scene.add(new THREE.AmbientLight(0xffffff, 1.0));
    const sun = new THREE.DirectionalLight(0xffffff, 1.0);
    sun.position.set(100, 200, 100);
    scene.add(sun);
    const sun2 = new THREE.DirectionalLight(0xffffff, 0.4);
    sun2.position.set(-100, 100, -100);
    scene.add(sun2);
    scene.background = new THREE.Color(0x87CEEB); // ciel bleu
    scene.fog = new THREE.Fog(0x87CEEB, 90, 220);

    const camera = new THREE.PerspectiveCamera(
      60, window.innerWidth / window.innerHeight, 0.1, 500
    );

    const renderer = new THREE.WebGLRenderer({ antialias: false });
    renderer.setPixelRatio(1);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = false;
    document.body.appendChild(renderer.domElement);

    const _mapRenderer = new THREE.WebGLRenderer({antialias:false});
    _mapRenderer.setSize(660,660);
    _mapRenderer.setClearColor(0x1a1a2e, 1);
    _mapRenderer.autoClear = true;
    _mapRenderer.autoClearColor = true;
    const _mapCam = new THREE.OrthographicCamera(-80,80,80,-80,0.1,2000);
    _mapCam.up.set(0,0,-1);
    _mapCam.position.set(0,400,0);
    _mapCam.lookAt(0,0,0);
    _mapCam.layers.enableAll();
    const _mapDiv = document.createElement('div');
    _mapDiv.id='_mapDiv';
    _mapDiv.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:660px;height:660px;display:none;z-index:1000000;border:3px solid white;border-radius:50%;overflow:hidden';
    const _mapLabel = document.createElement('div');
    _mapLabel.style.cssText='position:absolute;top:8px;left:50%;transform:translateX(-50%);color:white;font-size:13px;z-index:1000001;pointer-events:none;font-family:monospace';
    _mapLabel.textContent='M = fermer';
    const _mapTriCanvas = document.createElement('canvas');
    _mapTriCanvas.width=660; _mapTriCanvas.height=660;
    _mapTriCanvas.style.cssText='position:absolute;top:0;left:0;pointer-events:none;z-index:1000002';
    _mapDiv.appendChild(_mapRenderer.domElement);
    _mapDiv.appendChild(_mapLabel);
    _mapDiv.appendChild(_mapTriCanvas);
    document.body.appendChild(_mapDiv);
    const _mapCtx = _mapTriCanvas.getContext('2d');
    function _drawGrid(){
      _mapCtx.strokeStyle='rgba(255,255,255,0.08)';
      _mapCtx.lineWidth=0.5;
      for(let i=0;i<660;i+=33){
        _mapCtx.beginPath();_mapCtx.moveTo(i,0);_mapCtx.lineTo(i,660);_mapCtx.stroke();
        _mapCtx.beginPath();_mapCtx.moveTo(0,i);_mapCtx.lineTo(660,i);_mapCtx.stroke();
      }
    }

    // ════════════════════════════════════════
    //  CONSTANTES
    // ════════════════════════════════════════
    const BASE   = 'https://nbakflorent-eng.github.io/road-rage-city-CITY-/';
    let buildingBounds = [];
    const RD_POS = [-55, 0, 55];
    const RD_W   = 16;
    const WORLD  = 400;

    let _s = 31337;
    function rnd() { _s = (_s * 1664525 + 1013904223) >>> 0; return _s / 4294967296; }

    const groundMesh = new THREE.Mesh(
      new THREE.PlaneGeometry(500, 500),
      new THREE.MeshBasicMaterial({ color: 0x2a2a2a })
    );
    groundMesh.rotation.x = -Math.PI / 2;
    groundMesh.position.y = -0.05;
    scene.add(groundMesh);

    // ── GLTFLoader ──
    function _loadGLB(key, cb) {
      const manager = new THREE.LoadingManager();
      manager.setURLModifier(url => { const f = url.split('/').pop(); if (/^[0-9a-f-]{36}$/.test(f)) return url; return BASE + encodeURIComponent(f); });
      const loader = new THREE.GLTFLoader(manager);
      loader.load(BASE + key, g => {
        if (g && g.scene) g.scene.traverse(c => { if (c.isMesh) { c.material.side = THREE.FrontSide; c.material.needsUpdate = true; } });
        cb(g ? g.scene : null);
      }, null, () => { console.warn('GLB manquant:', key); cb(null); });
    }

    // ════════════════════════════════════════
    //  ROUTES
    // ════════════════════════════════════════
    function createRoadGrid() {
      const roadMat     = new THREE.MeshLambertMaterial({ color: 0x1a1a1a });
      const lineMat     = new THREE.MeshLambertMaterial({ color: 0xFFDD00 });
      const sidewalkMat = new THREE.MeshLambertMaterial({ color: 0x888888 });
      const roadWidth = 14, roadLength = 280;
      const hRoads = [-120, -80, -40, 0, 40, 80, 120];
      const vRoads = [-120, -80, -40, 0, 40, 80, 120];
      const ground2 = new THREE.Mesh(
        new THREE.PlaneGeometry(400, 400),
        new THREE.MeshLambertMaterial({ color: 0x3a5a2a })
      );
      ground2.rotation.x = -Math.PI / 2; ground2.position.y = 0; scene.add(ground2);
      hRoads.forEach(z => {
        const m = new THREE.Mesh(new THREE.PlaneGeometry(roadLength, roadWidth), roadMat);
        m.rotation.x = -Math.PI / 2; m.position.set(0, 0.01, z); scene.add(m);
        [-1, 1].forEach(s => {
          const sw = new THREE.Mesh(new THREE.PlaneGeometry(roadLength, 3), sidewalkMat);
          sw.rotation.x = -Math.PI / 2;
          sw.position.set(0, 0.02, z + s * (roadWidth / 2 + 1.5));
          scene.add(sw);
        });
        for (let x = -130; x < 130; x += 10) {
          const dash = new THREE.Mesh(new THREE.PlaneGeometry(5, 0.4), lineMat);
          dash.rotation.x = -Math.PI / 2; dash.position.set(x, 0.05, z); scene.add(dash);
        }
      });
      vRoads.forEach(x => {
        const m = new THREE.Mesh(new THREE.PlaneGeometry(roadWidth, roadLength), roadMat);
        m.rotation.x = -Math.PI / 2; m.position.set(x, 0.01, 0); scene.add(m);
        [-1, 1].forEach(s => {
          const sw = new THREE.Mesh(new THREE.PlaneGeometry(3, roadLength), sidewalkMat);
          sw.rotation.x = -Math.PI / 2;
          sw.position.set(x + s * (roadWidth / 2 + 1.5), 0.02, 0);
          scene.add(sw);
        });
        for (let z = -130; z < 130; z += 10) {
          const dash = new THREE.Mesh(new THREE.PlaneGeometry(0.4, 5), lineMat);
          dash.rotation.x = -Math.PI / 2; dash.position.set(x, 0.05, z); scene.add(dash);
        }
      });
    }

    // ════════════════════════════════════════
    //  BÂTIMENTS
    // ════════════════════════════════════════
    function loadBuilding(filename, x, z, scale, rotY, boundRadius) {
      _loadGLB(filename, g => {
        if (!g) return;
        g.scale.setScalar(scale);
        g.position.set(x, 0, z);
        g.rotation.y = rotY;
        const box = new THREE.Box3().setFromObject(g);
        g.position.y = -box.min.y;
        scene.add(g);
        buildingBounds.push({ x, z, r: boundRadius });
      });
    }

    function createDowntown() {
      [
        { file: 'building-skyscraper-a.glb', x: -60, z: -60, s: 1.8, ry: 0 },
        { file: 'building-skyscraper-b.glb', x: -20, z: -60, s: 2.0, ry: Math.PI/2 },
        { file: 'building-skyscraper-c.glb', x:  20, z: -60, s: 1.9, ry: 0 },
        { file: 'building-skyscraper-d.glb', x:  60, z: -60, s: 2.1, ry: Math.PI },
        { file: 'building-skyscraper-e.glb', x: -60, z: -20, s: 1.8, ry: Math.PI/2 },
        { file: 'building-skyscraper-a.glb', x:  60, z: -20, s: 2.0, ry: 0 },
        { file: 'building-skyscraper-b.glb', x: -60, z:  20, s: 1.9, ry: 0 },
        { file: 'building-skyscraper-c.glb', x:  60, z:  20, s: 2.0, ry: Math.PI },
        { file: 'building-skyscraper-d.glb', x: -60, z:  60, s: 1.8, ry: Math.PI/2 },
        { file: 'building-skyscraper-e.glb', x: -20, z:  60, s: 2.1, ry: 0 },
        { file: 'building-skyscraper-a.glb', x:  20, z:  60, s: 1.8, ry: Math.PI },
        { file: 'building-skyscraper-b.glb', x:  60, z:  60, s: 2.0, ry: Math.PI/2 },
        { file: 'building-a.glb', x: -20, z: -20, s: 1.6, ry: 0 },
        { file: 'building-b.glb', x:  20, z: -20, s: 1.5, ry: Math.PI/2 },
        { file: 'building-c.glb', x: -20, z:  20, s: 1.6, ry: Math.PI },
        { file: 'building-d.glb', x:  20, z:  20, s: 1.5, ry: 0 },
        { file: 'building-e.glb', x:   0, z:   0, s: 1.4, ry: Math.PI/4 },
      ].forEach(b => loadBuilding(b.file, b.x, b.z, b.s, b.ry, 7));
    }

    function createSuburbs() {
      [
        { file: 'building-type-a.glb', x: -100, z: -100, s: 1.2, ry: 0 },
        { file: 'building-type-b.glb', x:  -60, z: -100, s: 1.3, ry: Math.PI/2 },
        { file: 'building-type-c.glb', x:  -20, z: -100, s: 1.1, ry: 0 },
        { file: 'building-type-d.glb', x:   20, z: -100, s: 1.2, ry: Math.PI },
        { file: 'building-type-e.glb', x:   60, z: -100, s: 1.3, ry: Math.PI/2 },
        { file: 'building-type-f.glb', x:  100, z: -100, s: 1.1, ry: 0 },
        { file: 'building-type-g.glb', x: -100, z:  100, s: 1.2, ry: Math.PI },
        { file: 'building-type-h.glb', x:  -60, z:  100, s: 1.3, ry: 0 },
        { file: 'building-type-i.glb', x:  -20, z:  100, s: 1.1, ry: Math.PI/2 },
        { file: 'building-type-j.glb', x:   20, z:  100, s: 1.2, ry: Math.PI },
        { file: 'building-type-k.glb', x:   60, z:  100, s: 1.3, ry: 0 },
        { file: 'building-type-l.glb', x:  100, z:  100, s: 1.1, ry: Math.PI/2 },
        { file: 'building-type-m.glb', x: -100, z:  -60, s: 1.2, ry: Math.PI/2 },
        { file: 'building-type-n.glb', x: -100, z:  -20, s: 1.3, ry: 0 },
        { file: 'building-type-o.glb', x: -100, z:   20, s: 1.1, ry: Math.PI },
        { file: 'building-type-p.glb', x: -100, z:   60, s: 1.2, ry: Math.PI/2 },
        { file: 'building-type-q.glb', x:  100, z:  -60, s: 1.2, ry: 0 },
        { file: 'building-type-r.glb', x:  100, z:  -20, s: 1.3, ry: Math.PI/2 },
        { file: 'building-type-s.glb', x:  100, z:   20, s: 1.1, ry: 0 },
        { file: 'building-type-u.glb', x:  100, z:   60, s: 1.2, ry: Math.PI },
        { file: 'low-detail-building-a.glb',      x: -100, z: -100, s: 1.0, ry: 0 },
        { file: 'low-detail-building-b.glb',      x:    0, z: -100, s: 1.0, ry: 0 },
        { file: 'low-detail-building-c.glb',      x:  100, z: -100, s: 1.0, ry: 0 },
        { file: 'low-detail-building-d.glb',      x: -100, z:    0, s: 1.0, ry: Math.PI/2 },
        { file: 'low-detail-building-e.glb',      x:  100, z:    0, s: 1.0, ry: Math.PI/2 },
        { file: 'low-detail-building-f.glb',      x: -100, z:  100, s: 1.0, ry: Math.PI },
        { file: 'low-detail-building-wide-a.glb', x:    0, z:  100, s: 1.0, ry: Math.PI },
        { file: 'low-detail-building-wide-b.glb', x:  100, z:  100, s: 1.0, ry: Math.PI },
      ].forEach(b => loadBuilding(b.file, b.x, b.z, b.s, b.ry, 5));
    }

    buildingBounds = [];
    createRoadGrid();
    createDowntown();
    createSuburbs();


    // ════════════════════════════════════════
    //  FEUX DE CIRCULATION — procéduraux
    // ════════════════════════════════════════
    const _TL2 = [];
    const _TL2_DUR  = { red:5.0, green:5.0, orange:1.0 };
    const _TL2_NEXT = { red:'green', green:'orange', orange:'red' };
    const _TL2_COLS = {
      red:    { on:0xFF2200, off:0x220000 },
      orange: { on:0xFF8C00, off:0x221100 },
      green:  { on:0x00CC44, off:0x002200 },
    };

    function _updateTrafficLights(dt) {
      _TL2.forEach(tl => {
        tl.timer -= dt;
        if (tl.timer <= 0) {
          tl.phase = _TL2_NEXT[tl.phase];
          tl.timer = _TL2_DUR[tl.phase];
          tl.matR.color.setHex(tl.phase==='red'    ? _TL2_COLS.red.on    : _TL2_COLS.red.off);
          tl.matO.color.setHex(tl.phase==='orange' ? _TL2_COLS.orange.on : _TL2_COLS.orange.off);
          tl.matG.color.setHex(tl.phase==='green'  ? _TL2_COLS.green.on  : _TL2_COLS.green.off);
        }
      });
    }

    (function spawnTrafficLights() {
      const matPole=new THREE.MeshBasicMaterial({color:0x2C2C2C});
      const matBox =new THREE.MeshBasicMaterial({color:0x111111});
      RD_POS.forEach((rx,i) => {
        RD_POS.forEach((rz,j) => {
          const phase=(i+j)%2===0?'red':'green';
          const matR=new THREE.MeshBasicMaterial({color:_TL2_COLS.red[phase==='red'?'on':'off']});
          const matO=new THREE.MeshBasicMaterial({color:_TL2_COLS.orange['off']});
          const matG=new THREE.MeshBasicMaterial({color:_TL2_COLS.green[phase==='green'?'on':'off']});
          const grp=new THREE.Group();
          const pole=new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.12,5,8),matPole); pole.position.set(0,2.5,0); grp.add(pole);
          const box=new THREE.Mesh(new THREE.BoxGeometry(0.55,1.8,0.35),matBox); box.position.set(0,5.3,0); grp.add(box);
          const sR=new THREE.Mesh(new THREE.SphereGeometry(0.2,8,8),matR); sR.position.set(0,5.95,0); grp.add(sR);
          const sO=new THREE.Mesh(new THREE.SphereGeometry(0.2,8,8),matO); sO.position.set(0,5.35,0); grp.add(sO);
          const sG=new THREE.Mesh(new THREE.SphereGeometry(0.2,8,8),matG); sG.position.set(0,4.75,0); grp.add(sG);
          grp.rotation.y=Math.PI/4; grp.position.set(rx+7.5,0,rz+7.5); scene.add(grp);
          _TL2.push({matR,matO,matG,phase,timer:_TL2_DUR[phase]});
        });
      });
    })();

    // ════════════════════════════════════════
    //  VOITURES PNJ — Kenney GLB chargés via URL relative
    //  sedan/suv/taxi/van/hatchback-sports ×3
    //  delivery/truck/sedan-sports/suv-luxury ×2
    //  police ×2  ambulance/firetruck ×1  → 20 voitures
    // ════════════════════════════════════════

    // ── GLTFLoader — URL absolue + résolution texture depuis racine du repo ──

    // Normalise : scale=1.5 (ou 0.008 pour police_car), grounded y=0, ombres
    function _normalizeKenney(model, key) {
      model.position.set(0, 0, 0);
      model.rotation.set(0, 0, 0);
      const s = key === 'police_car' ? 0.008 : 1.5;
      model.scale.set(s, s, s);
      const box = new THREE.Box3().setFromObject(model);
      model.position.y = -box.min.y;
    }

    // ── Tableau pondéré — pool total 27 slots ──
    const KENNEY_DEFS = [
      { key:'sedan',            freq:3 },
      { key:'suv',              freq:3 },
      { key:'taxi',             freq:3 },
      { key:'van',              freq:3 },
      { key:'hatchback-sports', freq:3 },
      { key:'delivery',         freq:2 },
      { key:'truck',            freq:2 },
      { key:'sedan-sports',     freq:2 },
      { key:'suv-luxury',       freq:2 },
      { key:'police',           freq:1 },
      { key:'ambulance',        freq:1 },
      { key:'firetruck',        freq:1 },
      { key:'police_car',       freq:2 },
    ];
    const NPC_ROUTES = RD_POS.flatMap(r => [{ axis:'x', fixed:r }, { axis:'z', fixed:r }]);
    const NPC_BOUND = WORLD / 2 - 3;
    const npcCars   = [];
    const _npcTmpl  = {};
    let   _npcLoadIdx = 0;

    function _buildWeightedPool(defs, loaded) {
      const pool = [];
      defs.forEach(d => { if (loaded[d.key]) for (let i = 0; i < d.freq; i++) pool.push(d); });
      return pool;
    }

    function _npcPlaceModel(tmplModel) {
      const mesh  = (typeof THREE.SkeletonUtils !== 'undefined')
                      ? THREE.SkeletonUtils.clone(tmplModel)
                      : tmplModel.clone(true);
      const route = NPC_ROUTES[Math.floor(rnd() * NPC_ROUTES.length)];
      const dir   = rnd() < 0.5 ? 1 : -1;
      const t     = (rnd() * 2 - 1) * NPC_BOUND;
      const speed = 6 + rnd() * 8;  // 6–14 u/s
      if (route.axis === 'x') {
        mesh.position.set(t, 0, route.fixed + dir * 3);
        mesh.rotation.y = dir > 0 ?  Math.PI / 2 : -Math.PI / 2; // +x → face est, -x → face ouest
      } else {
        mesh.position.set(route.fixed - dir * 3, 0, t);
        mesh.rotation.y = dir > 0 ? 0 : Math.PI;
      }
      scene.add(mesh);
      npcCars.push({ mesh, route, dir, t, speed });
    }

    function _npcSpawnAll() {
      const pool = _buildWeightedPool(KENNEY_DEFS, _npcTmpl);
      if (!pool.length) { console.warn('Aucun GLB chargé — PNJ absents'); return; }
      for (let i = 0; i < 5; i++) {
        const def = pool[Math.floor(rnd() * pool.length)];
        _npcPlaceModel(_npcTmpl[def.key]);
      }
    }

    function _npcLoadNext() {
      if (_npcLoadIdx >= KENNEY_DEFS.length) { _npcSpawnAll(); return; }
      const def = KENNEY_DEFS[_npcLoadIdx++];
      _loadGLB(def.key + '.glb', m => {
        if (m) { _normalizeKenney(m, def.key); _npcTmpl[def.key] = m; }
        _npcLoadNext();
      });
    }
    _npcLoadNext(); // démarre le chargement GLB asynchrone

    // ════════════════════════════════════════
    //  VOITURE JOUEUR
    //  Type : berline rouge, mesh box simple
    //  Structure : caisse + cabine + 4 roues
    // ════════════════════════════════════════
    const CAR_L = 4.2;
    const CAR_W = 2.0;
    const CAR_H = 0.75;

    const playerCar = new THREE.Group();

    // — caisse
    const matBody = new THREE.MeshBasicMaterial({ color: 0xcc1111 });
    const bodyMesh = new THREE.Mesh(
      new THREE.BoxGeometry(CAR_W, CAR_H, CAR_L),
      matBody
    );
    bodyMesh.position.y = CAR_H / 2;
    bodyMesh.castShadow = true;
    playerCar.add(bodyMesh);

    // — cabine
    const matCabin = new THREE.MeshBasicMaterial({ color: 0xe82020 });
    const cabinMesh = new THREE.Mesh(
      new THREE.BoxGeometry(CAR_W * 0.88, CAR_H * 0.85, CAR_L * 0.52),
      matCabin
    );
    cabinMesh.position.set(0, CAR_H + (CAR_H * 0.85) / 2, -0.25);
    cabinMesh.castShadow = true;
    playerCar.add(cabinMesh);

    // — vitres (teintées sombres)
    const matGlass = new THREE.MeshBasicMaterial({ color: 0x1a2a3a, transparent: true, opacity: 0.7 });
    const windshield = new THREE.Mesh(
      new THREE.BoxGeometry(CAR_W * 0.82, CAR_H * 0.65, 0.05),
      matGlass
    );
    windshield.position.set(0, CAR_H + 0.38, -0.25 + CAR_L * 0.52 / 2 + 0.03);
    playerCar.add(windshield);

    // — phares avant (jaune clair)
    const matHead = new THREE.MeshBasicMaterial({ color: 0xffee88 });
    [-0.65, 0.65].forEach(side => {
      const h = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.2, 0.05), matHead);
      h.position.set(side, CAR_H * 0.55, CAR_L / 2 + 0.03);
      playerCar.add(h);
    });

    // — roues (cylindres noirs)
    const matWheel = new THREE.MeshBasicMaterial({ color: 0x111111 });
    const matRim   = new THREE.MeshBasicMaterial({ color: 0x888888 });
    const wheelR   = 0.34;
    const wheelW   = 0.22;
    const wheelPosArr = [
      [-CAR_W / 2 - 0.08,  wheelR,  CAR_L / 2 - 0.85],
      [ CAR_W / 2 + 0.08,  wheelR,  CAR_L / 2 - 0.85],
      [-CAR_W / 2 - 0.08,  wheelR, -CAR_L / 2 + 0.85],
      [ CAR_W / 2 + 0.08,  wheelR, -CAR_L / 2 + 0.85],
    ];
    wheelPosArr.forEach(([wx, wy, wz]) => {
      const wg = new THREE.Group();
      const tire = new THREE.Mesh(
        new THREE.CylinderGeometry(wheelR, wheelR, wheelW, 14),
        matWheel
      );
      tire.rotation.z = Math.PI / 2;
      wg.add(tire);
      const rim = new THREE.Mesh(
        new THREE.CylinderGeometry(wheelR * 0.55, wheelR * 0.55, wheelW + 0.01, 8),
        matRim
      );
      rim.rotation.z = Math.PI / 2;
      wg.add(rim);
      wg.position.set(wx, wy, wz);
      playerCar.add(wg);
    });

    playerCar.position.set(0, 0.5, 0);
    scene.add(playerCar);

    // ════════════════════════════════════════
    //  CLAVIER
    // ════════════════════════════════════════
    const keys = {};
    document.addEventListener('keydown', e => { keys[e.code] = true;  e.preventDefault(); });
    document.addEventListener('keyup',   e => { keys[e.code] = false; });

    // ════════════════════════════════════════
    //  PHYSIQUE VOITURE
    // ════════════════════════════════════════
    let carSpeed   = 0;   // unités/s
    let carAngle   = Math.PI / 2; // cap initial : face est sur route z=-28

    const MAX_FWD   = 20;
    const MAX_REV   = 8;
    const ACCEL     = 12;
    const BRAKE     = 18;
    const FRICTION  = 5;
    const TURN_SPD  = 1.9; // rad/s

    // ════════════════════════════════════════
    //  CAMÉRA 3ÈME PERSONNE
    // ════════════════════════════════════════
    let camYaw = Math.PI / 2;
    const CAM_DIST   = 11;
    const CAM_HEIGHT = 4.5;
    const CAM_SMOOTH = 0.06;

    // ════════════════════════════════════════
    //  BOUCLE PRINCIPALE
    // ════════════════════════════════════════
    const clock = new THREE.Clock();

    function update(dt) {
      // ── touches ZQSD / WASD ──
      const fwd  = keys['KeyW'] || keys['KeyZ'];
      const rev  = keys['KeyS'];
      const left = keys['KeyA'] || keys['KeyQ'];
      const rgt  = keys['KeyD'];

      // Accélération
      if (fwd) {
        carSpeed = Math.min(carSpeed + ACCEL * dt, MAX_FWD);
      } else if (rev) {
        carSpeed = Math.max(carSpeed - BRAKE * dt, -MAX_REV);
      } else {
        carSpeed *= 0.985;
        if (Math.abs(carSpeed) < 0.05) carSpeed = 0;
      }

      // Braquage (proportionnel à la vitesse)
      if (Math.abs(carSpeed) > 0.2) {
        const dir = carSpeed > 0 ? 1 : -1;
        const ts  = TURN_SPD * Math.min(Math.abs(carSpeed) / MAX_FWD, 1);
        if (left) carAngle += ts * dt * dir;
        if (rgt)  carAngle -= ts * dt * dir;
      }

      // Déplacement — sauvegarde pour roll-back collision
      const _prevX = playerCar.position.x;
      const _prevZ = playerCar.position.z;
      playerCar.position.x += Math.sin(carAngle) * carSpeed * dt;
      playerCar.position.z += Math.cos(carAngle) * carSpeed * dt;
      playerCar.rotation.y  = carAngle;

      // Limites monde
      const BOUND = WORLD / 2 - 3;
      playerCar.position.x = Math.max(-BOUND, Math.min(BOUND, playerCar.position.x));
      playerCar.position.z = Math.max(-BOUND, Math.min(BOUND, playerCar.position.z));

      // ── Collision bâtiments (push-back) ──
      for (const b of buildingBounds) {
        const dx = playerCar.position.x - b.x;
        const dz = playerCar.position.z - b.z;
        const dist = Math.sqrt(dx * dx + dz * dz);
        if (dist > 0 && dist < b.r + 1.5) {
          playerCar.position.x -= (dx / dist) * (b.r + 1.5 - dist) * 0.6;
          playerCar.position.z -= (dz / dist) * (b.r + 1.5 - dist) * 0.6;
          carSpeed *= 0.2;
        }
      }

      // ── Caméra 3ème personne ──
      camYaw += (carAngle - camYaw) * CAM_SMOOTH;
      camera.position.x = playerCar.position.x - Math.sin(camYaw) * CAM_DIST;
      camera.position.z = playerCar.position.z - Math.cos(camYaw) * CAM_DIST;
      camera.position.y = CAM_HEIGHT;
      camera.lookAt(
        playerCar.position.x,
        playerCar.position.y + 0.8,
        playerCar.position.z
      );

      // ── Feux de circulation ──
      _updateTrafficLights(dt);

      // ── PNJ ──
      npcCars.forEach((npc, idx) => {
        // Blocage : même route uniquement (même axis + même fixed)
        let tooClose = false;
        for (let j = 0; j < npcCars.length; j++) {
          if (j === idx) continue;
          const o = npcCars[j];
          if (o.route.axis !== npc.route.axis || o.route.fixed !== npc.route.fixed) continue;
          const ahead = (o.t - npc.t) * npc.dir;
          if (ahead > 0 && ahead < 10) { tooClose = true; break; }
        }
        if (tooClose) {
          npc.curSpeed = Math.max(0, (npc.curSpeed !== undefined ? npc.curSpeed : npc.speed) * 0.7);
          npc.stuckTimer = (npc.stuckTimer || 0) + dt;
          if (npc.stuckTimer >= 3) {
            npc.t = npc.dir > 0 ? -80 : 80;
            npc.stuckTimer = 0; npc.curSpeed = npc.speed;
            if (npc.route.axis === 'x') npc.mesh.position.set(npc.t, 0, npc.route.fixed);
            else                         npc.mesh.position.set(npc.route.fixed, 0, npc.t);
          }
        } else {
          npc.curSpeed = Math.min(npc.speed, (npc.curSpeed !== undefined ? npc.curSpeed : npc.speed) * 1.2);
          npc.stuckTimer = 0;
        }
        // Arrêt aux intersections selon phase du feu
        if (RD_POS.some(r => Math.abs(npc.t - r) < 8) && Math.sin(Date.now() * 0.001 + idx) > 0) return;
        // Position candidate
        const newT = npc.t + npc.dir * npc.curSpeed * dt;
        // Déplacement validé + rebouclage
        npc.t = newT;
        if (npc.t >  NPC_BOUND) npc.t -= NPC_BOUND * 2;
        if (npc.t < -NPC_BOUND) npc.t += NPC_BOUND * 2;
        if (npc.route.axis === 'x') {
          npc.mesh.position.x = npc.t;
          npc.mesh.position.z = npc.route.fixed;
        } else {
          npc.mesh.position.z = npc.t;
          npc.mesh.position.x = npc.route.fixed;
        }
      });

      // ── HUD vitesse (km/h) ──
      document.getElementById('speed-display').textContent =
        Math.abs(Math.round(carSpeed * 3.6));
    }

    // ════════════════════════════════════════
    //  MINIMAP
    // ════════════════════════════════════════
    const mmCanvas = document.getElementById('minimap');
    const mmCtx = mmCanvas.getContext('2d');
    const MM_S = 160 / WORLD; // px per world unit
    function _mm(wx, wz) { return [wx * MM_S + 80, wz * MM_S + 80]; }

    function _drawMapContent(ctx, w, h, scale) {
      const cx = w/2, cy = h/2;
      // Routes
      ctx.strokeStyle = '#666'; ctx.lineWidth = 3;
      RD_POS.forEach(r => {
        const rp = r * scale + cx;
        ctx.beginPath(); ctx.moveTo(0, rp); ctx.lineTo(w, rp); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(rp, 0); ctx.lineTo(rp, h); ctx.stroke();
      });
      // Bâtiments
      buildingBounds.forEach(b => {
        ctx.fillStyle = (Math.abs(b.x)>90 || Math.abs(b.z)>90) ? '#555555' : '#8B7355';
        const mx = b.x * scale + cx, mz = b.z * scale + cy;
        const r = Math.max(2, (b.r||6)*scale);
        ctx.fillRect(mx - r, mz - r, r*2, r*2);
      });
      // Joueur — triangle directionnel
      const px = playerCar.position.x * scale + cx;
      const pz = playerCar.position.z * scale + cy;
      ctx.save();
      ctx.translate(px, pz); ctx.rotate(-playerCar.rotation.y);
      ctx.fillStyle = '#FF0000';
      ctx.beginPath(); ctx.moveTo(0, -8); ctx.lineTo(5, 6); ctx.lineTo(-5, 6);
      ctx.closePath(); ctx.fill();
      ctx.restore();
    }

    function drawMinimap() {
      const w = mmCanvas.width, h = mmCanvas.height, cx = w/2, cy = h/2;
      const scale = w / 200;
      mmCtx.clearRect(0, 0, w, h);
      mmCtx.save();
      mmCtx.beginPath(); mmCtx.arc(cx, cy, cx-1, 0, Math.PI*2);
      mmCtx.fillStyle = 'rgba(0,0,0,0.75)'; mmCtx.fill();
      mmCtx.clip();
      _drawMapContent(mmCtx, w, h, scale);
      mmCtx.restore();
    }

    function drawMissionRoute(waypoints) {
      // Tracé itinéraire mission en jaune #FFD700 — inactif pour l'instant
    }

    // ── Touches minimap ──
    const _mmLabels = document.getElementById('mm-labels');
    document.addEventListener('keydown', e => {
      if (e.code === 'KeyK') {
        mmCanvas.width=160; mmCanvas.height=160;
        mmCanvas.style.width='160px'; mmCanvas.style.height='160px'; mmCanvas.style.borderRadius='50%';
        _mmLabels.style.bottom='184px';
      } else if (e.code === 'KeyY') {
        mmCanvas.width=280; mmCanvas.height=280;
        mmCanvas.style.width='280px'; mmCanvas.style.height='280px'; mmCanvas.style.borderRadius='50%';
        _mmLabels.style.bottom='304px';
      } else if (e.code === 'KeyI') {
        mmCanvas.width=400; mmCanvas.height=400;
        mmCanvas.style.width='400px'; mmCanvas.style.height='400px'; mmCanvas.style.borderRadius='50%';
        _mmLabels.style.bottom='424px';
      } else if (e.key === 'm' || e.key === 'M') {
        _mapDiv.style.display = _mapDiv.style.display === 'none' ? 'block' : 'none';
      }
    });

    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.min(clock.getDelta(), 0.05);
      update(dt);
      renderer.render(scene, camera);
      drawMinimap();
      if(typeof _mapDiv!=='undefined' && _mapDiv.style.display==='block'){
        _mapCam.position.set(playerCar.position.x, 80, playerCar.position.z);
        _mapCam.lookAt(playerCar.position.x, 0, playerCar.position.z);
        const _bg = scene.background; scene.background = new THREE.Color(0x1a1a2e);
        _mapRenderer.render(scene, _mapCam);
        scene.background = _bg;
        _mapCtx.clearRect(0,0,660,660);
        _drawGrid();
        const _px = 330;
        const _pz = 330;
        _mapCtx.save();
        _mapCtx.translate(_px,_pz);
        _mapCtx.rotate(-playerCar.rotation.y);
        _mapCtx.shadowColor='#FF3300';
        _mapCtx.shadowBlur=12;
        _mapCtx.beginPath();
        _mapCtx.moveTo(0,-11);
        _mapCtx.lineTo(7,9);
        _mapCtx.lineTo(-7,9);
        _mapCtx.closePath();
        _mapCtx.fillStyle='#FF3300';
        _mapCtx.fill();
        _mapCtx.restore();
      }
    }
    animate();

    // ════════════════════════════════════════
    //  RESIZE
    // ════════════════════════════════════════
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
