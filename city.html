<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Road Rage City</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; }
  body { background: #222; overflow: hidden; }
  canvas { display: block; }
  #hud {
    position: fixed; top: 16px; left: 16px;
    color: #fff; font-family: 'Courier New', monospace;
    font-size: 13px; text-shadow: 1px 1px 3px #000;
    pointer-events: none; user-select: none; z-index: 10;
  }
  #hud .label { opacity: 0.85; }
  #hud .value { font-weight: bold; font-size: 20px; }
  #speed-wrap { margin-top: 6px; }
  #minimap {
    position: fixed; bottom: 16px; left: 16px;
    width: 160px; height: 160px;
    border-radius: 50%; border: 2px solid #fff;
    pointer-events: none; z-index: 10;
  }
  #err {
    position: fixed; top: 0; left: 0; right: 0;
    padding: 8px 12px; background: #b00020; color: #fff;
    font: 12px/1.4 monospace; z-index: 10000;
    white-space: pre-wrap; display: none;
  }
</style>
</head>
<body>
  <div id="hud">
    <div class="label">ZQSD / WASD - conduire</div>
    <div id="speed-wrap"><span class="label">Vitesse : </span><span class="value" id="speed">0</span><span class="label"> km/h</span></div>
  </div>
  <canvas id="minimap" width="160" height="160"></canvas>
  <div id="err"></div>

  <script>
    window.addEventListener('error', function(e) {
      var d = document.getElementById('err');
      if (d) {
        d.style.display = 'block';
        d.textContent = 'JS error: ' + (e.message || e.error) + ' @ ' + (e.filename || '?') + ':' + (e.lineno || '?');
      }
    });
  </script>
  <script crossorigin="anonymous" src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script crossorigin="anonymous" src="https://unpkg.com/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <script>
  (function() {
    if (typeof THREE === 'undefined') {
      var d = document.getElementById('err');
      if (d) { d.style.display = 'block'; d.textContent = 'Three.js non charge - CDN bloque? Essaie un autre reseau.'; }
      return;
    }
    // Verifie WebGL
    (function() {
      try {
        var c = document.createElement('canvas');
        if (!c.getContext('webgl') && !c.getContext('experimental-webgl')) throw 1;
      } catch(e) {
        var d = document.getElementById('err');
        if (d) { d.style.display = 'block'; d.textContent = 'WebGL non disponible sur ce navigateur.'; }
        return;
      }
    })();

    // SCENE
    var scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb);

    // CAMERA
    var camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 600);
    camera.position.set(0, 15, -45);
    camera.lookAt(0, 0, 0);

    // RENDERER
    var renderer = new THREE.WebGLRenderer({ antialias: false });
    renderer.setPixelRatio(1);
    renderer.setSize(window.innerWidth || 1024, window.innerHeight || 768);
    renderer.setClearColor(0x87ceeb);
    document.body.appendChild(renderer.domElement);

    // LIGHTS
    var ambient = new THREE.AmbientLight(0xffffff, 3.0);
    scene.add(ambient);
    var sun = new THREE.DirectionalLight(0xffffff, 2.0);
    sun.position.set(200, 400, 200);
    sun.castShadow = false;
    scene.add(sun);
    var fill = new THREE.DirectionalLight(0xffffff, 1.0);
    fill.position.set(-200, 200, -200);
    scene.add(fill);

    // GROUND
    var ground = new THREE.Mesh(
      new THREE.PlaneGeometry(500, 500),
      new THREE.MeshLambertMaterial({ color: 0x444444 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    scene.add(ground);

    // ROADS
    var ROADS = [-120, -80, -40, 0, 40, 80, 120];
    var ROAD_W = 10;
    var ROAD_LEN = 280;
    var roadMat = new THREE.MeshLambertMaterial({ color: 0x222222 });
    var lineMat = new THREE.MeshBasicMaterial({ color: 0xFFDD00 });
    var sidewalkMat = new THREE.MeshLambertMaterial({ color: 0xcccccc });

    ROADS.forEach(function(z) {
      var r = new THREE.Mesh(new THREE.PlaneGeometry(ROAD_LEN, ROAD_W), roadMat);
      r.rotation.x = -Math.PI / 2;
      r.position.set(0, 0.01, z);
      scene.add(r);
      [-1, 1].forEach(function(s) {
        var sw = new THREE.Mesh(new THREE.PlaneGeometry(ROAD_LEN, 2), sidewalkMat);
        sw.rotation.x = -Math.PI / 2;
        sw.position.set(0, 0.02, z + s * (ROAD_W / 2 + 1));
        scene.add(sw);
      });
      for (var x = -130; x < 130; x += 8) {
        var dash = new THREE.Mesh(new THREE.PlaneGeometry(3, 0.25), lineMat);
        dash.rotation.x = -Math.PI / 2;
        dash.position.set(x, 0.05, z);
        scene.add(dash);
      }
    });

    ROADS.forEach(function(x) {
      var r = new THREE.Mesh(new THREE.PlaneGeometry(ROAD_W, ROAD_LEN), roadMat);
      r.rotation.x = -Math.PI / 2;
      r.position.set(x, 0.01, 0);
      scene.add(r);
      [-1, 1].forEach(function(s) {
        var sw = new THREE.Mesh(new THREE.PlaneGeometry(2, ROAD_LEN), sidewalkMat);
        sw.rotation.x = -Math.PI / 2;
        sw.position.set(x + s * (ROAD_W / 2 + 1), 0.02, 0);
        scene.add(sw);
      });
      for (var z = -130; z < 130; z += 8) {
        var dash = new THREE.Mesh(new THREE.PlaneGeometry(0.25, 3), lineMat);
        dash.rotation.x = -Math.PI / 2;
        dash.position.set(x, 0.05, z);
        scene.add(dash);
      }
    });

    // CAR
    var car = new THREE.Group();
    var bodyMat = new THREE.MeshLambertMaterial({ color: 0xcc0000 });
    var roofMat = new THREE.MeshLambertMaterial({ color: 0xaa0000 });
    var wheelMat = new THREE.MeshLambertMaterial({ color: 0x111111 });

    var body = new THREE.Mesh(new THREE.BoxGeometry(2, 0.6, 4), bodyMat);
    body.position.y = 0.5;
    car.add(body);

    var roof = new THREE.Mesh(new THREE.BoxGeometry(1.7, 0.5, 2.2), roofMat);
    roof.position.set(0, 1.05, -0.3);
    car.add(roof);

    [[-0.95, -1.3], [0.95, -1.3], [-0.95, 1.3], [0.95, 1.3]].forEach(function(p) {
      var w = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.35, 0.3, 16), wheelMat);
      w.rotation.z = Math.PI / 2;
      w.position.set(p[0], 0.35, p[1]);
      car.add(w);
    });

    car.position.set(0, 0.5, -30);
    scene.add(car);

    // INPUT
    var keys = {};
    document.addEventListener('keydown', function(e) { keys[e.code] = true; });
    document.addEventListener('keyup', function(e) { keys[e.code] = false; });

    // PHYSICS
    var speed = 0;
    var angle = 0;
    var MAX_SPEED = 60;
    var MAX_REV = 25;
    var ACCEL = 25;
    var BRAKE = 40;
    var TURN_SPEED = 1.8;
    var CAM_DIST = 12;
    var CAM_HEIGHT = 5;
    var camYaw = angle;

    function update(dt) {
      var fwd = keys['KeyW'] || keys['KeyZ'];
      var rev = keys['KeyS'];
      var lf = keys['KeyA'] || keys['KeyQ'];
      var rg = keys['KeyD'];

      if (fwd) {
        speed = Math.min(speed + ACCEL * dt, MAX_SPEED);
      } else if (rev) {
        speed = Math.max(speed - BRAKE * dt, -MAX_REV);
      } else {
        speed *= Math.exp(-0.5 * dt);
        if (Math.abs(speed) < 0.05) speed = 0;
      }

      if (Math.abs(speed) > 0.2) {
        var dir = speed > 0 ? 1 : -1;
        var ts = TURN_SPEED * Math.min(Math.abs(speed) / MAX_SPEED + 0.4, 1);
        if (lf) angle += ts * dt * dir;
        if (rg) angle -= ts * dt * dir;
      }

      car.position.x += Math.sin(angle) * speed * dt;
      car.position.z += Math.cos(angle) * speed * dt;
      car.rotation.y = angle;

      var B = 240;
      car.position.x = Math.max(-B, Math.min(B, car.position.x));
      car.position.z = Math.max(-B, Math.min(B, car.position.z));

      // Collisions AABB
      for (var bi = 0; bi < buildingBounds.length; bi++) {
        var b = buildingBounds[bi];
        var hw = b.hw || 4, hd = b.hd || 4, mg = 1.0;
        if (car.position.x > b.x-hw-mg && car.position.x < b.x+hw+mg &&
            car.position.z > b.z-hd-mg && car.position.z < b.z+hd+mg) {
          var oL = (b.x-hw-mg) - car.position.x;
          var oR = car.position.x - (b.x+hw+mg);
          var oF = (b.z-hd-mg) - car.position.z;
          var oB = car.position.z - (b.z+hd+mg);
          var mn = Math.max(oL, oR, oF, oB);
          if (mn === oL)      car.position.x = b.x-hw-mg;
          else if (mn === oR) car.position.x = b.x+hw+mg;
          else if (mn === oF) car.position.z = b.z-hd-mg;
          else                car.position.z = b.z+hd+mg;
          speed *= -0.2;
        }
      }

      camYaw += (angle - camYaw) * 0.08;
      camera.position.x = car.position.x - Math.sin(camYaw) * CAM_DIST;
      camera.position.z = car.position.z - Math.cos(camYaw) * CAM_DIST;
      camera.position.y = CAM_HEIGHT;
      camera.lookAt(car.position.x, car.position.y + 1, car.position.z);

      var sd = document.getElementById('speed');
      if (sd) sd.textContent = Math.abs(Math.round(speed * 3.6));

      updateNPCs(dt);
    }

    // MINIMAP
    var mm = document.getElementById('minimap');
    var mmCtx = mm.getContext('2d');

    function drawMinimap() {
      var w = mm.width, h = mm.height;
      var scale = w / 500;
      mmCtx.clearRect(0, 0, w, h);
      mmCtx.save();
      mmCtx.beginPath();
      mmCtx.arc(w / 2, h / 2, w / 2 - 2, 0, Math.PI * 2);
      mmCtx.fillStyle = 'rgba(20,20,20,0.85)';
      mmCtx.fill();
      mmCtx.clip();
      mmCtx.strokeStyle = '#666';
      mmCtx.lineWidth = 3;
      ROADS.forEach(function(r) {
        var p = r * scale + w / 2;
        mmCtx.beginPath();
        mmCtx.moveTo(0, p);
        mmCtx.lineTo(w, p);
        mmCtx.stroke();
        mmCtx.beginPath();
        mmCtx.moveTo(p, 0);
        mmCtx.lineTo(p, h);
        mmCtx.stroke();
      });
      var px = car.position.x * scale + w / 2;
      var pz = car.position.z * scale + h / 2;
      mmCtx.save();
      mmCtx.translate(px, pz);
      mmCtx.rotate(-car.rotation.y);
      mmCtx.fillStyle = '#FF2200';
      mmCtx.beginPath();
      mmCtx.moveTo(0, -8);
      mmCtx.lineTo(6, 6);
      mmCtx.lineTo(-6, 6);
      mmCtx.closePath();
      mmCtx.fill();
      mmCtx.restore();
      mmCtx.restore();
    }

    // BUILDINGS
    var buildingBounds = [];
    var _gloader = null;
    function _getLoader() {
      if (_gloader) return _gloader;
      try { _gloader = new THREE.GLTFLoader(); } catch (e) { return null; }
      return _gloader;
    }
    function loadBuilding(url, bx, bz, sx, sy, sz, rotY) {
      // Fallback box couleurs vives selon type
      var fc = url.indexOf('skyscraper') >= 0 ? 0x4a90e2 :
               url.indexOf('building-type') >= 0 ? 0xe28b4a :
               url.indexOf('lightPost') >= 0 ? 0x222222 :
               url.indexOf('tree') >= 0 ? 0x2d5a2d :
               url.indexOf('traffic') >= 0 ? 0x333333 :
               url.indexOf('building-') >= 0 ? 0xc44a4a :
               0xaaaaaa;
      var fbW = Math.max(sx, 1) * 0.9;
      var fbH = Math.max(sy, 1) * 1.0;
      var fbD = Math.max(sz, 1) * 0.9;
      var fb = new THREE.Mesh(
        new THREE.BoxGeometry(fbW, fbH, fbD),
        new THREE.MeshLambertMaterial({ color: fc })
      );
      fb.position.set(bx, fbH / 2, bz);
      fb.rotation.y = rotY;
      scene.add(fb);
      buildingBounds.push({
        x: bx, z: bz,
        hw: fbW / 2 + 0.5,
        hd: fbD / 2 + 0.5
      });

      var loader = _getLoader();
      if (!loader) return;
      loader.load(url, function (gltf) {
        try {
          var g = gltf.scene;
          // Ne TOUCHE PAS aux materiaux : le GLTFLoader applique correctement
          // le PBR + texture + KHR_texture_transform + doubleSided des GLB Kenney.
          // Les modifications precedentes cassaient le rendu (FrontSide cachait les
          // faces internes des batiments aux normales inversees).
          g.scale.set(sx, sy, sz);
          g.rotation.y = rotY;
          scene.add(g);
          var box = new THREE.Box3().setFromObject(g);
          g.position.set(bx, -box.min.y + 0.05, bz);
          scene.remove(fb);
        } catch (e) {
          console.error('GLB onLoad error for', url, e);
        }
      }, undefined, function (err) {
        console.warn('GLB load fail:', url);
      });
    }

    function isSafe(x, z) {
      return ![-120,-80,-40,0,40,80,120].some(function (r) { return Math.abs(x - r) < 8 || Math.abs(z - r) < 8; });
    }

    function createDowntown() {
      const BASE = 'https://nbakflorent-eng.github.io/road-rage-city-CITY-/';
      const skyB = ['building-skyscraper-a.glb','building-skyscraper-b.glb','building-skyscraper-c.glb','building-skyscraper-d.glb','building-skyscraper-e.glb'];
      const skyY = [9, 11, 8, 10, 7];
      const midB = ['building-a.glb','building-b.glb','building-c.glb','building-d.glb','building-e.glb','building-f.glb','building-g.glb','building-h.glb'];
      const midY = [6, 7, 5, 6];
      const islandCenters = [-100,-60,-20,20,60,100];
      let si = 0, mi = 0;
      for (const cx of islandCenters) {
        for (const cz of islandCenters) {
          if (Math.abs(cx) > 60 || Math.abs(cz) > 60) continue;
          const ry = Math.abs(cx) >= Math.abs(cz) ? (cx>0 ? -Math.PI/2 : Math.PI/2) : (cz>0 ? Math.PI : 0);
          // 4 batiments aux coins de chaque ilot (mix gratte-ciels + immeubles)
          const corners = [[cx-7,cz-7],[cx+7,cz-7],[cx-7,cz+7],[cx+7,cz+7]];
          for (let k = 0; k < corners.length; k++) {
            const [bx, bz] = corners[k];
            if (!isSafe(bx, bz)) continue;
            const useSky = (k % 2 === 0);
            if (useSky) {
              loadBuilding(BASE + skyB[si%5], bx, bz, 4, skyY[si%5], 4, ry);
              si++;
            } else {
              loadBuilding(BASE + midB[mi%8], bx, bz, 3, midY[mi%4], 3, ry);
              mi++;
            }
          }
          if (isSafe(cx, cz)) loadBuilding(BASE + 'tree_oak.glb', cx, cz, 2.5, 2.5, 2.5, 0);
        }
      }
      // Feux tricolores aux 4 coins des 9 grandes intersections du centre
      const majorAxes = [-40, 0, 40];
      for (const rx of majorAxes) {
        for (const rz of majorAxes) {
          const corners = [[rx+7,rz+7],[rx-7,rz+7],[rx+7,rz-7],[rx-7,rz-7]];
          for (const [lx, lz] of corners) {
            loadBuilding(BASE + 'detail-light-traffic.glb', lx, lz, 2.5, 2.5, 2.5, 0);
          }
        }
      }
      // Lampadaires aux autres intersections
      const allAxes = [-120,-80,-40,0,40,80,120];
      for (const rx of allAxes) {
        for (const rz of allAxes) {
          if (Math.abs(rx) <= 40 && Math.abs(rz) <= 40) continue; // deja des feux
          const corners = [[rx+7,rz+7],[rx-7,rz+7],[rx+7,rz-7],[rx-7,rz-7]];
          for (const [lx, lz] of corners) {
            loadBuilding(BASE + 'lightPostModern.glb', lx, lz, 1.2, 3, 1.2, 0);
          }
        }
      }
    }

    function createMidtown() {
      const BASE = 'https://nbakflorent-eng.github.io/road-rage-city-CITY-/';
      const midB = ['building-a.glb','building-b.glb','building-c.glb','building-d.glb','building-e.glb','building-f.glb','building-g.glb','building-h.glb','building-i.glb','building-j.glb','building-k.glb','building-l.glb','building-m.glb','building-n.glb','building-o.glb','building-p.glb','building-q.glb','building-r.glb','building-s.glb'];
      const midY = [5, 6, 4, 7];
      const houseB = ['building-type-a.glb','building-type-b.glb','building-type-c.glb','building-type-d.glb','building-type-e.glb','building-type-f.glb'];
      const treeB = ['tree_oak.glb','tree-large.glb','tree_fat.glb'];
      const centers = [-100,-60,-20,20,60,100];
      let mi = 0, hi = 0, ti = 0;
      for (const cx of centers) {
        for (const cz of centers) {
          const inMid = (Math.abs(cx) > 60 || Math.abs(cz) > 60) && Math.abs(cx) <= 100 && Math.abs(cz) <= 100;
          if (!inMid) continue;
          const ry = Math.abs(cx) >= Math.abs(cz) ? (cx>0 ? -Math.PI/2 : Math.PI/2) : (cz>0 ? Math.PI : 0);
          // 2 immeubles + 1 maison par ilot (mix midtown)
          const corners = [[cx-7, cz-7],[cx+7, cz+7],[cx+7, cz-7]];
          for (let k = 0; k < corners.length; k++) {
            const [bx, bz] = corners[k];
            if (!isSafe(bx, bz)) continue;
            if (k < 2) {
              loadBuilding(BASE + midB[mi%19], bx, bz, 3, midY[mi%4], 3, ry);
              mi++;
            } else {
              loadBuilding(BASE + houseB[hi%6], bx, bz, 2.5, 2.5, 2.5, ry);
              hi++;
            }
          }
          // 1 arbre dans le coin libre
          const tx = cx - 7, tz = cz + 7;
          if (isSafe(tx, tz)) { loadBuilding(BASE + treeB[ti%3], tx, tz, 2.5, 2.5, 2.5, 0); ti++; }
        }
      }
    }

    function createSuburbs() {
      const BASE = 'https://nbakflorent-eng.github.io/road-rage-city-CITY-/';
      const houseB = ['building-type-a.glb','building-type-b.glb','building-type-c.glb','building-type-d.glb','building-type-e.glb','building-type-f.glb','building-type-g.glb','building-type-h.glb','building-type-i.glb','building-type-j.glb','building-type-k.glb','building-type-l.glb','building-type-m.glb','building-type-n.glb','building-type-o.glb','building-type-p.glb','building-type-q.glb','building-type-r.glb','building-type-s.glb'];
      const treeB = ['tree_oak.glb','tree-large.glb','tree_fat.glb','tree_tall.glb'];
      // Etend la grille pour peupler la banlieue (au-dela de la grille routiere centrale)
      const centers = [-140,-100,-60,-20,20,60,100,140];
      let hi = 0, ti = 0;
      for (const cx of centers) {
        for (const cz of centers) {
          // Banlieue = ilots dont au moins une coord depasse 100 (ou exactement 140)
          if (Math.abs(cx) <= 100 && Math.abs(cz) <= 100) continue;
          const ry = Math.abs(cx) >= Math.abs(cz) ? (cx>0 ? -Math.PI/2 : Math.PI/2) : (cz>0 ? Math.PI : 0);
          // 4 maisons aux coins de chaque ilot
          const corners = [[cx-7,cz-7],[cx+7,cz-7],[cx-7,cz+7],[cx+7,cz+7]];
          for (const [bx, bz] of corners) {
            if (isSafe(bx, bz)) { loadBuilding(BASE + houseB[hi%19], bx, bz, 2.5, 2.5, 2.5, ry); hi++; }
          }
          // 1 arbre au centre de l'ilot
          if (isSafe(cx, cz)) { loadBuilding(BASE + treeB[ti%4], cx, cz, 2.5, 2.5, 2.5, 0); ti++; }
        }
      }
    }

    // NPC CARS — circulation procedurale sur les routes
    var npcCars = [];
    function _makeNpcCar(color) {
      var g = new THREE.Group();
      var dark = ((color & 0xfefefe) >> 1);
      var b = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.5, 3.5), new THREE.MeshLambertMaterial({ color: color }));
      b.position.y = 0.45; g.add(b);
      var r = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.4, 1.8), new THREE.MeshLambertMaterial({ color: dark }));
      r.position.set(0, 0.85, -0.2); g.add(r);
      [[-0.85,-1.2],[0.85,-1.2],[-0.85,1.2],[0.85,1.2]].forEach(function (p) {
        var w = new THREE.Mesh(new THREE.CylinderGeometry(0.28, 0.28, 0.22, 12), new THREE.MeshLambertMaterial({ color: 0x111111 }));
        w.rotation.z = Math.PI/2;
        w.position.set(p[0], 0.28, p[1]);
        g.add(w);
      });
      return g;
    }
    function spawnNPCs() {
      var COLORS = [0x2266cc, 0x22aa66, 0xeeaa22, 0x9966cc, 0xcc4422, 0xeeeeee, 0x222266];
      var ROADS = [-120,-80,-40,0,40,80,120];
      // Sur chaque route horizontale (axe z), 2 voitures chacune (1 par sens, decalees)
      ROADS.forEach(function (z, idx) {
        for (var k = 0; k < 2; k++) {
          var c = _makeNpcCar(COLORS[(idx*2+k) % COLORS.length]);
          var dir = (k === 0) ? 1 : -1;
          var lane = (k === 0) ? 2.2 : -2.2; // voie droite/gauche
          c.position.set(-130 + (idx*40 + k*60) % 240, 0.35, z + lane);
          c.rotation.y = dir > 0 ? Math.PI/2 : -Math.PI/2;
          scene.add(c);
          npcCars.push({ mesh: c, axis: 'x', dir: dir, speed: 9 + Math.random()*4 });
        }
      });
      // Sur chaque route verticale (axe x), 2 voitures
      ROADS.forEach(function (x, idx) {
        for (var k = 0; k < 2; k++) {
          var c = _makeNpcCar(COLORS[(idx*2+k+3) % COLORS.length]);
          var dir = (k === 0) ? 1 : -1;
          var lane = (k === 0) ? 2.2 : -2.2;
          c.position.set(x + lane, 0.35, -130 + (idx*40 + k*60) % 240);
          c.rotation.y = dir > 0 ? 0 : Math.PI;
          scene.add(c);
          npcCars.push({ mesh: c, axis: 'z', dir: dir, speed: 9 + Math.random()*4 });
        }
      });
    }
    function updateNPCs(dt) {
      for (var i = 0; i < npcCars.length; i++) {
        var n = npcCars[i];
        if (n.axis === 'x') {
          n.mesh.position.x += n.dir * n.speed * dt;
          if (n.mesh.position.x > 140) n.mesh.position.x = -140;
          else if (n.mesh.position.x < -140) n.mesh.position.x = 140;
        } else {
          n.mesh.position.z += n.dir * n.speed * dt;
          if (n.mesh.position.z > 140) n.mesh.position.z = -140;
          else if (n.mesh.position.z < -140) n.mesh.position.z = 140;
        }
      }
    }

    function init() {
      buildingBounds = [];
      try { createDowntown(); } catch (e) { console.error('downtown:', e); }
      try { createMidtown(); } catch (e) { console.error('midtown:', e); }
      try { createSuburbs(); } catch (e) { console.error('suburbs:', e); }
      try { spawnNPCs(); } catch (e) { console.error('npc:', e); }
    }
    init();

    // LOOP
    var clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);
      var dt = Math.min(clock.getDelta(), 0.05);
      try { update(dt); } catch (e) { console.error('update:', e); }
      try { renderer.render(scene, camera); } catch (e) { console.error('render:', e); }
      try { drawMinimap(); } catch (e) { console.error('mm:', e); }
    }
    animate();

    // RESIZE
    window.addEventListener('resize', function() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  })();
  </script>
</body>
</html>
