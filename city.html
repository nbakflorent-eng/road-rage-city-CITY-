<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Road Rage City</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }
    #hud {
      position: fixed;
      top: 16px;
      left: 16px;
      color: #fff;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      text-shadow: 1px 1px 3px #000;
      pointer-events: none;
      user-select: none;
    }
    #hud .label { opacity: 0.7; }
    #hud .value { font-weight: bold; font-size: 16px; }
    #speed-wrap { margin-top: 6px; }
  </style>
</head>
<body>
  <div id="hud">
    <div class="label">ZQSD / WASD — conduire</div>
    <div id="speed-wrap">
      <span class="label">Vitesse : </span>
      <span class="value" id="speed-display">0</span>
      <span class="label"> km/h</span>
    </div>
  </div>

  <!-- Three.js r128 CDN + Loaders -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/FBXLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/libs/fflate.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/utils/SkeletonUtils.js"></script>


  <script>
    // ════════════════════════════════════════
    //  SCENE
    // ════════════════════════════════════════
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB); // ciel bleu
    scene.fog = new THREE.Fog(0x87CEEB, 90, 220);

    const camera = new THREE.PerspectiveCamera(
      60, window.innerWidth / window.innerHeight, 0.1, 500
    );

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.BasicShadowMap;
    document.body.appendChild(renderer.domElement);

    // ════════════════════════════════════════
    //  LUMIÈRES
    // ════════════════════════════════════════
    const sunLight = new THREE.DirectionalLight(0xfff8e7, 1.3);
    sunLight.position.set(60, 100, 40);
    sunLight.castShadow = true;
    sunLight.shadow.mapSize.set(512, 512);
    sunLight.shadow.camera.near   = 1;
    sunLight.shadow.camera.far    = 300;
    sunLight.shadow.camera.left   = -80;
    sunLight.shadow.camera.right  =  80;
    sunLight.shadow.camera.top    =  80;
    sunLight.shadow.camera.bottom = -80;
    scene.add(sunLight);

    const ambientLight = new THREE.AmbientLight(0x8899bb, 0.65);
    scene.add(ambientLight);

    // ════════════════════════════════════════
    //  CONSTANTES WORLD
    // ════════════════════════════════════════
    const WORLD    = 400;   // taille totale du sol
    const RD_W     = 13;    // largeur route
    const SW_W     = 2.8;   // largeur trottoir
    const RD_POS   = [-60, -20, 20, 60]; // positions des axes (4H + 4V)
    const NPC_BASE = 'https://nbakflorent-eng.github.io/road-rage-city-CITY-/';

    // ════════════════════════════════════════
    //  MATÉRIAUX
    // ════════════════════════════════════════
    const matGrass    = new THREE.MeshLambertMaterial({ color: 0x4a7c3f });
    const matAsphalt  = new THREE.MeshLambertMaterial({ color: 0x2e2e2e });
    const matSidewalk = new THREE.MeshLambertMaterial({ color: 0xc0bfba });
    const matYellow   = new THREE.MeshLambertMaterial({ color: 0xf5c518 });
    const matWhite    = new THREE.MeshLambertMaterial({ color: 0xffffff });

    // ────────────────────────────────────────
    //  SOL (herbe / asphalte de base)
    // ────────────────────────────────────────
    const groundMesh = new THREE.Mesh(
      new THREE.PlaneGeometry(WORLD, WORLD),
      matGrass
    );
    groundMesh.rotation.x = -Math.PI / 2;
    groundMesh.receiveShadow = true;
    scene.add(groundMesh);

    // ────────────────────────────────────────
    //  Helpers de création de plans
    // ────────────────────────────────────────
    function makePlane(mat, x, z, w, d, y = 0.01) {
      const m = new THREE.Mesh(new THREE.PlaneGeometry(w, d), mat);
      m.rotation.x = -Math.PI / 2;
      m.position.set(x, y, z);
      m.receiveShadow = true;
      scene.add(m);
      return m;
    }

    // ────────────────────────────────────────
    //  ROUTES
    //  2 horizontales (axe X, constante en Z)
    //  2 verticales   (axe Z, constante en X)
    // ────────────────────────────────────────
    RD_POS.forEach(rz => makePlane(matAsphalt, 0,  rz, WORLD,  RD_W, 0.02)); // horiz
    RD_POS.forEach(rx => makePlane(matAsphalt, rx, 0,  RD_W, WORLD,  0.02)); // vert

    // ────────────────────────────────────────
    //  INTERSECTIONS (carrés asphalte)
    // ────────────────────────────────────────
    RD_POS.forEach(rx =>
      RD_POS.forEach(rz =>
        makePlane(matAsphalt, rx, rz, RD_W, RD_W, 0.025)
      )
    );

    // ────────────────────────────────────────
    //  TROTTOIRS blancs
    // ────────────────────────────────────────
    RD_POS.forEach(rz => {
      [-1, 1].forEach(s =>
        makePlane(matSidewalk, 0, rz + s * (RD_W / 2 + SW_W / 2), WORLD, SW_W, 0.03)
      );
    });
    RD_POS.forEach(rx => {
      [-1, 1].forEach(s =>
        makePlane(matSidewalk, rx + s * (RD_W / 2 + SW_W / 2), 0, SW_W, WORLD, 0.03)
      );
    });

    // ────────────────────────────────────────
    //  LIGNES JAUNES DISCONTINUES (axe centre)
    // ────────────────────────────────────────
    const DASH_L = 3.0;
    const DASH_G = 2.8;
    const DASH_W = 0.18;
    const STEP   = DASH_L + DASH_G;

    function makeDashes(axis, fixedCoord) {
      const count = Math.floor(WORLD / STEP);
      const start = -WORLD / 2 + DASH_L / 2;
      for (let i = 0; i < count; i++) {
        const t = start + i * STEP;
        const bx = axis === 'x' ? DASH_L : DASH_W;
        const bz = axis === 'x' ? DASH_W  : DASH_L;
        const mesh = new THREE.Mesh(
          new THREE.BoxGeometry(bx, 0.005, bz),
          matYellow
        );
        mesh.position.set(
          axis === 'x' ? t          : fixedCoord,
          0.04,
          axis === 'x' ? fixedCoord : t
        );
        scene.add(mesh);
      }
    }

    RD_POS.forEach(rz => makeDashes('x', rz));
    RD_POS.forEach(rx => makeDashes('z', rx));

    // ════════════════════════════════════════
    //  DÉCOR URBAIN — BÂTIMENTS, ARBRES, LAMPADAIRES
    // ════════════════════════════════════════

    // ── Pseudo-random déterministe (seed fixe → ville identique à chaque chargement) ──
    let _s = 31337;
    function rnd()    { _s = (_s * 1664525 + 1013904223) >>> 0; return _s / 4294967296; }
    function rr(a, b) { return a + rnd() * (b - a); }
    function ri(a, b) { return a + Math.floor(rnd() * (b - a + 1)); }

    // ── Palette façades ──
    const FACADE_PAL = [
      0xd4c9a8, 0xbfc4c8, 0xf2f0ec, 0x9b8b7a,
      0xb8c9d4, 0xc8b89a, 0xb0b8c0, 0xe0d5b5,
      0x7a8c9a, 0xc4b090, 0xe8e0d4, 0xaab8a8,
    ];

    // ── Texture fenêtres (canvas par bâtiment) ──
    function makeWinTex(cols, rows) {
      const cw = 28, ch = 20;
      const cv = document.createElement('canvas');
      cv.width  = cols * cw;
      cv.height = rows * ch;
      const ctx = cv.getContext('2d');
      ctx.fillStyle = '#5a5a5a';
      ctx.fillRect(0, 0, cv.width, cv.height);
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          ctx.fillStyle = rnd() < 0.58 ? '#ffe898' : '#192231';
          ctx.fillRect(c * cw + 3, r * ch + 3, cw - 6, ch - 6);
        }
      }
      return new THREE.CanvasTexture(cv);
    }

    // ── Créer un bâtiment ──
    // type 0 = résidentiel (1-2 ét.), 1 = commerce (3-5 ét.), 2 = downtown (10-30 ét.)
    const buildingBounds = []; // AABB bâtiments pour collision joueur

    function makeBuilding(x, z, type) {
      let bw, bd, bh;
      if      (type === 2) { bw = rr(7.5, 13); bd = rr(7.5, 13); bh = rr(30, 72); }
      else if (type === 1) { bw = rr(7,   12); bd = rr(7,   12); bh = rr(9,  20); }
      else                 { bw = rr(5,    9); bd = rr(5,    9); bh = rr(3.5, 7); }
      buildingBounds.push({ x, z, hw: bw * 0.5 + 0.4, hd: bd * 0.5 + 0.4 });

      const fc        = FACADE_PAL[ri(0, FACADE_PAL.length - 1)];
      const facadeMat = new THREE.MeshLambertMaterial({ color: fc });
      const roofMatB  = new THREE.MeshLambertMaterial({ color: 0x484848 });
      const baseMat2  = new THREE.MeshLambertMaterial({ color: 0x383838 });

      // Texture fenêtres proportionnelle aux dimensions
      const winCols = Math.max(2, Math.round(bw / 2.5));
      const winRows = Math.max(2, Math.round(bh / 3.8));
      const winTex  = makeWinTex(winCols, winRows);
      const winMat  = new THREE.MeshLambertMaterial({ map: winTex });

      // Multi-matériaux BoxGeometry : [+X, -X, +Y, -Y, +Z, -Z]
      // Fenêtres sur les 4 faces verticales, toit/base unis
      const mats = [winMat, winMat, roofMatB, baseMat2, winMat, winMat];
      const body = new THREE.Mesh(new THREE.BoxGeometry(bw, bh, bd), mats);
      body.position.set(x, bh / 2, z);
      body.castShadow    = true;
      body.receiveShadow = true;
      scene.add(body);

      // — Acrotère (toit plat légèrement en saillie) —
      const roofCap = new THREE.Mesh(
        new THREE.BoxGeometry(bw + 0.4, 0.35, bd + 0.4),
        new THREE.MeshLambertMaterial({ color: 0x555555 })
      );
      roofCap.position.set(x, bh + 0.18, z);
      scene.add(roofCap);

      // — Antenne —
      if (rnd() > 0.42) {
        const ah = rr(1.2, 4.0);
        const ant = new THREE.Mesh(
          new THREE.BoxGeometry(0.1, ah, 0.1),
          new THREE.MeshLambertMaterial({ color: 0x222222 })
        );
        ant.position.set(
          x + rr(-bw * 0.3, bw * 0.3),
          bh + ah / 2 + 0.35,
          z + rr(-bd * 0.3, bd * 0.3)
        );
        scene.add(ant);
      }

      // — Cheminée —
      if (rnd() > 0.48) {
        const chH = rr(0.7, 1.8);
        const chim = new THREE.Mesh(
          new THREE.BoxGeometry(0.78, chH, 0.78),
          new THREE.MeshLambertMaterial({ color: 0x7a3f2e })
        );
        chim.position.set(
          x + rr(-bw * 0.28, bw * 0.28),
          bh + chH / 2 + 0.35,
          z + rr(-bd * 0.28, bd * 0.28)
        );
        scene.add(chim);
      }

      // — Penthouse (bâtiments downtown seulement) —
      if (type === 2 && rnd() > 0.5) {
        const ph = rr(3, 8);
        const pw = bw * rr(0.35, 0.6);
        const pd = bd * rr(0.35, 0.6);
        const penth = new THREE.Mesh(
          new THREE.BoxGeometry(pw, ph, pd),
          new THREE.MeshLambertMaterial({ color: fc })
        );
        penth.position.set(
          x + rr(-bw * 0.1, bw * 0.1),
          bh + ph / 2 + 0.35,
          z + rr(-bd * 0.1, bd * 0.1)
        );
        penth.castShadow = true;
        scene.add(penth);
      }

      // — Unités de climatisation (commerce/résidentiel) —
      if (type < 2 && rnd() > 0.55) {
        const n = ri(1, 3);
        for (let k = 0; k < n; k++) {
          const ac = new THREE.Mesh(
            new THREE.BoxGeometry(rr(0.6, 1.1), rr(0.4, 0.7), rr(0.5, 0.9)),
            new THREE.MeshLambertMaterial({ color: 0x9090a0 })
          );
          ac.position.set(
            x + rr(-bw * 0.35, bw * 0.35),
            bh + 0.4,
            z + rr(-bd * 0.35, bd * 0.35)
          );
          scene.add(ac);
        }
      }
    }

    // ── Zones de placement des bâtiments ──
    // _INN  = bord intérieur (depuis trottoir côté centre)
    // _EDGE = bord extérieur (depuis trottoir côté périphérie)
    // Zones bâtiments générées dynamiquement depuis la grille de routes
    const _worldEdge = WORLD / 2 - 5;
    const _SW = RD_W / 2 + SW_W; // 9.3 = bord extérieur trottoir depuis centre route
    const _rEdges = [-_worldEdge, ...RD_POS.flatMap(r => [r - _SW, r + _SW]), _worldEdge];
    const _rZones = [];
    for (let i = 0; i < _rEdges.length - 1; i += 2) _rZones.push([_rEdges[i], _rEdges[i + 1]]);
    const _mid = Math.floor(_rZones.length / 2);
    const BLDG_ZONES = [];
    _rZones.forEach(([x1, x2], xi) => {
      _rZones.forEach(([z1, z2], zi) => {
        const d = Math.max(Math.abs(xi - _mid), Math.abs(zi - _mid));
        const type = d === 0 ? 2 : d === 1 ? 1 : 0;
        const step = type === 2 ? 11 : type === 1 ? 12 : 20;
        BLDG_ZONES.push({ x1, x2, z1, z2, type, step });
      });
    });

    const _BLDG_GLB_DEFS = [
      { key:'building_06.glb',        scale:0.008 },
      { key:'new_york_buildings.glb', scale:0.005 },
      { key:'bat simple.glb',         scale:0.01  },
    ];
    // 3 buckets selon tirage : 0-0.40 proc, 0.40-0.60 building_06, 0.60-0.80 new_york, 0.80-1.0 bat simple
    const _glbBldgQ = []; // { x, z, bucket:0|1|2 }

    BLDG_ZONES.forEach(({ x1, x2, z1, z2, type, step }) => {
      for (let bx = x1 + step * 0.5; bx < x2 - step * 0.1; bx += step) {
        for (let bz = z1 + step * 0.5; bz < z2 - step * 0.1; bz += step) {
          const fx = bx + rr(-step * 0.18, step * 0.18);
          const fz = bz + rr(-step * 0.18, step * 0.18);
          const r  = Math.random();
          if (r < 0.40) {
            makeBuilding(fx, fz, type);                      // 40% procédural
          } else if (r < 0.60) {
            _glbBldgQ.push({ x: fx, z: fz, bucket: 0 });   // 20% building_06
          } else if (r < 0.80) {
            _glbBldgQ.push({ x: fx, z: fz, bucket: 1 });   // 20% new_york
          } else {
            _glbBldgQ.push({ x: fx, z: fz, bucket: 2 });   // 20% bat simple
          }
        }
      }
    });

    // Chargement asynchrone des bâtiments GLB
    (function _initGLBBuildings() {
      const tmpls = [null, null, null]; let bi = 0;
      function next() {
        if (bi >= _BLDG_GLB_DEFS.length) {
          _glbBldgQ.forEach(({ x, z, bucket }) => {
            const entry = tmpls[bucket];
            if (!entry) return; // GLB absent → skip
            const m = entry.tmpl.clone(true);
            const sc = entry.scale;
            m.scale.set(sc, sc, sc);
            m.position.set(x, 0, z);
            m.rotation.y = Math.random() * Math.PI * 2;
            const box = new THREE.Box3().setFromObject(m);
            m.position.y = -box.min.y;
            m.traverse(ch => { if (ch.isMesh) { ch.castShadow = true; ch.receiveShadow = true; } });
            scene.add(m);
            buildingBounds.push({ x, z,
              hw: (box.max.x - box.min.x) / 2 + 0.4,
              hd: (box.max.z - box.min.z) / 2 + 0.4 });
          });
          return;
        }
        const idx = bi;
        const def = _BLDG_GLB_DEFS[bi++];
        _loadGLB(def.key, g => { if (g) tmpls[idx] = { tmpl: g, scale: def.scale }; next(); });
      }
      next();
    })();

    // ════════════════════════════════════════
    //  ARBRES GLB (alignés sur les trottoirs)
    // ════════════════════════════════════════
    const SW_MID   = RD_W / 2 + SW_W / 2; // 7.9 = centre trottoir depuis axe route
    const TREE_STP = 50; // espacement doublé pour réduire le nombre d'arbres
    const _TREE_DEFS = [
      { key:'arbre_low_poly.glb',            scale:2.0 },
      { key:'pine_trees_pack__ps1_low_poly.glb', scale:1.5 },
    ];

    const _treePosQ = [];
    RD_POS.forEach(rz => {
      [-1, 1].forEach(side => {
        const tz = rz + side * SW_MID;
        for (let tx = -WORLD / 2 + 6; tx < WORLD / 2; tx += TREE_STP) {
          if (!RD_POS.some(rx => Math.abs(tx - rx) < RD_W / 2 + 2)) _treePosQ.push([tx, tz]);
        }
      });
    });
    RD_POS.forEach(rx => {
      [-1, 1].forEach(side => {
        const tx = rx + side * SW_MID;
        for (let tz = -WORLD / 2 + 6; tz < WORLD / 2; tz += TREE_STP) {
          if (!RD_POS.some(rz => Math.abs(tz - rz) < RD_W / 2 + 2)) _treePosQ.push([tx, tz]);
        }
      });
    });

    (function _initTrees() {
      let arbreTmpl = null, pineTmpl = null;
      function place() {
        _treePosQ.forEach(([tx, tz]) => {
          const usePine = pineTmpl && Math.random() < 0.5;
          let m;
          if (usePine) {
            const kids = pineTmpl.children.filter(c => c.isMesh || c.isGroup || c.children.length);
            const src  = kids.length ? kids[Math.floor(Math.random() * kids.length)] : pineTmpl;
            m = src.clone(true);
            m.scale.set(1.5, 1.5, 1.5);
          } else if (arbreTmpl) {
            m = arbreTmpl.clone(true);
            m.scale.set(2.0, 2.0, 2.0);
          } else return;
          m.position.set(tx, 0, tz);
          m.rotation.y = Math.random() * Math.PI * 2;
          const box = new THREE.Box3().setFromObject(m);
          m.position.y = -box.min.y;
          scene.add(m);
        });
      }
      let loaded = 0;
      const done = () => { if (++loaded === 2) place(); };
      _loadGLB('arbre_low_poly.glb',                g => { if (g) arbreTmpl = g; done(); });
      _loadGLB('pine_trees_pack__ps1_low_poly.glb',  g => { if (g) pineTmpl  = g; done(); });
    })();

    // ════════════════════════════════════════
    //  LAMPADAIRES GLB
    // ════════════════════════════════════════
    const LAMP_STP = 40;
    const LAMP_OFF = SW_MID - 0.3;

    const _lampPosQ = [];
    RD_POS.forEach(rz => {
      [-1, 1].forEach(side => {
        const lz = rz + side * LAMP_OFF;
        const rotY = side > 0 ? Math.PI / 2 : -Math.PI / 2;
        for (let lx = -WORLD / 2 + LAMP_STP * 0.4; lx < WORLD / 2; lx += LAMP_STP) {
          if (!RD_POS.some(rx => Math.abs(lx - rx) < RD_W / 2 + 1)) _lampPosQ.push([lx, lz, rotY]);
        }
      });
    });
    RD_POS.forEach(rx => {
      [-1, 1].forEach(side => {
        const lx = rx + side * LAMP_OFF;
        const rotY = side > 0 ? Math.PI : 0;
        for (let lz = -WORLD / 2 + LAMP_STP * 0.4; lz < WORLD / 2; lz += LAMP_STP) {
          if (!RD_POS.some(rz => Math.abs(lz - rz) < RD_W / 2 + 1)) _lampPosQ.push([lx, lz, rotY]);
        }
      });
    });

    _loadGLB('street_lamp.glb', tmpl => {
      if (!tmpl) return;
      _lampPosQ.forEach(([lx, lz, rotY]) => {
        const m = tmpl.clone(true);
        m.scale.set(0.008, 0.008, 0.008);
        m.rotation.y = rotY;
        m.position.set(lx, 0, lz);
        const box = new THREE.Box3().setFromObject(m);
        m.position.y = -box.min.y;
        scene.add(m);
      });
    });

    // ════════════════════════════════════════
    //  BORNES INCENDIE GLB
    // ════════════════════════════════════════
    const HYDRANT_STP = 45;
    const _hydrantPosQ = [];
    RD_POS.forEach(rz => {
      [-1, 1].forEach(side => {
        const hz = rz + side * SW_MID;
        for (let hx = -WORLD / 2 + HYDRANT_STP * 0.7; hx < WORLD / 2; hx += HYDRANT_STP) {
          if (!RD_POS.some(rx => Math.abs(hx - rx) < RD_W / 2 + 3)) _hydrantPosQ.push([hx, hz]);
        }
      });
    });
    RD_POS.forEach(rx => {
      [-1, 1].forEach(side => {
        const hx = rx + side * SW_MID;
        for (let hz = -WORLD / 2 + HYDRANT_STP * 0.7; hz < WORLD / 2; hz += HYDRANT_STP) {
          if (!RD_POS.some(rz => Math.abs(hz - rz) < RD_W / 2 + 3)) _hydrantPosQ.push([hx, hz]);
        }
      });
    });

    _loadGLB('fire_hydrant_low_poly.glb', tmpl => {
      if (!tmpl) { console.error('fire_hydrant_low_poly.glb ÉCHEC chargement'); return; }
      console.log('fire_hydrant GLB chargé OK, tmpl=', tmpl);
      // Hydrant TEST visible à (0, 0, -20)
      const _testH = tmpl.clone(true);
      _testH.scale.set(0.5, 0.5, 0.5);
      _testH.position.set(0, 0, -20);
      scene.add(_testH);
      console.log('Hydrant TEST placé à (0,0,-20)');
      _hydrantPosQ.forEach(([hx, hz]) => {
        const m = tmpl.clone(true);
        m.scale.set(0.5, 0.5, 0.5);
        m.position.set(hx, 0, hz);
        const box = new THREE.Box3().setFromObject(m);
        m.position.y = -box.min.y;
        scene.add(m);
        console.log('Hydrant placé:', hx, hz);
      });
    });

    // ════════════════════════════════════════
    //  FEUX DE CIRCULATION
    //  1 poteau par intersection (±28, ±28)
    //  Sphères : rouge y=3, orange y=4, vert y=5
    //  Cycle : rouge 5s → vert 5s → orange 1s
    // ════════════════════════════════════════

    const _TL_POS = [];
    RD_POS.forEach(rx => RD_POS.forEach(rz => {
      [[-1,-1],[-1,1],[1,-1],[1,1]].forEach(([sx, sz]) => {
        _TL_POS.push({ x: rx + sx * (RD_W / 2 + SW_W + 1), z: rz + sz * (RD_W / 2 + SW_W + 1) });
      });
    }));
    const _TL_DUR    = { red:5.0, green:5.0, orange:1.0 };
    const _TL_NEXT   = { red:'green', green:'orange', orange:'red' };

    // Couleurs RGB [0..1] pour identifier les meshes lumière dans le GLB
    const _TL_COLORS = [
      { phase:'red',    rgb:[0.8, 0.1, 0.1] },
      { phase:'orange', rgb:[0.9, 0.5, 0.0] },
      { phase:'green',  rgb:[0.1, 0.8, 0.1] },
    ];
    const _trafficLights = [];

    function _applyTLPhase(tl) {
      tl.lightMeshes.forEach((meshes, i) => {
        const on = _TL_COLORS[i].phase === tl.phase;
        meshes.forEach(m => { m.material.emissiveIntensity = on ? 1.0 : 0.05; });
      });
    }

    function _updateTrafficLights(dt) {
      _trafficLights.forEach(tl => {
        tl.timer -= dt;
        if (tl.timer <= 0) {
          tl.phase = _TL_NEXT[tl.phase];
          tl.timer = _TL_DUR[tl.phase];
          _applyTLPhase(tl);
        }
      });
    }

    _loadGLB('traffic_light_low_poly.glb', tmpl => {
      if (!tmpl) { console.error('traffic_light_low_poly.glb ÉCHEC chargement'); return; }
      console.log('traffic_light GLB chargé OK, tmpl=', tmpl);
      // Feu TEST visible à (10, 0, 0)
      const _testTL = tmpl.clone(true);
      _testTL.scale.set(1.0, 1.0, 1.0);
      _testTL.position.set(10, 0, 0);
      scene.add(_testTL);
      console.log('Traffic light TEST placé à (10,0,0)');
      _TL_POS.forEach(({ x, z }, idx) => {
        const clone = tmpl.clone(true);
        clone.scale.set(1.0, 1.0, 1.0);
        clone.position.set(x, 0, z);
        const box = new THREE.Box3().setFromObject(clone);
        clone.position.y = -box.min.y;
        clone.traverse(ch => { if (ch.isMesh) ch.castShadow = true; });
        scene.add(clone);
        // Identification des lumières par couleur de matériau
        const lightMeshes = [[], [], []];
        clone.traverse(obj => {
          if (!obj.isMesh || !obj.material || !obj.material.color) return;
          obj.material = obj.material.clone();
          const { r, g, b } = obj.material.color;
          _TL_COLORS.forEach(({ rgb }, ci) => {
            if (Math.abs(r - rgb[0]) < 0.35 && Math.abs(g - rgb[1]) < 0.35 && Math.abs(b - rgb[2]) < 0.35)
              lightMeshes[ci].push(obj);
          });
        });
        const phase = idx % 2 === 0 ? 'red' : 'green';
        const tl = { lightMeshes, phase, timer: _TL_DUR[phase] };
        _trafficLights.push(tl);
        _applyTLPhase(tl);
      });
    });

    // ════════════════════════════════════════
    //  VOITURES PNJ — Kenney GLB chargés via URL relative
    //  sedan/suv/taxi/van/hatchback-sports ×3
    //  delivery/truck/sedan-sports/suv-luxury ×2
    //  police ×2  ambulance/firetruck ×1  → 20 voitures
    // ════════════════════════════════════════

    // ── GLTFLoader — URL absolue + résolution texture depuis racine du repo ──
    function _loadGLB(key, cb) {
      const manager = new THREE.LoadingManager();
      // Redirige toutes les ressources (y compris Textures/colormap.png) vers la racine
      manager.setURLModifier(url => { const f = url.split('/').pop(); if (/^[0-9a-f-]{36}$/.test(f)) return url; return NPC_BASE + encodeURIComponent(f); });
      const loader = new THREE.GLTFLoader(manager);
      loader.load(NPC_BASE + key, g => cb(g.scene), null, () => { console.warn('GLB manquant:', key); cb(null); });
    }

    // Normalise : scale=1.5 (ou 0.008 pour police_car), grounded y=0, ombres
    function _normalizeKenney(model, key) {
      model.position.set(0, 0, 0);
      model.rotation.set(0, 0, 0);
      const s = key === 'police_car' ? 0.008 : 1.5;
      model.scale.set(s, s, s);
      const box = new THREE.Box3().setFromObject(model);
      model.position.y = -box.min.y;
      model.traverse(ch => {
        if (!ch.isMesh) return;
        ch.castShadow = true;
        ch.receiveShadow = true;
      });
    }

    // ── Tableau pondéré — pool total 27 slots ──
    const KENNEY_DEFS = [
      { key:'sedan',            freq:3 },
      { key:'suv',              freq:3 },
      { key:'taxi',             freq:3 },
      { key:'van',              freq:3 },
      { key:'hatchback-sports', freq:3 },
      { key:'delivery',         freq:2 },
      { key:'truck',            freq:2 },
      { key:'sedan-sports',     freq:2 },
      { key:'suv-luxury',       freq:2 },
      { key:'police',           freq:1 },
      { key:'ambulance',        freq:1 },
      { key:'firetruck',        freq:1 },
      { key:'police_car',       freq:2 },
    ];
    const NPC_ROUTES = RD_POS.flatMap(r => [{ axis:'x', fixed:r }, { axis:'z', fixed:r }]);
    const NPC_BOUND = WORLD / 2 - 3;
    const npcCars   = [];
    const _npcTmpl  = {};
    let   _npcLoadIdx = 0;

    function _buildWeightedPool(defs, loaded) {
      const pool = [];
      defs.forEach(d => { if (loaded[d.key]) for (let i = 0; i < d.freq; i++) pool.push(d); });
      return pool;
    }

    function _npcPlaceModel(tmplModel) {
      const mesh  = (typeof THREE.SkeletonUtils !== 'undefined')
                      ? THREE.SkeletonUtils.clone(tmplModel)
                      : tmplModel.clone(true);
      const route = NPC_ROUTES[Math.floor(rnd() * NPC_ROUTES.length)];
      const dir   = rnd() < 0.5 ? 1 : -1;
      const t     = (rnd() * 2 - 1) * NPC_BOUND;
      const speed = 6 + rnd() * 8;  // 6–14 u/s
      if (route.axis === 'x') {
        mesh.position.set(t, 0, route.fixed + dir * 3);
        mesh.rotation.y = dir > 0 ?  Math.PI / 2 : -Math.PI / 2; // +x → face est, -x → face ouest
      } else {
        mesh.position.set(route.fixed - dir * 3, 0, t);
        mesh.rotation.y = dir > 0 ? 0 : Math.PI;
      }
      scene.add(mesh);
      npcCars.push({ mesh, route, dir, t, speed });
    }

    function _npcSpawnAll() {
      const pool = _buildWeightedPool(KENNEY_DEFS, _npcTmpl);
      if (!pool.length) { console.warn('Aucun GLB chargé — PNJ absents'); return; }
      for (let i = 0; i < 12; i++) {
        const def = pool[Math.floor(rnd() * pool.length)];
        _npcPlaceModel(_npcTmpl[def.key]);
      }
    }

    function _npcLoadNext() {
      if (_npcLoadIdx >= KENNEY_DEFS.length) { _npcSpawnAll(); return; }
      const def = KENNEY_DEFS[_npcLoadIdx++];
      _loadGLB(def.key + '.glb', m => {
        if (m) { _normalizeKenney(m, def.key); _npcTmpl[def.key] = m; }
        _npcLoadNext();
      });
    }
    _npcLoadNext(); // démarre le chargement GLB asynchrone

    // ════════════════════════════════════════
    //  PIÉTONS PNJ — 15 personnages Kenney Blocky animés
    // ════════════════════════════════════════

    const PED_BASE   = 'https://nbakflorent-eng.github.io/road-rage-city-CITY-/';
    const PED_MODELS = ['character-a','character-b','character-c','character-d',
      'character-e','character-f','character-g','character-h','character-i',
      'character-j','character-k','character-l','character-m','character-n',
      'character-o','character-p','character-q','character-r'];
    // Trottoirs des 4 routes (±20, ±60) — 16 bandes
    const _SM = RD_W / 2 + SW_W / 2; // 7.9 = centre trottoir depuis axe route
    const PED_TRACKS = RD_POS.flatMap(r => [
      { fixedAxis:'z', fixedVal: r - _SM, walkAxis:'x' },
      { fixedAxis:'z', fixedVal: r + _SM, walkAxis:'x' },
      { fixedAxis:'x', fixedVal: r - _SM, walkAxis:'z' },
      { fixedAxis:'x', fixedVal: r + _SM, walkAxis:'z' },
    ]);
    const PED_BOUND = 195;
    const peds = [];
    const _pedTexMgr = new THREE.LoadingManager();
    _pedTexMgr.setURLModifier(url => {
      // Redirige Textures/texture-x.png → PED_BASE/texture-x.png
      const m = url.match(/[Tt]extures\/([^/]+\.png)/);
      return m ? PED_BASE + m[1] : url;
    });
    const _pedLoader = new THREE.GLTFLoader(_pedTexMgr);

    function _pedSetRot(ped) {
      const d = ped.dir;
      if (ped.track.walkAxis === 'x') ped.mesh.rotation.y = d > 0 ? Math.PI/2 : -Math.PI/2;
      else                             ped.mesh.rotation.y = d > 0 ? 0 : Math.PI;
    }

    function _findPedLegs(root) {
      const legPat   = /(up.*leg|upleg|thigh|upperleg)/i;
      const excl     = /(lower|foot|shin|calf|knee|toe)/i;
      const leftPat  = /(left|[._]l([._]|$))/i;
      const rightPat = /(right|[._]r([._]|$))/i;
      let legL = null, legR = null;
      root.traverse(obj => {
        const n = obj.name;
        if (!legPat.test(n) || excl.test(n)) return;
        if (!legL && leftPat.test(n))  legL = obj;
        if (!legR && rightPat.test(n)) legR = obj;
      });
      return { legL, legR };
    }

    // 15 piétons : 4+4+4+3, chacun charge son GLB indépendamment
    (function _initPeds() {
      const dist = [7, 6, 6, 6, 6, 6, 6, 7]; // 50 piétons sur 8 trottoirs
      PED_TRACKS.forEach((track, ti) => {
        const n = dist[ti];
        for (let i = 0; i < n; i++) {
          const pos  = -PED_BOUND + (PED_BOUND * 2) / (n + 1) * (i + 1);
          const lane = (Math.floor(Math.random() * 3) - 1) * 0.5; // -0.5, 0 ou +0.5
          const key  = PED_MODELS[Math.floor(Math.random() * PED_MODELS.length)];
          _pedLoader.load(PED_BASE + key + '.glb', gltf => {
            const mesh = gltf.scene;
            mesh.scale.set(0.5, 0.5, 0.5);
            if (track.fixedAxis === 'z') mesh.position.set(pos, 0, track.fixedVal + lane);
            else                          mesh.position.set(track.fixedVal + lane, 0, pos);
            const box = new THREE.Box3().setFromObject(mesh);
            mesh.position.y = -box.min.y;
            mesh.traverse(ch => { if (ch.isMesh) ch.castShadow = true; });
            const dir = rnd() < 0.5 ? 1 : -1;
            scene.add(mesh);
            const { legL, legR } = _findPedLegs(mesh);
            const ped = { mesh, track, pos, dir, speed: 0.8 + rnd(),
                          lane, legL, legR, legPhase: Math.random() * Math.PI * 2 };
            _pedSetRot(ped);
            peds.push(ped);
          }, null, err => console.error('Erreur chargement piéton:', key, err));
        }
      });
    })();

    // ════════════════════════════════════════
    //  VOITURE JOUEUR
    //  Type : berline rouge, mesh box simple
    //  Structure : caisse + cabine + 4 roues
    // ════════════════════════════════════════
    const CAR_L = 4.2;
    const CAR_W = 2.0;
    const CAR_H = 0.75;

    const playerCar = new THREE.Group();

    // — caisse
    const matBody = new THREE.MeshLambertMaterial({ color: 0xcc1111 });
    const bodyMesh = new THREE.Mesh(
      new THREE.BoxGeometry(CAR_W, CAR_H, CAR_L),
      matBody
    );
    bodyMesh.position.y = CAR_H / 2;
    bodyMesh.castShadow = true;
    playerCar.add(bodyMesh);

    // — cabine
    const matCabin = new THREE.MeshLambertMaterial({ color: 0xe82020 });
    const cabinMesh = new THREE.Mesh(
      new THREE.BoxGeometry(CAR_W * 0.88, CAR_H * 0.85, CAR_L * 0.52),
      matCabin
    );
    cabinMesh.position.set(0, CAR_H + (CAR_H * 0.85) / 2, -0.25);
    cabinMesh.castShadow = true;
    playerCar.add(cabinMesh);

    // — vitres (teintées sombres)
    const matGlass = new THREE.MeshLambertMaterial({ color: 0x1a2a3a, transparent: true, opacity: 0.7 });
    const windshield = new THREE.Mesh(
      new THREE.BoxGeometry(CAR_W * 0.82, CAR_H * 0.65, 0.05),
      matGlass
    );
    windshield.position.set(0, CAR_H + 0.38, -0.25 + CAR_L * 0.52 / 2 + 0.03);
    playerCar.add(windshield);

    // — phares avant (jaune clair)
    const matHead = new THREE.MeshLambertMaterial({ color: 0xffee88 });
    [-0.65, 0.65].forEach(side => {
      const h = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.2, 0.05), matHead);
      h.position.set(side, CAR_H * 0.55, CAR_L / 2 + 0.03);
      playerCar.add(h);
    });

    // — roues (cylindres noirs)
    const matWheel = new THREE.MeshLambertMaterial({ color: 0x111111 });
    const matRim   = new THREE.MeshLambertMaterial({ color: 0x888888 });
    const wheelR   = 0.34;
    const wheelW   = 0.22;
    const wheelPosArr = [
      [-CAR_W / 2 - 0.08,  wheelR,  CAR_L / 2 - 0.85],
      [ CAR_W / 2 + 0.08,  wheelR,  CAR_L / 2 - 0.85],
      [-CAR_W / 2 - 0.08,  wheelR, -CAR_L / 2 + 0.85],
      [ CAR_W / 2 + 0.08,  wheelR, -CAR_L / 2 + 0.85],
    ];
    wheelPosArr.forEach(([wx, wy, wz]) => {
      const wg = new THREE.Group();
      const tire = new THREE.Mesh(
        new THREE.CylinderGeometry(wheelR, wheelR, wheelW, 14),
        matWheel
      );
      tire.rotation.z = Math.PI / 2;
      wg.add(tire);
      const rim = new THREE.Mesh(
        new THREE.CylinderGeometry(wheelR * 0.55, wheelR * 0.55, wheelW + 0.01, 8),
        matRim
      );
      rim.rotation.z = Math.PI / 2;
      wg.add(rim);
      wg.position.set(wx, wy, wz);
      playerCar.add(wg);
    });

    playerCar.position.set(-80, 0, -20); // route z=-20, lane droite, face est
    scene.add(playerCar);

    // ════════════════════════════════════════
    //  CLAVIER
    // ════════════════════════════════════════
    const keys = {};
    document.addEventListener('keydown', e => { keys[e.code] = true;  e.preventDefault(); });
    document.addEventListener('keyup',   e => { keys[e.code] = false; });

    // ════════════════════════════════════════
    //  PHYSIQUE VOITURE
    // ════════════════════════════════════════
    let carSpeed   = 0;   // unités/s
    let carAngle   = Math.PI / 2; // cap initial : face est sur route z=-28

    const MAX_FWD   = 20;
    const MAX_REV   = 8;
    const ACCEL     = 12;
    const BRAKE     = 18;
    const FRICTION  = 5;
    const TURN_SPD  = 1.9; // rad/s

    // ════════════════════════════════════════
    //  CAMÉRA 3ÈME PERSONNE
    // ════════════════════════════════════════
    let camYaw = Math.PI / 2;
    const CAM_DIST   = 11;
    const CAM_HEIGHT = 4.5;
    const CAM_SMOOTH = 0.06;

    // ════════════════════════════════════════
    //  BOUCLE PRINCIPALE
    // ════════════════════════════════════════
    const clock = new THREE.Clock();

    function update(dt) {
      // ── touches ZQSD / WASD ──
      const fwd  = keys['KeyW'] || keys['KeyZ'];
      const rev  = keys['KeyS'];
      const left = keys['KeyA'] || keys['KeyQ'];
      const rgt  = keys['KeyD'];

      // Accélération
      if (fwd) {
        carSpeed = Math.min(carSpeed + ACCEL * dt, MAX_FWD);
      } else if (rev) {
        carSpeed = Math.max(carSpeed - BRAKE * dt, -MAX_REV);
      } else {
        // Frottement
        if (carSpeed > 0) carSpeed = Math.max(carSpeed - FRICTION * dt, 0);
        else              carSpeed = Math.min(carSpeed + FRICTION * dt, 0);
      }

      // Braquage (proportionnel à la vitesse)
      if (Math.abs(carSpeed) > 0.2) {
        const dir = carSpeed > 0 ? 1 : -1;
        const ts  = TURN_SPD * Math.min(Math.abs(carSpeed) / MAX_FWD, 1);
        if (left) carAngle += ts * dt * dir;
        if (rgt)  carAngle -= ts * dt * dir;
      }

      // Déplacement — sauvegarde pour roll-back collision
      const _prevX = playerCar.position.x;
      const _prevZ = playerCar.position.z;
      playerCar.position.x += Math.sin(carAngle) * carSpeed * dt;
      playerCar.position.z += Math.cos(carAngle) * carSpeed * dt;
      playerCar.rotation.y  = carAngle;

      // Limites monde
      const BOUND = WORLD / 2 - 3;
      playerCar.position.x = Math.max(-BOUND, Math.min(BOUND, playerCar.position.x));
      playerCar.position.z = Math.max(-BOUND, Math.min(BOUND, playerCar.position.z));

      // ── Collision bâtiments (AABB) — annule le déplacement si collision ──
      const _CAR_R = 0.5;
      for (const b of buildingBounds) {
        const ox = playerCar.position.x - b.x;
        const oz = playerCar.position.z - b.z;
        if (Math.abs(ox) < b.hw + _CAR_R && Math.abs(oz) < b.hd + _CAR_R) {
          playerCar.position.x = _prevX;
          playerCar.position.z = _prevZ;
          carSpeed *= 0.1; // rebond amortissement
          break;
        }
      }

      // ── Caméra 3ème personne ──
      camYaw += (carAngle - camYaw) * CAM_SMOOTH;
      camera.position.x = playerCar.position.x - Math.sin(camYaw) * CAM_DIST;
      camera.position.z = playerCar.position.z - Math.cos(camYaw) * CAM_DIST;
      camera.position.y = CAM_HEIGHT;
      camera.lookAt(
        playerCar.position.x,
        playerCar.position.y + 0.8,
        playerCar.position.z
      );

      // ── Feux de circulation ──
      _updateTrafficLights(dt);

      // ── PNJ ──
      npcCars.forEach((npc, idx) => {
        // Distance de sécurité 6u entre voitures
        let carBlocked = false;
        for (let j = 0; j < npcCars.length; j++) {
          if (j === idx) continue;
          const o = npcCars[j];
          const dx = npc.mesh.position.x - o.mesh.position.x;
          const dz = npc.mesh.position.z - o.mesh.position.z;
          if (dx*dx + dz*dz < 36) { carBlocked = true; break; } // distance² < 6²
        }
        if (carBlocked) {
          npc.blockedTime = (npc.blockedTime || 0) + dt;
          if (npc.blockedTime >= 3) { // téléport après 3s de blocage
            npc.t = (rnd() * 2 - 1) * NPC_BOUND;
            npc.blockedTime = 0;
            if (npc.route.axis === 'x') npc.mesh.position.set(npc.t, 0, npc.route.fixed + npc.dir * 3);
            else                         npc.mesh.position.set(npc.route.fixed - npc.dir * 3, 0, npc.t);
          }
          return;
        }
        npc.blockedTime = 0;
        // Position candidate (vitesse fixe 6-14 u/s, direction fixe)
        const newT = npc.t + npc.dir * npc.speed * dt;
        // Déplacement validé + rebouclage
        npc.t = newT;
        if (npc.t >  NPC_BOUND) npc.t -= NPC_BOUND * 2;
        if (npc.t < -NPC_BOUND) npc.t += NPC_BOUND * 2;
        if (npc.route.axis === 'x') {
          npc.mesh.position.x = npc.t;
          npc.mesh.position.z = npc.route.fixed + npc.dir * 3;
        } else {
          npc.mesh.position.z = npc.t;
          npc.mesh.position.x = npc.route.fixed - npc.dir * 3;
        }
      });

      // ── Piétons PNJ ──
      peds.forEach((ped, pi) => {
        const px = ped.mesh.position.x, pz = ped.mesh.position.z;
        // Proximité piéton–piéton (même trottoir, même lane) : ralentit ou s'arrête
        let pedSlow = 1.0;
        for (let j = 0; j < peds.length; j++) {
          if (j === pi || peds[j].track !== ped.track) continue;
          if (Math.abs((ped.lane || 0) - (peds[j].lane || 0)) > 0.3) continue;
          const dx = px - peds[j].mesh.position.x, dz = pz - peds[j].mesh.position.z;
          const d2 = dx * dx + dz * dz;
          if (d2 < 0.64) { pedSlow = 0; break; }        // < 0.8u : stop
          if (d2 < 1.44) pedSlow = Math.min(pedSlow, 0.35); // < 1.2u : ralentit
        }
        if (pedSlow === 0) return;
        // Proche d'une route : ralentit à 50%
        const _nr = RD_POS.some(r => Math.abs(px - r) < RD_W / 2 + SW_W + 1) ||
                    RD_POS.some(r => Math.abs(pz - r) < RD_W / 2 + SW_W + 1);
        const sf = _nr ? 0.5 : 1.0;
        // Position candidate
        const newPos = ped.pos + ped.dir * ped.speed * sf * pedSlow * dt;
        const nx = ped.track.walkAxis === 'x' ? newPos : px;
        const nz = ped.track.walkAxis === 'x' ? pz     : newPos;
        // Bord du monde : demi-tour
        if (newPos > PED_BOUND || newPos < -PED_BOUND) {
          ped.dir = -ped.dir; _pedSetRot(ped); return;
        }
        // Collision bâtiments : demi-tour
        for (const b of buildingBounds) {
          if (Math.abs(nx - b.x) < b.hw + 0.6 && Math.abs(nz - b.z) < b.hd + 0.6) {
            ped.dir = -ped.dir; _pedSetRot(ped); return;
          }
        }
        // Commit déplacement
        ped.pos = newPos;
        if (ped.track.walkAxis === 'x') ped.mesh.position.x = newPos;
        else                             ped.mesh.position.z = newPos;
        // Oscillation jambes sinusoïdale sur les bones
        ped.legPhase += dt * ped.speed * 3;
        if (ped.legL) ped.legL.rotation.x =  Math.sin(ped.legPhase) * 0.45;
        if (ped.legR) ped.legR.rotation.x = -Math.sin(ped.legPhase) * 0.45;
        // Balancement latéral du corps
        ped.mesh.rotation.z = Math.sin(Date.now() * 0.005 + ped.legPhase) * 0.1;
      });

      // ── HUD vitesse (km/h) ──
      document.getElementById('speed-display').textContent =
        Math.abs(Math.round(carSpeed * 3.6));
    }

    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.min(clock.getDelta(), 0.05);
      update(dt);
      renderer.render(scene, camera);
    }
    animate();

    // ════════════════════════════════════════
    //  RESIZE
    // ════════════════════════════════════════
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
