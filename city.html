<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Road Rage City</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }
    #hud {
      position: fixed;
      top: 16px;
      left: 16px;
      color: #fff;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      text-shadow: 1px 1px 3px #000;
      pointer-events: none;
      user-select: none;
    }
    #hud .label { opacity: 0.7; }
    #hud .value { font-weight: bold; font-size: 16px; }
    #speed-wrap { margin-top: 6px; }
  </style>
</head>
<body>
  <div id="hud">
    <div class="label">ZQSD / WASD — conduire</div>
    <div id="speed-wrap">
      <span class="label">Vitesse : </span>
      <span class="value" id="speed-display">0</span>
      <span class="label"> km/h</span>
    </div>
  </div>

  <!-- Three.js r128 CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <script>
    // ════════════════════════════════════════
    //  SCENE
    // ════════════════════════════════════════
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB); // ciel bleu
    scene.fog = new THREE.Fog(0x87CEEB, 90, 220);

    const camera = new THREE.PerspectiveCamera(
      60, window.innerWidth / window.innerHeight, 0.1, 500
    );

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // ════════════════════════════════════════
    //  LUMIÈRES
    // ════════════════════════════════════════
    const sunLight = new THREE.DirectionalLight(0xfff8e7, 1.3);
    sunLight.position.set(60, 100, 40);
    sunLight.castShadow = true;
    sunLight.shadow.mapSize.set(2048, 2048);
    sunLight.shadow.camera.near   = 1;
    sunLight.shadow.camera.far    = 350;
    sunLight.shadow.camera.left   = -120;
    sunLight.shadow.camera.right  =  120;
    sunLight.shadow.camera.top    =  120;
    sunLight.shadow.camera.bottom = -120;
    scene.add(sunLight);

    const ambientLight = new THREE.AmbientLight(0x8899bb, 0.65);
    scene.add(ambientLight);

    // ════════════════════════════════════════
    //  CONSTANTES WORLD
    // ════════════════════════════════════════
    const WORLD    = 240;   // taille totale du sol
    const RD_W     = 13;    // largeur route
    const SW_W     = 2.8;   // largeur trottoir
    const RD_POS   = [-28, 28]; // positions des axes (2H + 2V)

    // ════════════════════════════════════════
    //  MATÉRIAUX
    // ════════════════════════════════════════
    const matGrass    = new THREE.MeshLambertMaterial({ color: 0x4a7c3f });
    const matAsphalt  = new THREE.MeshLambertMaterial({ color: 0x2e2e2e });
    const matSidewalk = new THREE.MeshLambertMaterial({ color: 0xc0bfba });
    const matYellow   = new THREE.MeshLambertMaterial({ color: 0xf5c518 });
    const matWhite    = new THREE.MeshLambertMaterial({ color: 0xffffff });

    // ────────────────────────────────────────
    //  SOL (herbe / asphalte de base)
    // ────────────────────────────────────────
    const groundMesh = new THREE.Mesh(
      new THREE.PlaneGeometry(WORLD, WORLD),
      matGrass
    );
    groundMesh.rotation.x = -Math.PI / 2;
    groundMesh.receiveShadow = true;
    scene.add(groundMesh);

    // ────────────────────────────────────────
    //  Helpers de création de plans
    // ────────────────────────────────────────
    function makePlane(mat, x, z, w, d, y = 0.01) {
      const m = new THREE.Mesh(new THREE.PlaneGeometry(w, d), mat);
      m.rotation.x = -Math.PI / 2;
      m.position.set(x, y, z);
      m.receiveShadow = true;
      scene.add(m);
      return m;
    }

    // ────────────────────────────────────────
    //  ROUTES
    //  2 horizontales (axe X, constante en Z)
    //  2 verticales   (axe Z, constante en X)
    // ────────────────────────────────────────
    RD_POS.forEach(rz => makePlane(matAsphalt, 0,  rz, WORLD,  RD_W, 0.02)); // horiz
    RD_POS.forEach(rx => makePlane(matAsphalt, rx, 0,  RD_W, WORLD,  0.02)); // vert

    // ────────────────────────────────────────
    //  INTERSECTIONS (carrés asphalte)
    // ────────────────────────────────────────
    RD_POS.forEach(rx =>
      RD_POS.forEach(rz =>
        makePlane(matAsphalt, rx, rz, RD_W, RD_W, 0.025)
      )
    );

    // ────────────────────────────────────────
    //  TROTTOIRS blancs
    // ────────────────────────────────────────
    RD_POS.forEach(rz => {
      [-1, 1].forEach(s =>
        makePlane(matSidewalk, 0, rz + s * (RD_W / 2 + SW_W / 2), WORLD, SW_W, 0.03)
      );
    });
    RD_POS.forEach(rx => {
      [-1, 1].forEach(s =>
        makePlane(matSidewalk, rx + s * (RD_W / 2 + SW_W / 2), 0, SW_W, WORLD, 0.03)
      );
    });

    // ────────────────────────────────────────
    //  LIGNES JAUNES DISCONTINUES (axe centre)
    // ────────────────────────────────────────
    const DASH_L = 3.0;
    const DASH_G = 2.8;
    const DASH_W = 0.18;
    const STEP   = DASH_L + DASH_G;

    function makeDashes(axis, fixedCoord) {
      const count = Math.floor(WORLD / STEP);
      const start = -WORLD / 2 + DASH_L / 2;
      for (let i = 0; i < count; i++) {
        const t = start + i * STEP;
        const bx = axis === 'x' ? DASH_L : DASH_W;
        const bz = axis === 'x' ? DASH_W  : DASH_L;
        const mesh = new THREE.Mesh(
          new THREE.BoxGeometry(bx, 0.005, bz),
          matYellow
        );
        mesh.position.set(
          axis === 'x' ? t          : fixedCoord,
          0.04,
          axis === 'x' ? fixedCoord : t
        );
        scene.add(mesh);
      }
    }

    RD_POS.forEach(rz => makeDashes('x', rz));
    RD_POS.forEach(rx => makeDashes('z', rx));

    // ════════════════════════════════════════
    //  DÉCOR URBAIN — BÂTIMENTS, ARBRES, LAMPADAIRES
    // ════════════════════════════════════════

    // ── Pseudo-random déterministe (seed fixe → ville identique à chaque chargement) ──
    let _s = 31337;
    function rnd()    { _s = (_s * 1664525 + 1013904223) >>> 0; return _s / 4294967296; }
    function rr(a, b) { return a + rnd() * (b - a); }
    function ri(a, b) { return a + Math.floor(rnd() * (b - a + 1)); }

    // ── Palette façades ──
    const FACADE_PAL = [
      0xd4c9a8, 0xbfc4c8, 0xf2f0ec, 0x9b8b7a,
      0xb8c9d4, 0xc8b89a, 0xb0b8c0, 0xe0d5b5,
      0x7a8c9a, 0xc4b090, 0xe8e0d4, 0xaab8a8,
    ];

    // ── Texture fenêtres (canvas par bâtiment) ──
    function makeWinTex(cols, rows) {
      const cw = 28, ch = 20;
      const cv = document.createElement('canvas');
      cv.width  = cols * cw;
      cv.height = rows * ch;
      const ctx = cv.getContext('2d');
      ctx.fillStyle = '#5a5a5a';
      ctx.fillRect(0, 0, cv.width, cv.height);
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          ctx.fillStyle = rnd() < 0.58 ? '#ffe898' : '#192231';
          ctx.fillRect(c * cw + 3, r * ch + 3, cw - 6, ch - 6);
        }
      }
      return new THREE.CanvasTexture(cv);
    }

    // ── Créer un bâtiment ──
    // type 0 = résidentiel (1-2 ét.), 1 = commerce (3-5 ét.), 2 = downtown (10-30 ét.)
    function makeBuilding(x, z, type) {
      let bw, bd, bh;
      if      (type === 2) { bw = rr(7.5, 13); bd = rr(7.5, 13); bh = rr(30, 72); }
      else if (type === 1) { bw = rr(7,   12); bd = rr(7,   12); bh = rr(9,  20); }
      else                 { bw = rr(5,    9); bd = rr(5,    9); bh = rr(3.5, 7); }

      const fc        = FACADE_PAL[ri(0, FACADE_PAL.length - 1)];
      const facadeMat = new THREE.MeshLambertMaterial({ color: fc });
      const roofMatB  = new THREE.MeshLambertMaterial({ color: 0x484848 });
      const baseMat2  = new THREE.MeshLambertMaterial({ color: 0x383838 });

      // Texture fenêtres proportionnelle aux dimensions
      const winCols = Math.max(2, Math.round(bw / 2.5));
      const winRows = Math.max(2, Math.round(bh / 3.8));
      const winTex  = makeWinTex(winCols, winRows);
      const winMat  = new THREE.MeshLambertMaterial({ map: winTex });

      // Multi-matériaux BoxGeometry : [+X, -X, +Y, -Y, +Z, -Z]
      // Fenêtres sur les 4 faces verticales, toit/base unis
      const mats = [winMat, winMat, roofMatB, baseMat2, winMat, winMat];
      const body = new THREE.Mesh(new THREE.BoxGeometry(bw, bh, bd), mats);
      body.position.set(x, bh / 2, z);
      body.castShadow    = true;
      body.receiveShadow = true;
      scene.add(body);

      // — Acrotère (toit plat légèrement en saillie) —
      const roofCap = new THREE.Mesh(
        new THREE.BoxGeometry(bw + 0.4, 0.35, bd + 0.4),
        new THREE.MeshLambertMaterial({ color: 0x555555 })
      );
      roofCap.position.set(x, bh + 0.18, z);
      scene.add(roofCap);

      // — Antenne —
      if (rnd() > 0.42) {
        const ah = rr(1.2, 4.0);
        const ant = new THREE.Mesh(
          new THREE.BoxGeometry(0.1, ah, 0.1),
          new THREE.MeshLambertMaterial({ color: 0x222222 })
        );
        ant.position.set(
          x + rr(-bw * 0.3, bw * 0.3),
          bh + ah / 2 + 0.35,
          z + rr(-bd * 0.3, bd * 0.3)
        );
        scene.add(ant);
      }

      // — Cheminée —
      if (rnd() > 0.48) {
        const chH = rr(0.7, 1.8);
        const chim = new THREE.Mesh(
          new THREE.BoxGeometry(0.78, chH, 0.78),
          new THREE.MeshLambertMaterial({ color: 0x7a3f2e })
        );
        chim.position.set(
          x + rr(-bw * 0.28, bw * 0.28),
          bh + chH / 2 + 0.35,
          z + rr(-bd * 0.28, bd * 0.28)
        );
        scene.add(chim);
      }

      // — Penthouse (bâtiments downtown seulement) —
      if (type === 2 && rnd() > 0.5) {
        const ph = rr(3, 8);
        const pw = bw * rr(0.35, 0.6);
        const pd = bd * rr(0.35, 0.6);
        const penth = new THREE.Mesh(
          new THREE.BoxGeometry(pw, ph, pd),
          new THREE.MeshLambertMaterial({ color: fc })
        );
        penth.position.set(
          x + rr(-bw * 0.1, bw * 0.1),
          bh + ph / 2 + 0.35,
          z + rr(-bd * 0.1, bd * 0.1)
        );
        penth.castShadow = true;
        scene.add(penth);
      }

      // — Unités de climatisation (commerce/résidentiel) —
      if (type < 2 && rnd() > 0.55) {
        const n = ri(1, 3);
        for (let k = 0; k < n; k++) {
          const ac = new THREE.Mesh(
            new THREE.BoxGeometry(rr(0.6, 1.1), rr(0.4, 0.7), rr(0.5, 0.9)),
            new THREE.MeshLambertMaterial({ color: 0x9090a0 })
          );
          ac.position.set(
            x + rr(-bw * 0.35, bw * 0.35),
            bh + 0.4,
            z + rr(-bd * 0.35, bd * 0.35)
          );
          scene.add(ac);
        }
      }
    }

    // ── Zones de placement des bâtiments ──
    // _INN  = bord intérieur (depuis trottoir côté centre)
    // _EDGE = bord extérieur (depuis trottoir côté périphérie)
    const _INN  = 17.7;   // 28 - (6.5 + 2.8) - 1
    const _EDGE = 38.3;   // 28 + (6.5 + 2.8) + 1
    const _LIM  = 70;     // profondeur max de placement

    const BLDG_ZONES = [
      { x1: -_INN,  x2:  _INN,  z1: -_INN,  z2:  _INN,  type: 2, step: 11 }, // downtown
      { x1: -_INN,  x2:  _INN,  z1: -_LIM,  z2: -_EDGE, type: 1, step: 12 }, // N commercial
      { x1: -_INN,  x2:  _INN,  z1:  _EDGE, z2:  _LIM,  type: 1, step: 12 }, // S commercial
      { x1: -_LIM,  x2: -_EDGE, z1: -_INN,  z2:  _INN,  type: 1, step: 12 }, // W commercial
      { x1:  _EDGE, x2:  _LIM,  z1: -_INN,  z2:  _INN,  type: 1, step: 12 }, // E commercial
      { x1: -_LIM,  x2: -_EDGE, z1: -_LIM,  z2: -_EDGE, type: 0, step: 10 }, // NW résidentiel
      { x1:  _EDGE, x2:  _LIM,  z1: -_LIM,  z2: -_EDGE, type: 0, step: 10 }, // NE résidentiel
      { x1: -_LIM,  x2: -_EDGE, z1:  _EDGE, z2:  _LIM,  type: 0, step: 10 }, // SW résidentiel
      { x1:  _EDGE, x2:  _LIM,  z1:  _EDGE, z2:  _LIM,  type: 0, step: 10 }, // SE résidentiel
    ];

    BLDG_ZONES.forEach(({ x1, x2, z1, z2, type, step }) => {
      for (let bx = x1 + step * 0.5; bx < x2 - step * 0.1; bx += step) {
        for (let bz = z1 + step * 0.5; bz < z2 - step * 0.1; bz += step) {
          makeBuilding(
            bx + rr(-step * 0.18, step * 0.18),
            bz + rr(-step * 0.18, step * 0.18),
            type
          );
        }
      }
    });

    // ════════════════════════════════════════
    //  ARBRES (alignés sur les trottoirs)
    // ════════════════════════════════════════
    const matTrunk   = new THREE.MeshLambertMaterial({ color: 0x5c3a1e });
    const FOLIAGE_CS = [0x2d7a2d, 0x3d8a2d, 0x257825, 0x3a8030, 0x48903a];
    const geoTrunkSh = new THREE.CylinderGeometry(0.17, 0.23, 1.5, 6);

    function makeTree(tx, tz) {
      const trk = new THREE.Mesh(geoTrunkSh, matTrunk);
      trk.position.set(tx, 0.75, tz);
      trk.castShadow = true;
      scene.add(trk);
      const r   = rr(1.0, 1.6);
      const col = FOLIAGE_CS[Math.floor(rnd() * FOLIAGE_CS.length)];
      const fol = new THREE.Mesh(
        new THREE.SphereGeometry(r, 7, 6),
        new THREE.MeshLambertMaterial({ color: col })
      );
      fol.position.set(tx, 1.5 + r * 0.85, tz);
      fol.rotation.y = rnd() * Math.PI * 2;
      fol.castShadow = true;
      scene.add(fol);
    }

    // Centre de trottoir = axe route ± (demi-route + demi-trottoir)
    const SW_MID   = RD_W / 2 + SW_W / 2; // 6.5 + 1.4 = 7.9
    const TREE_STP = 13;

    // Le long des routes horizontales (arbres espacés sur l'axe X)
    RD_POS.forEach(rz => {
      [-1, 1].forEach(side => {
        const tz = rz + side * SW_MID;
        for (let tx = -WORLD / 2 + 6; tx < WORLD / 2; tx += TREE_STP) {
          const nearV = RD_POS.some(rx => Math.abs(tx - rx) < RD_W / 2 + 2);
          if (!nearV) makeTree(tx, tz);
        }
      });
    });

    // Le long des routes verticales (arbres espacés sur l'axe Z)
    RD_POS.forEach(rx => {
      [-1, 1].forEach(side => {
        const tx = rx + side * SW_MID;
        for (let tz = -WORLD / 2 + 6; tz < WORLD / 2; tz += TREE_STP) {
          const nearH = RD_POS.some(rz => Math.abs(tz - rz) < RD_W / 2 + 2);
          if (!nearH) makeTree(tx, tz);
        }
      });
    });

    // ════════════════════════════════════════
    //  LAMPADAIRES
    // ════════════════════════════════════════
    const matPoleL  = new THREE.MeshLambertMaterial({ color: 0x787878 });
    const matGlobeL = new THREE.MeshLambertMaterial({
      color: 0xfff4c0, emissive: new THREE.Color(0xffd060), emissiveIntensity: 0.5
    });
    const geoPoleL  = new THREE.CylinderGeometry(0.055, 0.085, 5.2, 6);
    const geoArmL   = new THREE.BoxGeometry(1.4, 0.07, 0.07);
    const geoGlobeL = new THREE.SphereGeometry(0.18, 7, 6);

    // armRotY : orientation du bras (angle Y, 0 = bras en +X)
    function makeLamp(lx, lz, armRotY) {
      const g = new THREE.Group();

      // Fût vertical
      const pole = new THREE.Mesh(geoPoleL, matPoleL);
      pole.position.y = 2.6;
      g.add(pole);

      // Sous-groupe bras + globe, orientable
      const armGrp = new THREE.Group();
      armGrp.position.y   = 5.15;
      armGrp.rotation.y   = armRotY;

      const arm = new THREE.Mesh(geoArmL, matPoleL);
      arm.position.set(0.7, 0, 0);
      armGrp.add(arm);

      const bulb = new THREE.Mesh(geoGlobeL, matGlobeL);
      bulb.position.set(1.35, -0.15, 0);
      armGrp.add(bulb);

      g.add(armGrp);
      g.position.set(lx, 0, lz);
      scene.add(g);
    }

    const LAMP_STP = 22;
    const LAMP_OFF = SW_MID - 0.3; // légèrement vers la route par rapport au centre du trottoir

    // Lampadaires routes horizontales — bras orienté perpendiculairement (vers ±Z)
    RD_POS.forEach(rz => {
      [-1, 1].forEach(side => {
        const lz      = rz + side * LAMP_OFF;
        // side>0 → lampe au nord de la route → bras pointe sud (-Z) → armRotY = PI/2
        // side<0 → lampe au sud → bras pointe nord (+Z) → armRotY = -PI/2
        const armRotY = side > 0 ? Math.PI / 2 : -Math.PI / 2;
        for (let lx = -WORLD / 2 + LAMP_STP * 0.4; lx < WORLD / 2; lx += LAMP_STP) {
          const nearV = RD_POS.some(rx => Math.abs(lx - rx) < RD_W / 2 + 1);
          if (!nearV) makeLamp(lx, lz, armRotY);
        }
      });
    });

    // Lampadaires routes verticales — bras orienté vers ±X
    RD_POS.forEach(rx => {
      [-1, 1].forEach(side => {
        const lx      = rx + side * LAMP_OFF;
        // side>0 → lampe à l'est → bras pointe ouest (-X) → armRotY = PI
        // side<0 → lampe à l'ouest → bras pointe est (+X) → armRotY = 0
        const armRotY = side > 0 ? Math.PI : 0;
        for (let lz = -WORLD / 2 + LAMP_STP * 0.4; lz < WORLD / 2; lz += LAMP_STP) {
          const nearH = RD_POS.some(rz => Math.abs(lz - rz) < RD_W / 2 + 1);
          if (!nearH) makeLamp(lx, lz, armRotY);
        }
      });
    });

    // ════════════════════════════════════════
    //  VOITURES PNJ — npcCars (15 véhicules)
    //  Ligne droite sur leur route, rebouclage aux bords du monde
    // ════════════════════════════════════════

    // 4 routes disponibles
    // axis:'x' = horizontale (t varie sur X, fixed = z constant)
    // axis:'z' = verticale   (t varie sur Z, fixed = x constant)
    const NPC_ROUTES = [
      { axis: 'x', fixed: -28 },
      { axis: 'x', fixed:  28 },
      { axis: 'z', fixed: -28 },
      { axis: 'z', fixed:  28 },
    ];
    const NPC_COLORS = [0xcc1111, 0x2255cc, 0xffffff, 0x888888, 0xeecc00];
    const NPC_BOUND  = WORLD / 2 - 3; // borne de rebouclage (±117)

    function buildNPCBox(color) {
      const g   = new THREE.Group();
      const mat = new THREE.MeshLambertMaterial({ color });
      // Caisse
      const body = new THREE.Mesh(new THREE.BoxGeometry(2.0, 0.72, 4.0), mat);
      body.position.y = 0.36;
      body.castShadow = true;
      g.add(body);
      // Cabine
      const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.7, 0.56, 1.8), mat);
      cabin.position.set(0, 0.72 + 0.28, -0.15);
      cabin.castShadow = true;
      g.add(cabin);
      return g;
    }

    const npcCars = [];
    for (let i = 0; i < 15; i++) {
      const route = NPC_ROUTES[Math.floor(rnd() * 4)];
      const dir   = rnd() < 0.5 ? 1 : -1;
      const t     = (rnd() * 2 - 1) * NPC_BOUND;
      const speed = 6 + rnd() * 10;   // 6–16 u/s
      const color = NPC_COLORS[Math.floor(rnd() * NPC_COLORS.length)];
      const mesh  = buildNPCBox(color);

      if (route.axis === 'x') {
        mesh.position.set(t, 0, route.fixed + dir * 3);
        mesh.rotation.y = dir > 0 ? -Math.PI / 2 : Math.PI / 2;
      } else {
        mesh.position.set(route.fixed - dir * 3, 0, t);
        mesh.rotation.y = dir > 0 ? 0 : Math.PI;
      }
      scene.add(mesh);
      npcCars.push({ mesh, route, dir, t, speed });
    }

    // ════════════════════════════════════════
    //  VOITURE JOUEUR
    //  Type : berline rouge, mesh box simple
    //  Structure : caisse + cabine + 4 roues
    // ════════════════════════════════════════
    const CAR_L = 4.2;
    const CAR_W = 2.0;
    const CAR_H = 0.75;

    const playerCar = new THREE.Group();

    // — caisse
    const matBody = new THREE.MeshLambertMaterial({ color: 0xcc1111 });
    const bodyMesh = new THREE.Mesh(
      new THREE.BoxGeometry(CAR_W, CAR_H, CAR_L),
      matBody
    );
    bodyMesh.position.y = CAR_H / 2;
    bodyMesh.castShadow = true;
    playerCar.add(bodyMesh);

    // — cabine
    const matCabin = new THREE.MeshLambertMaterial({ color: 0xe82020 });
    const cabinMesh = new THREE.Mesh(
      new THREE.BoxGeometry(CAR_W * 0.88, CAR_H * 0.85, CAR_L * 0.52),
      matCabin
    );
    cabinMesh.position.set(0, CAR_H + (CAR_H * 0.85) / 2, -0.25);
    cabinMesh.castShadow = true;
    playerCar.add(cabinMesh);

    // — vitres (teintées sombres)
    const matGlass = new THREE.MeshLambertMaterial({ color: 0x1a2a3a, transparent: true, opacity: 0.7 });
    const windshield = new THREE.Mesh(
      new THREE.BoxGeometry(CAR_W * 0.82, CAR_H * 0.65, 0.05),
      matGlass
    );
    windshield.position.set(0, CAR_H + 0.38, -0.25 + CAR_L * 0.52 / 2 + 0.03);
    playerCar.add(windshield);

    // — phares avant (jaune clair)
    const matHead = new THREE.MeshLambertMaterial({ color: 0xffee88 });
    [-0.65, 0.65].forEach(side => {
      const h = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.2, 0.05), matHead);
      h.position.set(side, CAR_H * 0.55, CAR_L / 2 + 0.03);
      playerCar.add(h);
    });

    // — roues (cylindres noirs)
    const matWheel = new THREE.MeshLambertMaterial({ color: 0x111111 });
    const matRim   = new THREE.MeshLambertMaterial({ color: 0x888888 });
    const wheelR   = 0.34;
    const wheelW   = 0.22;
    const wheelPosArr = [
      [-CAR_W / 2 - 0.08,  wheelR,  CAR_L / 2 - 0.85],
      [ CAR_W / 2 + 0.08,  wheelR,  CAR_L / 2 - 0.85],
      [-CAR_W / 2 - 0.08,  wheelR, -CAR_L / 2 + 0.85],
      [ CAR_W / 2 + 0.08,  wheelR, -CAR_L / 2 + 0.85],
    ];
    wheelPosArr.forEach(([wx, wy, wz]) => {
      const wg = new THREE.Group();
      const tire = new THREE.Mesh(
        new THREE.CylinderGeometry(wheelR, wheelR, wheelW, 14),
        matWheel
      );
      tire.rotation.z = Math.PI / 2;
      wg.add(tire);
      const rim = new THREE.Mesh(
        new THREE.CylinderGeometry(wheelR * 0.55, wheelR * 0.55, wheelW + 0.01, 8),
        matRim
      );
      rim.rotation.z = Math.PI / 2;
      wg.add(rim);
      wg.position.set(wx, wy, wz);
      playerCar.add(wg);
    });

    playerCar.position.set(0, 0, -10);
    scene.add(playerCar);

    // ════════════════════════════════════════
    //  CLAVIER
    // ════════════════════════════════════════
    const keys = {};
    document.addEventListener('keydown', e => { keys[e.code] = true;  e.preventDefault(); });
    document.addEventListener('keyup',   e => { keys[e.code] = false; });

    // ════════════════════════════════════════
    //  PHYSIQUE VOITURE
    // ════════════════════════════════════════
    let carSpeed   = 0;   // unités/s
    let carAngle   = 0;   // cap (rad)

    const MAX_FWD   = 20;
    const MAX_REV   = 8;
    const ACCEL     = 12;
    const BRAKE     = 18;
    const FRICTION  = 5;
    const TURN_SPD  = 1.9; // rad/s

    // ════════════════════════════════════════
    //  CAMÉRA 3ÈME PERSONNE
    // ════════════════════════════════════════
    let camYaw = 0;
    const CAM_DIST   = 11;
    const CAM_HEIGHT = 4.5;
    const CAM_SMOOTH = 0.06;

    // ════════════════════════════════════════
    //  BOUCLE PRINCIPALE
    // ════════════════════════════════════════
    const clock = new THREE.Clock();

    function update(dt) {
      // ── touches ZQSD / WASD ──
      const fwd  = keys['KeyW'] || keys['KeyZ'];
      const rev  = keys['KeyS'];
      const left = keys['KeyA'] || keys['KeyQ'];
      const rgt  = keys['KeyD'];

      // Accélération
      if (fwd) {
        carSpeed = Math.min(carSpeed + ACCEL * dt, MAX_FWD);
      } else if (rev) {
        carSpeed = Math.max(carSpeed - BRAKE * dt, -MAX_REV);
      } else {
        // Frottement
        if (carSpeed > 0) carSpeed = Math.max(carSpeed - FRICTION * dt, 0);
        else              carSpeed = Math.min(carSpeed + FRICTION * dt, 0);
      }

      // Braquage (proportionnel à la vitesse)
      if (Math.abs(carSpeed) > 0.2) {
        const dir = carSpeed > 0 ? 1 : -1;
        const ts  = TURN_SPD * Math.min(Math.abs(carSpeed) / MAX_FWD, 1);
        if (left) carAngle += ts * dt * dir;
        if (rgt)  carAngle -= ts * dt * dir;
      }

      // Déplacement
      playerCar.position.x += Math.sin(carAngle) * carSpeed * dt;
      playerCar.position.z += Math.cos(carAngle) * carSpeed * dt;
      playerCar.rotation.y  = carAngle;

      // Limites monde
      const BOUND = WORLD / 2 - 3;
      playerCar.position.x = Math.max(-BOUND, Math.min(BOUND, playerCar.position.x));
      playerCar.position.z = Math.max(-BOUND, Math.min(BOUND, playerCar.position.z));

      // ── Caméra 3ème personne ──
      camYaw += (carAngle - camYaw) * CAM_SMOOTH;
      camera.position.x = playerCar.position.x - Math.sin(camYaw) * CAM_DIST;
      camera.position.z = playerCar.position.z - Math.cos(camYaw) * CAM_DIST;
      camera.position.y = CAM_HEIGHT;
      camera.lookAt(
        playerCar.position.x,
        playerCar.position.y + 0.8,
        playerCar.position.z
      );

      // ── PNJ ──
      npcCars.forEach(npc => {
        npc.t += npc.dir * npc.speed * dt;
        if (npc.t >  NPC_BOUND) npc.t -= NPC_BOUND * 2;
        if (npc.t < -NPC_BOUND) npc.t += NPC_BOUND * 2;
        if (npc.route.axis === 'x') {
          npc.mesh.position.x = npc.t;
        } else {
          npc.mesh.position.z = npc.t;
        }
      });

      // ── HUD vitesse (km/h) ──
      document.getElementById('speed-display').textContent =
        Math.abs(Math.round(carSpeed * 3.6));
    }

    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.min(clock.getDelta(), 0.05);
      update(dt);
      renderer.render(scene, camera);
    }
    animate();

    // ════════════════════════════════════════
    //  RESIZE
    // ════════════════════════════════════════
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
