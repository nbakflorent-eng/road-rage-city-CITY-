<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Road Rage City</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; }
  body { background: #87ceeb; overflow: hidden; }
  canvas { display: block; }
  #hud {
    position: fixed; top: 16px; left: 16px;
    color: #fff; font-family: 'Courier New', monospace;
    font-size: 13px; text-shadow: 1px 1px 3px #000;
    pointer-events: none; user-select: none; z-index: 10;
  }
  #hud .label { opacity: 0.85; }
  #hud .value { font-weight: bold; font-size: 20px; }
  #speed-wrap { margin-top: 6px; }
  #minimap {
    position: fixed; bottom: 16px; left: 16px;
    width: 160px; height: 160px;
    border-radius: 50%; border: 2px solid #fff;
    pointer-events: none; z-index: 10;
  }
  #mm-labels {
    position: fixed; bottom: 184px; left: 16px;
    color: #fff; font-family: 'Courier New', monospace;
    font-size: 10px; pointer-events: none;
    text-shadow: 1px 1px 2px #000; z-index: 10;
    line-height: 1.5;
  }
</style>
</head>
<body>
  <div id="hud">
    <div class="label">ZQSD / WASD — conduire</div>
    <div id="speed-wrap"><span class="label">Vitesse : </span><span class="value" id="speed">0</span><span class="label"> km/h</span></div>
  </div>
  <div id="mm-labels">
    <div>K = mini</div><div>Y = moyen</div><div>I = grand</div><div>M = pleine carte</div>
  </div>
  <canvas id="minimap" width="160" height="160"></canvas>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <script>
  (function(){
    const BASE = 'https://nbakflorent-eng.github.io/road-rage-city-CITY-/';

    // ─────────── SCENE / CAMERA / RENDERER ───────────
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 600);
    camera.position.set(0, 15, -45);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio || 1);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x87ceeb);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // ─────────── LIGHTS ───────────
    scene.add(new THREE.AmbientLight(0xffffff, 1.8));
    const sun = new THREE.DirectionalLight(0xffffff, 0.8);
    sun.position.set(50, 100, 50);
    sun.castShadow = true;
    sun.shadow.mapSize.set(1024, 1024);
    sun.shadow.camera.left = -200;
    sun.shadow.camera.right = 200;
    sun.shadow.camera.top = 200;
    sun.shadow.camera.bottom = -200;
    sun.shadow.camera.near = 0.5;
    sun.shadow.camera.far = 400;
    scene.add(sun);

    // ─────────── SOL ───────────
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(500, 500),
      new THREE.MeshLambertMaterial({ color: 0x444444 })
    );
    ground.rotation.x = -Math.PI/2;
    ground.position.y = 0;
    ground.receiveShadow = true;
    scene.add(ground);

    // Pelouse douce sous la grille (verte clair pour contraste)
    const grass = new THREE.Mesh(
      new THREE.PlaneGeometry(420, 420),
      new THREE.MeshLambertMaterial({ color: 0x3a5a2a })
    );
    grass.rotation.x = -Math.PI/2;
    grass.position.y = 0.005;
    grass.receiveShadow = true;
    scene.add(grass);

    // ─────────── ROUTES ───────────
    const ROADS = [-120,-80,-40,0,40,80,120];
    const ROAD_W = 10;
    const ROAD_LEN = 280;
    const roadMat = new THREE.MeshLambertMaterial({ color: 0x333333 });
    const lineMat = new THREE.MeshBasicMaterial({ color: 0xFFDD00 });
    const sidewalkMat = new THREE.MeshLambertMaterial({ color: 0xeeeeee });

    function makeRoads() {
      ROADS.forEach(z => {
        const r = new THREE.Mesh(new THREE.PlaneGeometry(ROAD_LEN, ROAD_W), roadMat);
        r.rotation.x = -Math.PI/2; r.position.set(0, 0.01, z);
        r.receiveShadow = true; scene.add(r);
        [-1, 1].forEach(s => {
          const sw = new THREE.Mesh(new THREE.PlaneGeometry(ROAD_LEN, 2), sidewalkMat);
          sw.rotation.x = -Math.PI/2;
          sw.position.set(0, 0.02, z + s*(ROAD_W/2 + 1));
          sw.receiveShadow = true; scene.add(sw);
        });
        for (let x = -130; x < 130; x += 8) {
          const d = new THREE.Mesh(new THREE.PlaneGeometry(3, 0.25), lineMat);
          d.rotation.x = -Math.PI/2; d.position.set(x, 0.05, z); scene.add(d);
        }
      });
      ROADS.forEach(x => {
        const r = new THREE.Mesh(new THREE.PlaneGeometry(ROAD_W, ROAD_LEN), roadMat);
        r.rotation.x = -Math.PI/2; r.position.set(x, 0.01, 0);
        r.receiveShadow = true; scene.add(r);
        [-1, 1].forEach(s => {
          const sw = new THREE.Mesh(new THREE.PlaneGeometry(2, ROAD_LEN), sidewalkMat);
          sw.rotation.x = -Math.PI/2;
          sw.position.set(x + s*(ROAD_W/2 + 1), 0.02, 0);
          sw.receiveShadow = true; scene.add(sw);
        });
        for (let z = -130; z < 130; z += 8) {
          const d = new THREE.Mesh(new THREE.PlaneGeometry(0.25, 3), lineMat);
          d.rotation.x = -Math.PI/2; d.position.set(x, 0.05, z); scene.add(d);
        }
      });
    }

    // ─────────── HELPERS BÂTIMENTS ───────────
    let buildingBounds = [];
    function onRoad(bx, bz) {
      return ROADS.some(r => Math.abs(bx-r)<8 || Math.abs(bz-r)<8);
    }
    function rotForCenter(cx, cz) {
      if (Math.abs(cx) > Math.abs(cz)) return cx > 0 ? -Math.PI/2 : Math.PI/2;
      return cz > 0 ? Math.PI : 0;
    }

    let _loader = null;
    function getLoader() {
      if (_loader) return _loader;
      try { _loader = new THREE.GLTFLoader(); } catch(e) { console.warn('GLTFLoader indispo:', e); _loader = null; }
      return _loader;
    }

    function _fallbackBox(bx, bz, sx, sy, sz, rotY) {
      const fb = new THREE.Mesh(
        new THREE.BoxGeometry(sx*1.4, sy*1.4, sz*1.4),
        new THREE.MeshLambertMaterial({ color: 0x888899 })
      );
      fb.position.set(bx, sy*0.7, bz);
      fb.rotation.y = rotY;
      fb.castShadow = true; fb.receiveShadow = true;
      scene.add(fb);
      buildingBounds.push({ x: bx, z: bz, hw: sx, hd: sz });
    }

    function loadBuilding(filename, bx, bz, sx, sy, sz, rotY) {
      if (onRoad(bx, bz)) return;
      const loader = getLoader();
      if (!loader) { _fallbackBox(bx, bz, sx, sy, sz, rotY); return; }
      loader.load(BASE + filename, gltf => {
        const g = gltf.scene;
        g.scale.set(sx, sy, sz);
        g.rotation.y = rotY;
        g.traverse(c => { if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; } });
        const box = new THREE.Box3().setFromObject(g);
        g.position.set(bx, -box.min.y + 0.05, bz);
        scene.add(g);
        buildingBounds.push({
          x: bx, z: bz,
          hw: (box.max.x - box.min.x)/2 + 0.5,
          hd: (box.max.z - box.min.z)/2 + 0.5
        });
      }, undefined, () => { _fallbackBox(bx, bz, sx, sy, sz, rotY); });
    }

    function loadProp(filename, bx, bz, scale, rotY) {
      if (onRoad(bx, bz)) return;
      const loader = getLoader();
      if (!loader) return;
      loader.load(BASE + filename, gltf => {
        const g = gltf.scene;
        g.scale.setScalar(scale);
        g.rotation.y = rotY || 0;
        g.traverse(c => { if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; } });
        const box = new THREE.Box3().setFromObject(g);
        g.position.set(bx, -box.min.y + 0.02, bz);
        scene.add(g);
      }, undefined, () => {});
    }

    // ─────────── PROPS PROCÉDURAUX ───────────
    function makeStreetLamp(x, z, style) {
      if (onRoad(x, z)) return;
      const grp = new THREE.Group();
      const h = (style === 'suburb') ? 3.5 : 5.5;
      const pole = new THREE.Mesh(
        new THREE.CylinderGeometry(0.1, 0.13, h, 8),
        new THREE.MeshLambertMaterial({ color: 0x222222 })
      );
      pole.position.y = h/2; pole.castShadow = true;
      grp.add(pole);
      const bulb = new THREE.Mesh(
        new THREE.SphereGeometry(0.28, 12, 8),
        new THREE.MeshBasicMaterial({ color: 0xffeeaa })
      );
      bulb.position.y = h - 0.05;
      grp.add(bulb);
      const arm = new THREE.Mesh(
        new THREE.BoxGeometry(0.6, 0.06, 0.06),
        new THREE.MeshLambertMaterial({ color: 0x222222 })
      );
      arm.position.set(0.3, h - 0.15, 0);
      grp.add(arm);
      grp.position.set(x, 0, z);
      scene.add(grp);
    }

    function makeFence(cx, cz, length, rotY) {
      const grp = new THREE.Group();
      const postCount = Math.max(2, Math.round(length/1.5)+1);
      const woodMat = new THREE.MeshLambertMaterial({ color: 0x8B5A2B });
      const postMat = new THREE.MeshLambertMaterial({ color: 0x666666 });
      for (let i = 0; i < postCount; i++) {
        const px = -length/2 + i*(length/(postCount-1));
        const post = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.95, 0.18), postMat);
        post.position.set(px, 0.475, 0); post.castShadow = true;
        grp.add(post);
      }
      for (let p = 0; p < 2; p++) {
        const plank = new THREE.Mesh(new THREE.BoxGeometry(length, 0.13, 0.06), woodMat);
        plank.position.set(0, 0.25 + p*0.42, 0); plank.castShadow = true;
        grp.add(plank);
      }
      grp.rotation.y = rotY;
      grp.position.set(cx, 0, cz);
      scene.add(grp);
    }

    // ─────────── ASSETS POOLS ───────────
    const SKY_FILES = ['building-skyscraper-a.glb','building-skyscraper-b.glb','building-skyscraper-c.glb','building-skyscraper-d.glb','building-skyscraper-e.glb'];
    const SKY_Y = [13, 15, 11, 14, 12];
    const MID_FILES = ['building-a.glb','building-b.glb','building-c.glb','building-d.glb','building-e.glb','building-f.glb','building-g.glb','building-h.glb','building-i.glb','building-j.glb'];
    const MID_Y = [7, 9, 6, 8];
    const HOUSE_FILES = ['building-type-a.glb','building-type-b.glb','building-type-c.glb','building-type-d.glb','building-type-e.glb','building-type-f.glb','building-type-g.glb','building-type-h.glb'];
    const SMALL_FILES = ['building-a.glb','building-b.glb','building-c.glb','building-d.glb'];
    const LOW_FILES = ['low-detail-building-a.glb','low-detail-building-b.glb','low-detail-building-c.glb','low-detail-building-d.glb','low-detail-building-e.glb'];

    const CENTERS = [-100,-60,-20,20,60,100];
    const BORDER_CENTERS = [-160,-120,-80,-40,0,40,80,120,160];

    // ─────────── ZONE CENTRE ───────────
    function createDowntown() {
      let i = 0;
      CENTERS.forEach(cx => {
        CENTERS.forEach(cz => {
          if (Math.abs(cx) > 80 || Math.abs(cz) > 80) return;
          const ry = rotForCenter(cx, cz);
          [-8, 0, 8].forEach((dx, k) => {
            const useSky = (((cx + cz)/40 + k) & 1) === 0;
            if (useSky) {
              loadBuilding(SKY_FILES[i % SKY_FILES.length], cx+dx, cz, 5, SKY_Y[i % SKY_Y.length], 5, ry);
            } else {
              loadBuilding(MID_FILES[i % MID_FILES.length], cx+dx, cz, 4, MID_Y[i % MID_Y.length], 4, ry);
            }
            i++;
          });
          loadProp('tree_oak.glb', cx-12, cz-12, 4, 0);
          loadProp('tree_oak.glb', cx+12, cz+12, 4, 0);
          [[-20,-20],[20,-20],[-20,20],[20,20]].forEach(p => {
            makeStreetLamp(cx+p[0], cz+p[1], 'city');
            loadProp('detail-light-traffic.glb', cx+p[0]+2, cz+p[1]+2, 3, 0);
          });
        });
      });
    }

    // ─────────── ZONE BANLIEUE ───────────
    function createSuburbs() {
      let i = 0;
      CENTERS.forEach(cx => {
        CENTERS.forEach(cz => {
          if (Math.abs(cx) <= 80 && Math.abs(cz) <= 80) return;
          const ry = rotForCenter(cx, cz);
          const lawn = new THREE.Mesh(
            new THREE.PlaneGeometry(12, 12),
            new THREE.MeshLambertMaterial({ color: 0x4a7c3f })
          );
          lawn.rotation.x = -Math.PI/2;
          lawn.position.set(cx, 0.02, cz);
          lawn.receiveShadow = true;
          scene.add(lawn);

          [[-6,-6],[6,-6],[-6,6],[6,6]].forEach((p, k) => {
            const useHouse = (k % 2 === 0);
            if (useHouse) {
              loadBuilding(HOUSE_FILES[i % HOUSE_FILES.length], cx+p[0], cz+p[1], 3.5, 3.5, 3.5, ry);
            } else {
              loadBuilding(SMALL_FILES[i % SMALL_FILES.length], cx+p[0], cz+p[1], 3, 5, 3, ry);
            }
            i++;
          });
          loadProp('tree-small.glb', cx-2, cz, 3, 0);
          loadProp('tree_oak.glb', cx+3, cz+2, 2.5, 0);

          if (cz > 0) makeFence(cx, cz-9, 10, 0);
          else        makeFence(cx, cz+9, 10, 0);

          [[-20,-20],[20,-20],[-20,20],[20,20]].forEach(p => {
            makeStreetLamp(cx+p[0], cz+p[1], 'suburb');
          });
        });
      });
    }

    // ─────────── BORDURE ───────────
    function createBorder() {
      let i = 0;
      BORDER_CENTERS.forEach(cx => {
        BORDER_CENTERS.forEach(cz => {
          if (Math.abs(cx) <= 120 && Math.abs(cz) <= 120) return;
          const ry = rotForCenter(cx, cz);
          [[-5,0],[5,0]].forEach(p => {
            loadBuilding(LOW_FILES[i % LOW_FILES.length], cx+p[0], cz+p[1], 5, 5, 5, ry);
            i++;
          });
        });
      });
    }

    // ─────────── VOITURE JOUEUR ───────────
    const car = new THREE.Group();
    const bodyMat = new THREE.MeshLambertMaterial({ color: 0xcc0000 });
    const roofMat = new THREE.MeshLambertMaterial({ color: 0xaa0000 });
    const wheelMat = new THREE.MeshLambertMaterial({ color: 0x111111 });

    const body = new THREE.Mesh(new THREE.BoxGeometry(2, 0.6, 1), bodyMat);
    body.position.y = 0.5; body.castShadow = true; car.add(body);

    const roof = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.5, 0.8), roofMat);
    roof.position.set(-0.1, 1.05, 0); roof.castShadow = true; car.add(roof);

    [[-0.7, -0.5],[0.7, -0.5],[-0.7, 0.5],[0.7, 0.5]].forEach(([wx, wz]) => {
      const w = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 0.25, 16), wheelMat);
      w.rotation.x = Math.PI/2;
      w.position.set(wx, 0.3, wz);
      w.castShadow = true;
      car.add(w);
    });

    car.position.set(0, 0.5, -30);
    scene.add(car);

    // ─────────── INPUT ───────────
    const keys = {};
    document.addEventListener('keydown', e => { keys[e.code] = true; });
    document.addEventListener('keyup', e => { keys[e.code] = false; });

    // ─────────── PHYSIQUE ───────────
    let speed = 0;
    let angle = Math.PI/2; // face est
    const MAX_SPEED = 60;
    const MAX_REV = 25;
    const ACCEL = 25;
    const BRAKE = 40;
    const FRICTION_DECAY = 0.5;
    const TURN_SPEED = 1.8;
    const CAM_DIST = 11;
    const CAM_HEIGHT = 5;
    let camYaw = angle;

    function update(dt) {
      const fwd = keys['KeyW'] || keys['KeyZ'];
      const rev = keys['KeyS'];
      const lf = keys['KeyA'] || keys['KeyQ'];
      const rg = keys['KeyD'];

      if (fwd) speed = Math.min(speed + ACCEL*dt, MAX_SPEED);
      else if (rev) speed = Math.max(speed - BRAKE*dt, -MAX_REV);
      else {
        speed *= Math.exp(-FRICTION_DECAY * dt);
        if (Math.abs(speed) < 0.05) speed = 0;
      }

      if (Math.abs(speed) > 0.2) {
        const dir = speed > 0 ? 1 : -1;
        const ts = TURN_SPEED * Math.min(Math.abs(speed)/MAX_SPEED + 0.4, 1);
        if (lf) angle += ts*dt*dir;
        if (rg) angle -= ts*dt*dir;
      }

      car.position.x += Math.sin(angle) * speed * dt;
      car.position.z += Math.cos(angle) * speed * dt;
      car.rotation.y = angle;

      const B = 240;
      car.position.x = Math.max(-B, Math.min(B, car.position.x));
      car.position.z = Math.max(-B, Math.min(B, car.position.z));

      for (const b of buildingBounds) {
        const hw = b.hw||4, hd = b.hd||4, margin = 1.0;
        if (car.position.x > b.x-hw-margin && car.position.x < b.x+hw+margin &&
            car.position.z > b.z-hd-margin && car.position.z < b.z+hd+margin) {
          const oL = (b.x-hw-margin) - car.position.x;
          const oR = car.position.x - (b.x+hw+margin);
          const oF = (b.z-hd-margin) - car.position.z;
          const oB = car.position.z - (b.z+hd+margin);
          const m = Math.max(oL, oR, oF, oB);
          if (m === oL)      car.position.x = b.x-hw-margin;
          else if (m === oR) car.position.x = b.x+hw+margin;
          else if (m === oF) car.position.z = b.z-hd-margin;
          else               car.position.z = b.z+hd+margin;
          speed *= -0.2;
        }
      }

      camYaw += (angle - camYaw) * 0.08;
      camera.position.x = car.position.x - Math.sin(camYaw) * CAM_DIST;
      camera.position.z = car.position.z - Math.cos(camYaw) * CAM_DIST;
      camera.position.y = CAM_HEIGHT;
      camera.lookAt(car.position.x, car.position.y + 1, car.position.z);

      document.getElementById('speed').textContent = Math.abs(Math.round(speed * 3.6));
    }

    // ─────────── MINIMAP ───────────
    const mm = document.getElementById('minimap');
    const mmCtx = mm.getContext('2d');
    const labels = document.getElementById('mm-labels');

    function setMmSize(px) {
      mm.width = px; mm.height = px;
      mm.style.width = px+'px'; mm.style.height = px+'px';
      labels.style.bottom = (px + 24) + 'px';
    }
    document.addEventListener('keydown', e => {
      if (e.code === 'KeyK') setMmSize(160);
      else if (e.code === 'KeyY') setMmSize(240);
      else if (e.code === 'KeyI') setMmSize(360);
      else if (e.code === 'KeyM') setMmSize(mm.width >= 600 ? 160 : 660);
    });

    function drawMinimap() {
      const w = mm.width, h = mm.height;
      const scale = w / 500;
      mmCtx.clearRect(0, 0, w, h);
      mmCtx.save();
      mmCtx.beginPath(); mmCtx.arc(w/2, h/2, w/2 - 2, 0, Math.PI*2);
      mmCtx.fillStyle = 'rgba(20,20,20,0.85)'; mmCtx.fill();
      mmCtx.clip();
      mmCtx.strokeStyle = '#666'; mmCtx.lineWidth = 3;
      ROADS.forEach(r => {
        const p = r*scale + w/2;
        mmCtx.beginPath(); mmCtx.moveTo(0, p); mmCtx.lineTo(w, p); mmCtx.stroke();
        mmCtx.beginPath(); mmCtx.moveTo(p, 0); mmCtx.lineTo(p, h); mmCtx.stroke();
      });
      mmCtx.fillStyle = '#aaa';
      buildingBounds.forEach(b => {
        const mx = b.x*scale + w/2, mz = b.z*scale + h/2;
        const rw = Math.max(2, (b.hw||4)*scale), rh = Math.max(2, (b.hd||4)*scale);
        mmCtx.fillRect(mx-rw, mz-rh, rw*2, rh*2);
      });
      const px = car.position.x*scale + w/2;
      const pz = car.position.z*scale + h/2;
      mmCtx.save();
      mmCtx.translate(px, pz);
      mmCtx.rotate(-car.rotation.y);
      mmCtx.fillStyle = '#FF2200';
      mmCtx.beginPath();
      mmCtx.moveTo(0, -8); mmCtx.lineTo(6, 6); mmCtx.lineTo(-6, 6);
      mmCtx.closePath(); mmCtx.fill();
      mmCtx.restore();
      mmCtx.restore();
    }

    // ─────────── INIT ───────────
    function init() {
      buildingBounds = [];
      makeRoads();
      try { createDowntown(); } catch(e) { console.error('downtown:', e); }
      try { createSuburbs(); } catch(e) { console.error('suburbs:', e); }
      try { createBorder(); }  catch(e) { console.error('border:', e); }
    }
    init();

    // ─────────── BOUCLE ───────────
    const clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.min(clock.getDelta(), 0.05);
      try { update(dt); }            catch(e) { console.error('update:', e); }
      try { renderer.render(scene, camera); } catch(e) { console.error('render:', e); }
      try { drawMinimap(); }         catch(e) { console.error('mm:', e); }
    }
    animate();

    // ─────────── RESIZE ───────────
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth/window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  })();
  </script>
</body>
</html>
