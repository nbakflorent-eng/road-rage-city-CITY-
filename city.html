<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Road Rage City</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }
    #hud {
      position: fixed;
      top: 16px;
      left: 16px;
      color: #fff;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      text-shadow: 1px 1px 3px #000;
      pointer-events: none;
      user-select: none;
    }
    #hud .label { opacity: 0.7; }
    #hud .value { font-weight: bold; font-size: 16px; }
    #speed-wrap { margin-top: 6px; }
    #minimap {
      position: fixed;
      bottom: 16px;
      left: 16px;
      width: 160px;
      height: 160px;
      border-radius: 50%;
      border: 2px solid #fff;
      pointer-events: none;
    }
    #mm-labels {
      position: fixed;
      bottom: 184px;
      left: 16px;
      color: #fff;
      font-family: 'Courier New', monospace;
      font-size: 10px;
      pointer-events: none;
      white-space: nowrap;
      text-shadow: 1px 1px 2px #000;
    }

  </style>
</head>
<body>
  <div id="mm-labels">
    <div>K = mini</div>
    <div>Y = moyen</div>
    <div>I = grand</div>
    <div>M = pleine carte</div>
  </div>
  <canvas id="minimap" width="160" height="160"></canvas>
  <div id="hud">
    <div class="label">ZQSD / WASD — conduire</div>
    <div id="speed-wrap">
      <span class="label">Vitesse : </span>
      <span class="value" id="speed-display">0</span>
      <span class="label"> km/h</span>
    </div>
  </div>

  <!-- Three.js r128 CDN + Loaders -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/FBXLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/libs/fflate.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/utils/SkeletonUtils.js"></script>


  <script>
    // ════════════════════════════════════════
    //  SCENE
    // ════════════════════════════════════════
    const scene = new THREE.Scene();
    scene.add(new THREE.AmbientLight(0xffffff, 1.0));
    const sun = new THREE.DirectionalLight(0xffffff, 1.0);
    sun.position.set(100, 200, 100);
    scene.add(sun);
    const sun2 = new THREE.DirectionalLight(0xffffff, 0.4);
    sun2.position.set(-100, 100, -100);
    scene.add(sun2);
    scene.background = new THREE.Color(0x87CEEB); // ciel bleu
    scene.fog = new THREE.Fog(0x87CEEB, 90, 220);

    const camera = new THREE.PerspectiveCamera(
      60, window.innerWidth / window.innerHeight, 0.1, 500
    );

    const renderer = new THREE.WebGLRenderer({ antialias: false });
    renderer.setPixelRatio(1);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = false;
    document.body.appendChild(renderer.domElement);

    const _mapRenderer = new THREE.WebGLRenderer({antialias:false});
    _mapRenderer.setSize(660,660);
    _mapRenderer.setClearColor(0xFF0000, 1);
    const _mapCam = new THREE.OrthographicCamera(-220,220,220,-220,0.1,2000);
    _mapCam.up.set(0,0,-1);
    _mapCam.position.set(0,400,0);
    _mapCam.lookAt(0,0,0);
    _mapCam.layers.enableAll();
    const _mapDiv = document.createElement('div');
    _mapDiv.id='_mapDiv';
    _mapDiv.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:660px;height:660px;display:none;z-index:1000000;border:3px solid white;border-radius:12px;overflow:hidden';
    const _mapLabel = document.createElement('div');
    _mapLabel.style.cssText='position:absolute;top:8px;left:50%;transform:translateX(-50%);color:white;font-size:13px;z-index:1000001;pointer-events:none;font-family:monospace';
    _mapLabel.textContent='M = fermer';
    const _mapTriCanvas = document.createElement('canvas');
    _mapTriCanvas.width=660; _mapTriCanvas.height=660;
    _mapTriCanvas.style.cssText='position:absolute;top:0;left:0;pointer-events:none;z-index:1000002';
    _mapDiv.appendChild(_mapRenderer.domElement);
    _mapDiv.appendChild(_mapLabel);
    _mapDiv.appendChild(_mapTriCanvas);
    document.body.appendChild(_mapDiv);
    const _mapCtx = _mapTriCanvas.getContext('2d');

    // ════════════════════════════════════════
    //  LUMIÈRES
    // ════════════════════════════════════════
    const sunLight = new THREE.DirectionalLight(0xfff8e7, 1.3);
    sunLight.position.set(60, 100, 40);
    sunLight.castShadow = true;
    sunLight.shadow.mapSize.set(512, 512);
    sunLight.shadow.camera.near   = 1;
    sunLight.shadow.camera.far    = 300;
    sunLight.shadow.camera.left   = -80;
    sunLight.shadow.camera.right  =  80;
    sunLight.shadow.camera.top    =  80;
    sunLight.shadow.camera.bottom = -80;
    scene.add(sunLight);

    const ambientLight = new THREE.AmbientLight(0x8899bb, 0.65);
    scene.add(ambientLight);

    // ════════════════════════════════════════
    //  CONSTANTES WORLD
    // ════════════════════════════════════════
    const WORLD    = 400;   // taille totale du sol
    const RD_W     = 13;    // largeur route
    const SW_W     = 2.8;   // largeur trottoir
    const RD_POS   = [-60, -20, 20, 60]; // positions des axes (4H + 4V)
    const NPC_BASE = 'https://nbakflorent-eng.github.io/road-rage-city-CITY-/';

    // ════════════════════════════════════════
    //  MATÉRIAUX
    // ════════════════════════════════════════
    const matGrass    = new THREE.MeshBasicMaterial({ color: 0x4a7c3f });
    const matAsphalt  = new THREE.MeshBasicMaterial({ color: 0x2e2e2e });
    const matSidewalk = new THREE.MeshBasicMaterial({ color: 0xc0bfba });
    const matYellow   = new THREE.MeshBasicMaterial({ color: 0xf5c518 });
    const matWhite    = new THREE.MeshBasicMaterial({ color: 0xffffff });

    // ────────────────────────────────────────
    //  SOL (herbe / asphalte de base)
    // ────────────────────────────────────────
    const groundMesh = new THREE.Mesh(
      new THREE.PlaneGeometry(WORLD, WORLD),
      matGrass
    );
    groundMesh.rotation.x = -Math.PI / 2;
    groundMesh.receiveShadow = true;
    scene.add(groundMesh);

    // ────────────────────────────────────────
    //  Helpers de création de plans
    // ────────────────────────────────────────
    function makePlane(mat, x, z, w, d, y = 0.01) {
      const m = new THREE.Mesh(new THREE.PlaneGeometry(w, d), mat);
      m.rotation.x = -Math.PI / 2;
      m.position.set(x, y, z);
      m.receiveShadow = true;
      scene.add(m);
      return m;
    }

    // ────────────────────────────────────────
    //  ROUTES
    //  2 horizontales (axe X, constante en Z)
    //  2 verticales   (axe Z, constante en X)
    // ────────────────────────────────────────
    RD_POS.forEach(rz => makePlane(matAsphalt, 0,  rz, WORLD,  RD_W, 0.02)); // horiz
    RD_POS.forEach(rx => makePlane(matAsphalt, rx, 0,  RD_W, WORLD,  0.02)); // vert

    // ────────────────────────────────────────
    //  INTERSECTIONS (carrés asphalte)
    // ────────────────────────────────────────
    RD_POS.forEach(rx =>
      RD_POS.forEach(rz =>
        makePlane(matAsphalt, rx, rz, RD_W, RD_W, 0.025)
      )
    );

    // ────────────────────────────────────────
    //  TROTTOIRS blancs
    // ────────────────────────────────────────
    RD_POS.forEach(rz => {
      [-1, 1].forEach(s =>
        makePlane(matSidewalk, 0, rz + s * (RD_W / 2 + SW_W / 2), WORLD, SW_W, 0.03)
      );
    });
    RD_POS.forEach(rx => {
      [-1, 1].forEach(s =>
        makePlane(matSidewalk, rx + s * (RD_W / 2 + SW_W / 2), 0, SW_W, WORLD, 0.03)
      );
    });


    // ────────────────────────────────────────
    //  LIGNES JAUNES DISCONTINUES (axe centre)
    // ────────────────────────────────────────
    const DASH_L = 3.0;
    const DASH_G = 2.8;
    const DASH_W = 0.18;
    const STEP   = DASH_L + DASH_G;

    function makeDashes(axis, fixedCoord) {
      const count = Math.floor(WORLD / STEP);
      const start = -WORLD / 2 + DASH_L / 2;
      for (let i = 0; i < count; i++) {
        const t = start + i * STEP;
        const bx = axis === 'x' ? DASH_L : DASH_W;
        const bz = axis === 'x' ? DASH_W  : DASH_L;
        const mesh = new THREE.Mesh(
          new THREE.BoxGeometry(bx, 0.005, bz),
          matYellow
        );
        mesh.position.set(
          axis === 'x' ? t          : fixedCoord,
          0.04,
          axis === 'x' ? fixedCoord : t
        );
        scene.add(mesh);
      }
    }

    RD_POS.forEach(rz => makeDashes('x', rz));
    RD_POS.forEach(rx => makeDashes('z', rx));

    // ════════════════════════════════════════
    //  DÉCOR URBAIN — BÂTIMENTS, ARBRES, LAMPADAIRES
    // ════════════════════════════════════════

    // ── Pseudo-random déterministe (seed fixe → ville identique à chaque chargement) ──
    let _s = 31337;
    function rnd()    { _s = (_s * 1664525 + 1013904223) >>> 0; return _s / 4294967296; }
    function rr(a, b) { return a + rnd() * (b - a); }
    function ri(a, b) { return a + Math.floor(rnd() * (b - a + 1)); }

    // ── Palette façades ──
    const FACADE_PAL = [
      0xd4c9a8, 0xbfc4c8, 0xf2f0ec, 0x9b8b7a,
      0xb8c9d4, 0xc8b89a, 0xb0b8c0, 0xe0d5b5,
      0x7a8c9a, 0xc4b090, 0xe8e0d4, 0xaab8a8,
    ];

    // ── Texture fenêtres (canvas par bâtiment) ──
    function makeWinTex(cols, rows) {
      const cw = 28, ch = 20;
      const cv = document.createElement('canvas');
      cv.width  = cols * cw;
      cv.height = rows * ch;
      const ctx = cv.getContext('2d');
      ctx.fillStyle = '#5a5a5a';
      ctx.fillRect(0, 0, cv.width, cv.height);
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          ctx.fillStyle = rnd() < 0.58 ? '#ffe898' : '#192231';
          ctx.fillRect(c * cw + 3, r * ch + 3, cw - 6, ch - 6);
        }
      }
      return new THREE.CanvasTexture(cv);
    }

    // ── Créer un bâtiment ──
    // type 0 = résidentiel (1-2 ét.), 1 = commerce (3-5 ét.), 2 = downtown (10-30 ét.)
    const buildingBounds = []; // AABB bâtiments pour collision joueur

    function makeBuilding(x, z, type) {
      let bw, bd, bh;
      if      (type === 2) { bw = rr(7.5, 13); bd = rr(7.5, 13); bh = rr(30, 72); }
      else if (type === 1) { bw = rr(7,   12); bd = rr(7,   12); bh = rr(9,  20); }
      else                 { bw = rr(5,    9); bd = rr(5,    9); bh = rr(3.5, 7); }
      buildingBounds.push({ x, z, hw: bw * 0.5 + 0.4, hd: bd * 0.5 + 0.4 });

      const fc        = FACADE_PAL[ri(0, FACADE_PAL.length - 1)];
      const facadeMat = new THREE.MeshBasicMaterial({ color: fc });
      const roofMatB  = new THREE.MeshBasicMaterial({ color: 0x484848 });
      const baseMat2  = new THREE.MeshBasicMaterial({ color: 0x383838 });

      // Texture fenêtres proportionnelle aux dimensions
      const winCols = Math.max(2, Math.round(bw / 2.5));
      const winRows = Math.max(2, Math.round(bh / 3.8));
      const winTex  = makeWinTex(winCols, winRows);
      const winMat  = new THREE.MeshBasicMaterial({ map: winTex });

      // Multi-matériaux BoxGeometry : [+X, -X, +Y, -Y, +Z, -Z]
      // Fenêtres sur les 4 faces verticales, toit/base unis
      const mats = [winMat, winMat, roofMatB, baseMat2, winMat, winMat];
      const body = new THREE.Mesh(new THREE.BoxGeometry(bw, bh, bd), mats);
      body.position.set(x, bh / 2, z);
      body.castShadow    = true;
      body.receiveShadow = true;
      scene.add(body);

      // — Acrotère (toit plat légèrement en saillie) —
      const roofCap = new THREE.Mesh(
        new THREE.BoxGeometry(bw + 0.4, 0.35, bd + 0.4),
        new THREE.MeshBasicMaterial({ color: 0x555555 })
      );
      roofCap.position.set(x, bh + 0.18, z);
      scene.add(roofCap);

      // — Antenne —
      if (rnd() > 0.42) {
        const ah = rr(1.2, 4.0);
        const ant = new THREE.Mesh(
          new THREE.BoxGeometry(0.1, ah, 0.1),
          new THREE.MeshBasicMaterial({ color: 0x222222 })
        );
        ant.position.set(
          x + rr(-bw * 0.3, bw * 0.3),
          bh + ah / 2 + 0.35,
          z + rr(-bd * 0.3, bd * 0.3)
        );
        scene.add(ant);
      }

      // — Cheminée —
      if (rnd() > 0.48) {
        const chH = rr(0.7, 1.8);
        const chim = new THREE.Mesh(
          new THREE.BoxGeometry(0.78, chH, 0.78),
          new THREE.MeshBasicMaterial({ color: 0x7a3f2e })
        );
        chim.position.set(
          x + rr(-bw * 0.28, bw * 0.28),
          bh + chH / 2 + 0.35,
          z + rr(-bd * 0.28, bd * 0.28)
        );
        scene.add(chim);
      }

      // — Penthouse (bâtiments downtown seulement) —
      if (type === 2 && rnd() > 0.5) {
        const ph = rr(3, 8);
        const pw = bw * rr(0.35, 0.6);
        const pd = bd * rr(0.35, 0.6);
        const penth = new THREE.Mesh(
          new THREE.BoxGeometry(pw, ph, pd),
          new THREE.MeshBasicMaterial({ color: fc })
        );
        penth.position.set(
          x + rr(-bw * 0.1, bw * 0.1),
          bh + ph / 2 + 0.35,
          z + rr(-bd * 0.1, bd * 0.1)
        );
        penth.castShadow = true;
        scene.add(penth);
      }

      // — Unités de climatisation (commerce/résidentiel) —
      if (type < 2 && rnd() > 0.55) {
        const n = ri(1, 3);
        for (let k = 0; k < n; k++) {
          const ac = new THREE.Mesh(
            new THREE.BoxGeometry(rr(0.6, 1.1), rr(0.4, 0.7), rr(0.5, 0.9)),
            new THREE.MeshBasicMaterial({ color: 0x9090a0 })
          );
          ac.position.set(
            x + rr(-bw * 0.35, bw * 0.35),
            bh + 0.4,
            z + rr(-bd * 0.35, bd * 0.35)
          );
          scene.add(ac);
        }
      }
    }

    // ── Bâtiments — NOUVEAU SYSTÈME (80 bâtiments, 4 types) ──
    // (ancien spawnBuildings supprimé)
    function spawnBuildings_DISABLED() { // kept for reference only
      const _BPAL = [0x8B6F5E, 0xB8A89A, 0x7A8C7E, 0x9E9086, 0xC4B49A, 0x6B7B8D];
      const _BLOCS = [[-40,-40],[0,-40],[40,-40],[-40,0],[40,0],[-40,40],[0,40],[40,40]];
      const winGeo = new THREE.BoxGeometry(0.8, 1.0, 0.1);
      const winMat = new THREE.MeshBasicMaterial({ color: 0xADD8E6 });
      _BLOCS.forEach(([cx, cz]) => {
        const n = 4 + Math.floor(Math.random() * 2);
        for (let i = 0; i < n; i++) {
          const bw = 6 + Math.random() * 8;
          const bd = 6 + Math.random() * 8;
          const bh = 8 + Math.random() * 17;
          let bx, bz, ok = false;
          for (let attempt = 0; attempt < 10; attempt++) {
            bx = cx + (Math.random() * 22 - 11);
            bz = cz + (Math.random() * 22 - 11);
            const clear = RD_POS.every(r =>
              Math.abs(bx - r) > RD_W / 2 + bw / 2 + 2 &&
              Math.abs(bz - r) > RD_W / 2 + bd / 2 + 2
            );
            if (clear) { ok = true; break; }
          }
          if (!ok) continue;
          const col = _BPAL[Math.floor(Math.random() * _BPAL.length)];
          const grp = new THREE.Group();
          // Corps
          const body = new THREE.Mesh(
            new THREE.BoxGeometry(bw, bh, bd),
            new THREE.MeshBasicMaterial({ color: col })
          );
          body.position.y = bh / 2;
          grp.add(body);
          // Toit (légèrement plus large, plus foncé)
          const roofCol = new THREE.Color(col).multiplyScalar(0.65);
          const roof = new THREE.Mesh(
            new THREE.BoxGeometry(bw + 0.3, 0.5, bd + 0.3),
            new THREE.MeshBasicMaterial({ color: roofCol })
          );
          roof.position.y = bh + 0.25;
          grp.add(roof);
          // Fenêtres sur 4 faces (grille régulière, offset 0.05 anti z-fight)
          const wC = Math.min(3, Math.max(2, Math.floor(bw / 3)));
          const wR = Math.min(4, Math.max(2, Math.floor(bh / 4)));
          for (let r = 0; r < wR; r++) {
            const wy = 1.5 + (bh - 2) / (wR - 1 || 1) * r;
            for (let c = 0; c < wC; c++) {
              const wx = -bw / 2 + bw / (wC + 1) * (c + 1);
              const wz = -bd / 2 + bd / (wC + 1) * (c + 1);
              const wf = new THREE.Mesh(winGeo, winMat); wf.position.set(wx, wy, bd/2+0.05); grp.add(wf);
              const wb = new THREE.Mesh(winGeo, winMat); wb.position.set(wx, wy, -bd/2-0.05); wb.rotation.y = Math.PI; grp.add(wb);
              const wl = new THREE.Mesh(winGeo, winMat); wl.position.set(-bw/2-0.05, wy, wz); wl.rotation.y = -Math.PI/2; grp.add(wl);
              const wr = new THREE.Mesh(winGeo, winMat); wr.position.set(bw/2+0.05, wy, wz); wr.rotation.y = Math.PI/2; grp.add(wr);
            }
          }
          grp.position.set(bx, 0, bz);
          scene.add(grp);
          buildingBounds.push({ x: bx, z: bz, hw: bw/2 + 0.4, hd: bd/2 + 0.4 });
        }
      });
    }
    // spawnBuildings disabled — remplacé par spawnCornerBuildings / spawnExtraBuildings / spawnOuterBuildings / spawnVariedBuildings

    // ════════════════════════════════════════
    //  BÂTIMENTS COINS EXTÉRIEURS
    // ════════════════════════════════════════
    (function spawnCornerBuildings() {
      const _CPAL = [0x8B6F5E, 0xB8A89A, 0x7A8C7E, 0x9E9086, 0xC4B49A, 0x6B7B8D];
      const _CORNERS = [[-80,-80],[80,-80],[-80,80],[80,80]];
      const winGeo = new THREE.BoxGeometry(0.7, 0.9, 0.1);
      const winMat = new THREE.MeshBasicMaterial({ color: 0xADD8E6 });
      _CORNERS.forEach(([cx, cz]) => {
        const n = 3 + Math.floor(Math.random() * 2);
        for (let i = 0; i < n; i++) {
          const bw = 5 + Math.random() * 3;
          const bd = 5 + Math.random() * 3;
          const bh = 4 + Math.random() * 6;
          let bx, bz, ok = false;
          for (let attempt = 0; attempt < 15; attempt++) {
            bx = cx + (Math.random() * 14 - 7);
            bz = cz + (Math.random() * 14 - 7);
            if (RD_POS.every(r => Math.abs(bx - r) > RD_W / 2 + 10 && Math.abs(bz - r) > RD_W / 2 + 10)) { ok = true; break; }
          }
          if (!ok) continue;
          const col = _CPAL[Math.floor(Math.random() * _CPAL.length)];
          const grp = new THREE.Group();
          const body = new THREE.Mesh(new THREE.BoxGeometry(bw, bh, bd), new THREE.MeshBasicMaterial({ color: col }));
          body.position.y = bh / 2; grp.add(body);
          const roof = new THREE.Mesh(new THREE.BoxGeometry(bw+0.3, 0.5, bd+0.3),
            new THREE.MeshBasicMaterial({ color: new THREE.Color(col).multiplyScalar(0.65) }));
          roof.position.y = bh + 0.25; grp.add(roof);
          const wC = Math.max(2, Math.floor(bw / 3)), wR = Math.max(2, Math.floor(bh / 3));
          for (let r = 0; r < wR; r++) {
            const wy = 1.2 + (bh - 1.5) / (wR - 1 || 1) * r;
            for (let c = 0; c < wC; c++) {
              const wx = -bw/2 + bw/(wC+1)*(c+1), wz = -bd/2 + bd/(wC+1)*(c+1);
              const wf = new THREE.Mesh(winGeo, winMat); wf.position.set(wx, wy, bd/2+0.05); grp.add(wf);
              const wb = new THREE.Mesh(winGeo, winMat); wb.position.set(wx, wy, -bd/2-0.05); wb.rotation.y = Math.PI; grp.add(wb);
              const wl = new THREE.Mesh(winGeo, winMat); wl.position.set(-bw/2-0.05, wy, wz); wl.rotation.y = -Math.PI/2; grp.add(wl);
              const wr2 = new THREE.Mesh(winGeo, winMat); wr2.position.set(bw/2+0.05, wy, wz); wr2.rotation.y = Math.PI/2; grp.add(wr2);
            }
          }
          grp.position.set(bx, 0, bz);
          scene.add(grp);
          buildingBounds.push({ x: bx, z: bz, hw: bw/2 + 0.4, hd: bd/2 + 0.4 });
        }
      });
    })();

    // ════════════════════════════════════════
    //  BÂTIMENTS ZONES VIDES (25 supplémentaires)
    // ════════════════════════════════════════
    (function spawnExtraBuildings() {
      const _EPAL = [0x8B6F5E, 0xB8A89A, 0x7A8C7E, 0x9E9086, 0xC4B49A, 0x6B7B8D];
      const winGeo = new THREE.BoxGeometry(0.8, 1.0, 0.1);
      const winMat = new THREE.MeshBasicMaterial({ color: 0xB3D9FF });
      let placed = 0, tries = 0;
      while (placed < 25 && tries++ < 600) {
        const bw = 6 + Math.random() * 6;
        const bd = 6 + Math.random() * 6;
        const bh = 5 + Math.random() * 13;
        const bx = -90 + Math.random() * 180;
        const bz = -90 + Math.random() * 180;

    // ════════════════════════════════════════

    // ── GLTFLoader — URL absolue + résolution texture depuis racine du repo ──
    function _loadGLB(key, cb) {
      const manager = new THREE.LoadingManager();
      // Redirige toutes les ressources (y compris Textures/colormap.png) vers la racine
      manager.setURLModifier(url => { const f = url.split('/').pop(); if (/^[0-9a-f-]{36}$/.test(f)) return url; return NPC_BASE + encodeURIComponent(f); });
      const loader = new THREE.GLTFLoader(manager);
      loader.load(NPC_BASE + key, g => cb(g.scene), null, () => { console.warn('GLB manquant:', key); cb(null); });
    }

    // Normalise : scale=1.5 (ou 0.008 pour police_car), grounded y=0, ombres
    function _normalizeKenney(model, key) {
      model.position.set(0, 0, 0);
      model.rotation.set(0, 0, 0);
      const s = key === 'police_car' ? 0.008 : 1.5;
      model.scale.set(s, s, s);
      const box = new THREE.Box3().setFromObject(model);
      model.position.y = -box.min.y;
    }

      { key:'hatchback-sports', freq:3 },
      { key:'delivery',         freq:2 },
      { key:'truck',            freq:2 },
      { key:'sedan-sports',     freq:2 },
      { key:'suv-luxury',       freq:2 },
      { key:'police',           freq:1 },
      { key:'ambulance',        freq:1 },
      { key:'firetruck',        freq:1 },
      { key:'police_car',       freq:2 },
    ];
    const NPC_ROUTES = RD_POS.flatMap(r => [{ axis:'x', fixed:r }, { axis:'z', fixed:r }]);
    const NPC_BOUND = WORLD / 2 - 3;
    const npcCars   = [];
    const _npcTmpl  = {};
    let   _npcLoadIdx = 0;

    function _buildWeightedPool(defs, loaded) {
      const pool = [];
      defs.forEach(d => { if (loaded[d.key]) for (let i = 0; i < d.freq; i++) pool.push(d); });
      return pool;
    }

    function _npcPlaceModel(tmplModel) {
      const mesh  = (typeof THREE.SkeletonUtils !== 'undefined')
                      ? THREE.SkeletonUtils.clone(tmplModel)
                      : tmplModel.clone(true);
      const route = NPC_ROUTES[Math.floor(rnd() * NPC_ROUTES.length)];
      const dir   = rnd() < 0.5 ? 1 : -1;
      const t     = (rnd() * 2 - 1) * NPC_BOUND;
      const speed = 6 + rnd() * 8;  // 6–14 u/s
      if (route.axis === 'x') {
        mesh.position.set(t, 0, route.fixed + dir * 3);
        mesh.rotation.y = dir > 0 ?  Math.PI / 2 : -Math.PI / 2; // +x → face est, -x → face ouest
      } else {
        mesh.position.set(route.fixed - dir * 3, 0, t);
        mesh.rotation.y = dir > 0 ? 0 : Math.PI;
      }
      scene.add(mesh);
      npcCars.push({ mesh, route, dir, t, speed });
    }

    function _npcSpawnAll() {
      const pool = _buildWeightedPool(KENNEY_DEFS, _npcTmpl);
      if (!pool.length) { console.warn('Aucun GLB chargé — PNJ absents'); return; }
      for (let i = 0; i < 8; i++) {
        const def = pool[Math.floor(rnd() * pool.length)];
        _npcPlaceModel(_npcTmpl[def.key]);
      }
    }

    function _npcLoadNext() {
      if (_npcLoadIdx >= KENNEY_DEFS.length) { _npcSpawnAll(); return; }
      const def = KENNEY_DEFS[_npcLoadIdx++];
      _loadGLB(def.key + '.glb', m => {
        if (m) { _normalizeKenney(m, def.key); _npcTmpl[def.key] = m; }
        _npcLoadNext();
      });
    }

    _pedTexMgr.setURLModifier(url => {
      // Redirige Textures/texture-x.png → PED_BASE/texture-x.png
      const m = url.match(/[Tt]extures\/([^/]+\.png)/);
      return m ? PED_BASE + m[1] : url;
    });
    const _pedLoader = new THREE.GLTFLoader(_pedTexMgr);

    function _pedSetRot(ped) {
      const d = ped.dir;
      if (ped.track.walkAxis === 'x') ped.mesh.rotation.y = d > 0 ? Math.PI/2 : -Math.PI/2;
      else                             ped.mesh.rotation.y = d > 0 ? 0 : Math.PI;
    }

    function _findPedLegs(root) {
      const legPat   = /(up.*leg|upleg|thigh|upperleg)/i;
      const excl     = /(lower|foot|shin|calf|knee|toe)/i;
      const leftPat  = /(left|[._]l([._]|$))/i;
      const rightPat = /(right|[._]r([._]|$))/i;
      let legL = null, legR = null;
      root.traverse(obj => {
        const n = obj.name;
        if (!legPat.test(n) || excl.test(n)) return;
        if (!legL && leftPat.test(n))  legL = obj;
        if (!legR && rightPat.test(n)) legR = obj;
      });
      return { legL, legR };
    }

    // 24 piétons — 3 par trottoir sur 8 trottoirs (fixedAxis:'z', tous les 4 axes)
    (function _initPeds() {
      const _PED_COLORS = [0xe74c3c, 0x3498db, 0x2ecc71, 0xf39c12, 0x9b59b6];
      const tracks8 = PED_TRACKS.filter(t => t.fixedAxis === 'z');
      let pedIndex = 0;
      tracks8.forEach(track => {
        for (let i = 0; i < 3; i++) {
          let pos;
          do { pos = -80 + Math.random() * 160; }
          while (RD_POS.some(r => Math.abs(pos - r) < 7));
          const dir   = Math.random() < 0.5 ? 1 : -1;
          const speed = 1.5 + Math.random() * 1.5;
          const key   = PED_MODELS[pedIndex % 18];
          pedIndex++;
          const onLoad = mesh => {
            mesh.scale.set(0.8, 0.8, 0.8);
            mesh.position.set(pos, 0, track.fixedVal);
            const box = new THREE.Box3().setFromObject(mesh);
            mesh.position.y = -box.min.y;
            mesh.traverse(c => { if (c.isMesh) console.log('PED node:', c.name, c.parent && c.parent.name); });
            scene.add(mesh);
            const { legL, legR } = _findPedLegs(mesh);
            const _kids = mesh.children;
            const ped = {
              mesh, track, pos, dir, speed, baseY: mesh.position.y,
              legL: legL || (_kids[0] || null),
              legR: legR || (_kids[1] || null)
            };
            _pedSetRot(ped);
            peds.push(ped);
          };
          _pedLoader.load(PED_BASE + key + '.glb', gltf => onLoad(gltf.scene), null, () => {
            const fallback = new THREE.Mesh(
              new THREE.CylinderGeometry(0.2, 0.2, 1.4, 8),
              new THREE.MeshBasicMaterial({ color: _PED_COLORS[Math.floor(Math.random() * _PED_COLORS.length)] })
            );
            onLoad(fallback);
          });
        }
      });
    })();

    // ════════════════════════════════════════
    //  VOITURE JOUEUR
    //  Type : berline rouge, mesh box simple
    //  Structure : caisse + cabine + 4 roues
    // ════════════════════════════════════════
    const CAR_L = 4.2;
    const CAR_W = 2.0;
    const CAR_H = 0.75;

    const playerCar = new THREE.Group();

    // — caisse
    const matBody = new THREE.MeshBasicMaterial({ color: 0xcc1111 });
    const bodyMesh = new THREE.Mesh(
      new THREE.BoxGeometry(CAR_W, CAR_H, CAR_L),
      matBody
    );
    bodyMesh.position.y = CAR_H / 2;
    bodyMesh.castShadow = true;
    playerCar.add(bodyMesh);

    // — cabine
    const matCabin = new THREE.MeshBasicMaterial({ color: 0xe82020 });
    const cabinMesh = new THREE.Mesh(
      new THREE.BoxGeometry(CAR_W * 0.88, CAR_H * 0.85, CAR_L * 0.52),
      matCabin
    );
    cabinMesh.position.set(0, CAR_H + (CAR_H * 0.85) / 2, -0.25);
    cabinMesh.castShadow = true;
    playerCar.add(cabinMesh);

    // — vitres (teintées sombres)
    const matGlass = new THREE.MeshBasicMaterial({ color: 0x1a2a3a, transparent: true, opacity: 0.7 });
    const windshield = new THREE.Mesh(
      new THREE.BoxGeometry(CAR_W * 0.82, CAR_H * 0.65, 0.05),
      matGlass
    );
    windshield.position.set(0, CAR_H + 0.38, -0.25 + CAR_L * 0.52 / 2 + 0.03);
    playerCar.add(windshield);

    // — phares avant (jaune clair)
    const matHead = new THREE.MeshBasicMaterial({ color: 0xffee88 });
    [-0.65, 0.65].forEach(side => {
      const h = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.2, 0.05), matHead);
      h.position.set(side, CAR_H * 0.55, CAR_L / 2 + 0.03);
      playerCar.add(h);
    });

    // — roues (cylindres noirs)
    const matWheel = new THREE.MeshBasicMaterial({ color: 0x111111 });
    const matRim   = new THREE.MeshBasicMaterial({ color: 0x888888 });
    const wheelR   = 0.34;
    const wheelW   = 0.22;
    const wheelPosArr = [
      [-CAR_W / 2 - 0.08,  wheelR,  CAR_L / 2 - 0.85],
      [ CAR_W / 2 + 0.08,  wheelR,  CAR_L / 2 - 0.85],
      [-CAR_W / 2 - 0.08,  wheelR, -CAR_L / 2 + 0.85],
      [ CAR_W / 2 + 0.08,  wheelR, -CAR_L / 2 + 0.85],
    ];
    wheelPosArr.forEach(([wx, wy, wz]) => {
      const wg = new THREE.Group();
      const tire = new THREE.Mesh(
        new THREE.CylinderGeometry(wheelR, wheelR, wheelW, 14),
        matWheel
      );
      tire.rotation.z = Math.PI / 2;
      wg.add(tire);
      const rim = new THREE.Mesh(
        new THREE.CylinderGeometry(wheelR * 0.55, wheelR * 0.55, wheelW + 0.01, 8),
        matRim
      );
      rim.rotation.z = Math.PI / 2;
      wg.add(rim);
      wg.position.set(wx, wy, wz);
      playerCar.add(wg);
    });

    playerCar.position.set(-80, 0, -20); // route z=-20, lane droite, face est
    scene.add(playerCar);

    // ════════════════════════════════════════
    //  CLAVIER
    // ════════════════════════════════════════
    const keys = {};
    document.addEventListener('keydown', e => { keys[e.code] = true;  e.preventDefault(); });
    document.addEventListener('keyup',   e => { keys[e.code] = false; });

    // ════════════════════════════════════════
    //  PHYSIQUE VOITURE
    // ════════════════════════════════════════
    let carSpeed   = 0;   // unités/s
    let carAngle   = Math.PI / 2; // cap initial : face est sur route z=-28

    const MAX_FWD   = 20;
    const MAX_REV   = 8;
    const ACCEL     = 12;
    const BRAKE     = 18;
    const FRICTION  = 5;
    const TURN_SPD  = 1.9; // rad/s

    // ════════════════════════════════════════
    //  CAMÉRA 3ÈME PERSONNE
    // ════════════════════════════════════════
    let camYaw = Math.PI / 2;
    const CAM_DIST   = 11;
    const CAM_HEIGHT = 4.5;
    const CAM_SMOOTH = 0.06;

    // ════════════════════════════════════════
    //  BOUCLE PRINCIPALE
    // ════════════════════════════════════════
    const clock = new THREE.Clock();

    function update(dt) {
      // ── touches ZQSD / WASD ──
      const fwd  = keys['KeyW'] || keys['KeyZ'];
      const rev  = keys['KeyS'];
      const left = keys['KeyA'] || keys['KeyQ'];
      const rgt  = keys['KeyD'];

      // Accélération
      if (fwd) {
        carSpeed = Math.min(carSpeed + ACCEL * dt, MAX_FWD);
      } else if (rev) {
        carSpeed = Math.max(carSpeed - BRAKE * dt, -MAX_REV);
      } else {
        carSpeed *= 0.985;
        if (Math.abs(carSpeed) < 0.05) carSpeed = 0;
      }

      // Braquage (proportionnel à la vitesse)
      if (Math.abs(carSpeed) > 0.2) {
        const dir = carSpeed > 0 ? 1 : -1;
        const ts  = TURN_SPD * Math.min(Math.abs(carSpeed) / MAX_FWD, 1);
        if (left) carAngle += ts * dt * dir;
        if (rgt)  carAngle -= ts * dt * dir;
      }

      // Déplacement — sauvegarde pour roll-back collision
      const _prevX = playerCar.position.x;
      const _prevZ = playerCar.position.z;
      playerCar.position.x += Math.sin(carAngle) * carSpeed * dt;
      playerCar.position.z += Math.cos(carAngle) * carSpeed * dt;
      playerCar.rotation.y  = carAngle;

      // Limites monde
      const BOUND = WORLD / 2 - 3;
      playerCar.position.x = Math.max(-BOUND, Math.min(BOUND, playerCar.position.x));
      playerCar.position.z = Math.max(-BOUND, Math.min(BOUND, playerCar.position.z));

      // ── Collision bâtiments (AABB) — annule le déplacement si collision ──
      const _CAR_R = 0.5;
      for (const b of buildingBounds) {
        const ox = playerCar.position.x - b.x;
        const oz = playerCar.position.z - b.z;
        if (Math.abs(ox) < b.hw + _CAR_R && Math.abs(oz) < b.hd + _CAR_R) {
          playerCar.position.x = _prevX;
          playerCar.position.z = _prevZ;
          carSpeed *= 0.1; // rebond amortissement
          break;
        }
      }

      // ── Caméra 3ème personne ──
      camYaw += (carAngle - camYaw) * CAM_SMOOTH;
      camera.position.x = playerCar.position.x - Math.sin(camYaw) * CAM_DIST;
      camera.position.z = playerCar.position.z - Math.cos(camYaw) * CAM_DIST;
      camera.position.y = CAM_HEIGHT;
      camera.lookAt(
        playerCar.position.x,
        playerCar.position.y + 0.8,
        playerCar.position.z
      );

      // ── Feux de circulation ──
      _updateTrafficLights(dt);

      // ── PNJ ──
      npcCars.forEach((npc, idx) => {
        // Blocage : même route uniquement (même axis + même fixed)
        let tooClose = false;
        for (let j = 0; j < npcCars.length; j++) {
          if (j === idx) continue;
          const o = npcCars[j];
          if (o.route.axis !== npc.route.axis || o.route.fixed !== npc.route.fixed) continue;
          const ahead = (o.t - npc.t) * npc.dir;
          if (ahead > 0 && ahead < 10) { tooClose = true; break; }
        }
        if (tooClose) {
          npc.curSpeed = Math.max(0, (npc.curSpeed !== undefined ? npc.curSpeed : npc.speed) * 0.7);
          npc.stuckTimer = (npc.stuckTimer || 0) + dt;
          if (npc.stuckTimer >= 3) {
            npc.t = npc.dir > 0 ? -80 : 80;
            npc.stuckTimer = 0; npc.curSpeed = npc.speed;
            if (npc.route.axis === 'x') npc.mesh.position.set(npc.t, 0, npc.route.fixed);
            else                         npc.mesh.position.set(npc.route.fixed, 0, npc.t);
          }
        } else {
          npc.curSpeed = Math.min(npc.speed, (npc.curSpeed !== undefined ? npc.curSpeed : npc.speed) * 1.2);
          npc.stuckTimer = 0;
        }
        // Arrêt aux intersections selon phase du feu
        if (RD_POS.some(r => Math.abs(npc.t - r) < 8) && Math.sin(Date.now() * 0.001 + idx) > 0) return;
        // Position candidate
        const newT = npc.t + npc.dir * npc.curSpeed * dt;
        // Déplacement validé + rebouclage
        npc.t = newT;
        if (npc.t >  NPC_BOUND) npc.t -= NPC_BOUND * 2;
        if (npc.t < -NPC_BOUND) npc.t += NPC_BOUND * 2;
        if (npc.route.axis === 'x') {
          npc.mesh.position.x = npc.t;
          npc.mesh.position.z = npc.route.fixed;
        } else {
          npc.mesh.position.z = npc.t;
          npc.mesh.position.x = npc.route.fixed;
        }
      });

      // ── Piétons PNJ ──
      peds.forEach((ped, pi) => {
        const px = ped.mesh.position.x, pz = ped.mesh.position.z;
        // Proximité piéton–piéton : demi-tour si < 2u
        for (let j = 0; j < peds.length; j++) {
          if (j === pi || peds[j].track !== ped.track) continue;
          const dx = px - peds[j].mesh.position.x, dz = pz - peds[j].mesh.position.z;
          if (dx*dx + dz*dz < 4) { ped.dir *= -1; _pedSetRot(ped); break; }
        }
        // Position candidate
        const newPos = ped.pos + ped.dir * ped.speed * dt;
        const nx = ped.track.walkAxis === 'x' ? newPos : px;
        const nz = ped.track.walkAxis === 'x' ? pz     : newPos;
        // Bord du monde : demi-tour
        if (newPos > PED_BOUND || newPos < -PED_BOUND) {
          ped.dir = -ped.dir; _pedSetRot(ped); return;
        }
        // Collision bâtiments : demi-tour
        for (const b of buildingBounds) {
          if (Math.abs(nx - b.x) < b.hw + 0.6 && Math.abs(nz - b.z) < b.hd + 0.6) {
            ped.dir = -ped.dir; _pedSetRot(ped); return;
          }
        }
        // Commit déplacement
        ped.pos = newPos;
        if (ped.track.walkAxis === 'x') ped.mesh.position.x = newPos;
        else                             ped.mesh.position.z = newPos;
        if (ped.legL) ped.legL.rotation.x =  Math.sin(Date.now() * 0.005 + pi) * 0.5;
        if (ped.legR) ped.legR.rotation.x = -Math.sin(Date.now() * 0.005 + pi) * 0.5;
      });

      // ── HUD vitesse (km/h) ──
      document.getElementById('speed-display').textContent =
        Math.abs(Math.round(carSpeed * 3.6));
    }

    // ════════════════════════════════════════
    //  MINIMAP
    // ════════════════════════════════════════
    const mmCanvas = document.getElementById('minimap');
    const mmCtx = mmCanvas.getContext('2d');
    const MM_S = 160 / WORLD; // px per world unit
    function _mm(wx, wz) { return [wx * MM_S + 80, wz * MM_S + 80]; }

    function _drawMapContent(ctx, w, h, scale) {
      const cx = w/2, cy = h/2;
      // Routes
      ctx.strokeStyle = '#666'; ctx.lineWidth = 3;
      RD_POS.forEach(r => {
        const rp = r * scale + cx;
        ctx.beginPath(); ctx.moveTo(0, rp); ctx.lineTo(w, rp); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(rp, 0); ctx.lineTo(rp, h); ctx.stroke();
      });
      // Bâtiments
      ctx.fillStyle = '#8B7355';
      buildingBounds.forEach(b => {
        const mx = b.x * scale + cx, mz = b.z * scale + cy;
        const bw = Math.max(2, b.hw*2*scale), bd = Math.max(2, b.hd*2*scale);
        ctx.fillRect(mx - bw/2, mz - bd/2, bw, bd);
      });
      // Joueur — triangle directionnel
      const px = playerCar.position.x * scale + cx;
      const pz = playerCar.position.z * scale + cy;
      ctx.save();
      ctx.translate(px, pz); ctx.rotate(-playerCar.rotation.y);
      ctx.fillStyle = '#FF0000';
      ctx.beginPath(); ctx.moveTo(0, -8); ctx.lineTo(5, 6); ctx.lineTo(-5, 6);
      ctx.closePath(); ctx.fill();
      ctx.restore();
    }

    function drawMinimap() {
      const w = mmCanvas.width, h = mmCanvas.height, cx = w/2, cy = h/2;
      const scale = w / WORLD;
      mmCtx.clearRect(0, 0, w, h);
      mmCtx.save();
      mmCtx.beginPath(); mmCtx.arc(cx, cy, cx-1, 0, Math.PI*2);
      mmCtx.fillStyle = 'rgba(0,0,0,0.75)'; mmCtx.fill();
      mmCtx.clip();
      _drawMapContent(mmCtx, w, h, scale);
      mmCtx.restore();
    }

    function drawMissionRoute(waypoints) {
      // Tracé itinéraire mission en jaune #FFD700 — inactif pour l'instant
    }

    // ── Touches minimap ──
    const _mmLabels = document.getElementById('mm-labels');
    document.addEventListener('keydown', e => {
      if (e.code === 'KeyK') {
        mmCanvas.width=160; mmCanvas.height=160;
        mmCanvas.style.width='160px'; mmCanvas.style.height='160px'; mmCanvas.style.borderRadius='50%';
        _mmLabels.style.bottom='184px';
      } else if (e.code === 'KeyY') {
        mmCanvas.width=280; mmCanvas.height=280;
        mmCanvas.style.width='280px'; mmCanvas.style.height='280px'; mmCanvas.style.borderRadius='50%';
        _mmLabels.style.bottom='304px';
      } else if (e.code === 'KeyI') {
        mmCanvas.width=400; mmCanvas.height=400;
        mmCanvas.style.width='400px'; mmCanvas.style.height='400px'; mmCanvas.style.borderRadius='50%';
        _mmLabels.style.bottom='424px';
      } else if (e.key === 'm' || e.key === 'M') {
        _mapDiv.style.display = _mapDiv.style.display === 'none' ? 'block' : 'none';
      }
    });

    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.min(clock.getDelta(), 0.05);
      update(dt);
      renderer.render(scene, camera);
      drawMinimap();
      if(typeof _mapDiv!=='undefined' && _mapDiv.style.display==='block'){
        _mapCam.position.set(0,400,0);
        _mapRenderer.render(scene, _mapCam);
        _mapCtx.clearRect(0,0,660,660);
        const _px=(playerCar.position.x+220)/440*660;
        const _pz=(playerCar.position.z+220)/440*660;
        _mapCtx.save();
        _mapCtx.translate(_px,_pz);
        _mapCtx.rotate(playerCar.rotation.y);
        _mapCtx.beginPath();
        _mapCtx.moveTo(0,-11);
        _mapCtx.lineTo(7,9);
        _mapCtx.lineTo(-7,9);
        _mapCtx.closePath();
        _mapCtx.fillStyle='#FF3300';
        _mapCtx.fill();
        _mapCtx.restore();
      }
    }
    animate();

    // ════════════════════════════════════════
    //  RESIZE
    // ════════════════════════════════════════
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
